name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  HF_HOME: "."

jobs:
  lint:
    name: Lint & Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Checkout submodules
        env:
          GH_TOKEN: ${{ secrets.TITAN_OELLM_PAT }}
        run: |
          sed -i 's,git@github.com:,https://github.com/,g' .gitmodules
          cat .git/config
          cat .gitmodules
          printf "https://x-access-token:${GH_PAT}@github.com\n" > ~/.git-credentials
          git submodule status --recursive
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}-lint
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}

      - name: Restore pre-commit cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-precommit-

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color always

  tests:
    name: Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: schema-only
            python: '3.11'
            extras: 'dev'
            checkout_submodules: 'false'
            pytest_args: ''
          - name: megatron-extras
            python: '3.11'
            extras: 'dev,megatron'
            checkout_submodules: 'recursive'
            schema_only: '1'
            pytest_args: 'tests/unit/test_megatron_backend.py tests/integration/test_megatron_optional.py'
      fail-fast: false

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Checkout submodules
        env:
          GH_TOKEN: ${{ secrets.TITAN_OELLM_PAT }}
        run: |
          sed -i 's,git@github.com:,https://github.com/,g' .gitmodules
          cat .git/config
          cat .gitmodules
          printf "https://x-access-token:${GH_PAT}@github.com\n" > ~/.git-credentials
          git submodule status --recursive
          git submodule update --init --recursive


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}-${{ matrix.name }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
            submodules/Megatron-LM

      - name: Restore pre-commit cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-precommit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-precommit-

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"

      - name: Run pytest
        run: |
          if [ -z "${{ matrix.pytest_args }}" ]; then
            pytest
          else
            pytest ${{ matrix.pytest_args }}
          fi
