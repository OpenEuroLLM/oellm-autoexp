class_name: Container
image: ${oc.env:CONTAINER_CACHE_DIR}/untested/MegatronTrainingLumi_x86_64.sif
runtime: singularity
bind:
  [
    "/boot/config-6.4.0-150600.23.73_15.0.14-cray_shasta_c",
    "/pfs/",
    "/scratch/",
    "/flash/",
    "${oc.env:PWD}",
    "/opt/rocm/lib/librccl.so:/opt/venv/lib/python3.12/site-packages/torch/lib/librccl.so"
  ]
pwd: ${oc.env:PWD}
env:
  MACHINE_NAME: "LUMI"
  PYTHONPATH: "."
python: "python3"
