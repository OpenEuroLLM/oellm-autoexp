defaults:
 - default

log_events:
  - name: finished_training
    pattern: "[after training is done]"
    pattern_type: substring
    action:
      class_name: FinishAction
      reason: "Training finished"
  - name: finish
    pattern: ".*validation loss.*on test set.*"
    pattern_type: regex
    action:
      class_name: FinishAction
      reason: "Test Evaluation Finished"
  - name: error
    pattern: "Exited with exit code 1"
    pattern_type: substring
    action:
      class_name: RestartAction
      reason: ""
  - name: time_limit
    pattern: "DUE TO TIME LIMIT"
    pattern_type: substring
    action:
      class_name: RestartAction
      reason: ""
  - name: inactive
    pattern_type: inactivity
    action:
      class_name: RestartAction
      reason: "Inactive Log"
  - name: bus_error
    pattern: "Unexpected bus error encountered in worker."
    pattern_type: substring
    action:
      class_name: RestartAction
      reason: ""
  - name: nan_loss
    pattern: "message='found NaN in local forward loss calculation"
    pattern_type: substring
    action:
      class_name: RestartAction
      reason: ""
  - name: connection_failure
    pattern: "Application launch failed: Communication connection failure"
    pattern_type: substring
    action:
      class_name: RestartAction
      reason: ""

state_events:
  - name: "failed"
    transition: ["RUNNING", "FAILED"]
    action:
      class_name: RestartAction
      reason: "Inactive Log"
  - name: "cancelled"
    transition: ["RUNNING", "CANCELLED"]
    action:
      class_name: RestartAction
      reason: "Inactive Log"
