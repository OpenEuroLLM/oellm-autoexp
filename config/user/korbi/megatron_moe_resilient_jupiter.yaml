# @package _global_
#
# Resilient training demo: warm-reserve ("spare") node + in-process restart,
# with a SIMULATED node failure injected mid-run.
#
# What this exercises
# -------------------
# * Allocate 3 nodes but only train on 2 (8 GPUs). The 3rd node is a WARM
#   RESERVE held idle by nvidia-resiliency-ext's in-process restart wrapper.
# * `--inprocess-restart` + `--inprocess-active-world-size 8`: on a rank/node
#   failure the wrapper reassigns reserve-node ranks into the dead slots,
#   keeping world_size == 8 constant (mandatory for Megatron, whose
#   TP*PP*EP*DP factorization is fixed) and resumes WITHOUT tearing down the
#   Python process/container -> fast recovery.
# * `--enable-ft-package` (via ft_launcher) adds heartbeat + hang detection
#   and, crucially, enables Megatron's built-in fault simulator.
#
# Simulating the failure
# ----------------------
# The `FT_SIM_FAULT_DESC` env var (read by Megatron's
# ft_integration.maybe_setup_simulated_fault) makes one rank kill/hang itself
# mid-training -- no extra script required. Format: "type;rank;base_delay":
#   * type:  rank_killed (SIGKILL) | rank_hung (SIGSTOP) | random
#   * rank:  global rank to fail (blank = random). Here 5 -> on node 1, so we
#            exercise an inter-node recovery and bring the reserve node in.
#   * delay: seconds after training start before the fault fires.
# So "rank_killed;5;90" kills rank 5 ~90s in; the reserve node takes over.
#
# Caveats (validate on cluster -- this is a starting point, not yet battle-tested)
# --------------------------------------------------------------------------------
# * Recovery resumes from the last checkpoint, so checkpointing MUST work. We
#   use nvidia-resiliency-ext LOCAL checkpoints (+replication so a dead node's
#   shard survives on a neighbour). This is a different code path from the
#   torch_dist GLOBAL save that crashed for MoE EP+TP (see project memory #7);
#   we keep `save_interval` huge so no global save fires during the run, while
#   `save` is still set because ft setup() asserts a save dir (for ft_state.json).
# * Requires PyTorch >=2.5.1 / NCCL >=2.26.2 (pt2512 container is fine).
# * `ft_launcher` must be on PATH in the container (nvidia-resiliency-ext).
# * Classic barrier-rendezvous spare-node support is "planned"; the supported
#   route today is this in-process warm-reserve path.
defaults:
  - /experiments/base
  - /backend: megatron_ftlauncher_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

backend:
  megatron:
    train_iters: 400          # ~10 min @ ~1.5 s/iter -> fault at 90s lands mid-run
    global_batch_size: 64
    micro_batch_size: 4
    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 2     # PP=2 spans the 2 active nodes (inter-node)
    tensor_model_parallel_size: 1
    eval_interval: 1000
    seq_length: 4096
    lr: 0.001
    log_interval: 1
    use_distributed_optimizer: true
    moe_router_dtype: "fp32"

    # --- Fault tolerance: in-process restart + warm reserve ---------------
    enable_ft_package: true             # ft_launcher rank monitor + sim-fault hook
    calc_ft_timeouts: true              # refine section timeouts from observed timings
    inprocess_restart: true
    inprocess_active_world_size: 8      # 2 nodes x 4 GPUs are active; node 3 = reserve
    inprocess_granularity: node         # reserve/replace at whole-node granularity
    inprocess_max_iterations: 3         # cap in-process restarts before giving up
    inprocess_empty_cuda_cache: true    # release cached mem on each restart

    # --- Checkpointing for recovery (local + replicated) ------------------
    save: /e/scratch/projectnucleus/poeppel1/output/resilient_demo/ckpt   # ADJUST
    load: /e/scratch/projectnucleus/poeppel1/output/resilient_demo/ckpt   # ADJUST
    ckpt_step: 0
    save_interval: 1000000              # effectively disable GLOBAL torch_dist save
    async_save: true
    no_load_optim: false                # base sets this true; resume needs optimizer state
    no_load_rng: false                  # restore RNG too, for an exact-as-possible resume
    non_persistent_ckpt_type: local                                       # fast, resumable
    non_persistent_local_ckpt_dir: /e/scratch/projectnucleus/poeppel1/output/resilient_demo/local_ckpt  # ADJUST
    non_persistent_save_interval: 20    # snapshot every 20 iters for recovery
    replication: true                   # mirror each rank's local shard...
    replication_factor: 2               # ...to 1 neighbour, so a dead node's state survives
    replication_jump: 4                 # replica is 4 ranks away -> on the other active node

    data_path:
     - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/
  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONWARNINGS: "ignore::UserWarning"

    # PP=2 inter-node P2P hangs on JUPITER GH200 without GDR disabled (memory #5/#12)
    NCCL_NET_GDR_LEVEL: "0"
    # in-process restart relies on the c10d watchdog surfacing NCCL errors fast
    TORCH_NCCL_ASYNC_ERROR_HANDLING: "1"
    # silence c10d waitForInput timeout spam during restart (inprocess_restart.py warns if unset)
    TORCH_CPP_LOG_LEVEL: "error"

    # >>> SIMULATED FAULT <<<  kill global rank 5 (on node 1) ~90s into training.
    # Set to "" / remove to run resiliently without an injected fault.
    # NOTE: the embedded double-quotes are REQUIRED. The value is rendered
    # unquoted into `srun bash -c '... --env FT_SIM_FAULT_DESC=<val> ...'`, so a
    # bare "rank_killed;5;90" would have its ';' parsed as shell command
    # separators (apptainer then gets no command -> exit 127). The inner quotes
    # survive the outer single-quoted bash -c and protect the semicolons.
    FT_SIM_FAULT_DESC: '"rank_killed;5;90"'

slurm:
  sbatch:
    nodes: 3                  # 2 active + 1 warm reserve
    time: "00:30:00"
    # Leave job_name unset so the rendered #SBATCH --job-name falls back to the
    # sweep-resolved record name (e.g. ..._0); otherwise the submit-time
    # validator (which checks the resolved name) rejects the script.
    job_name: null

job:
  name: megatron_moe_resilient_jupiter
