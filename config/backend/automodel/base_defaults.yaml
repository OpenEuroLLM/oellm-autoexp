# NeMo Automodel configuration defaults (auto-generated).
# Generated by scripts/generate_automodel_config.py

recipe: BenchmarkingRecipeForNextTokenPrediction  # Recipe class name.
seed: 1234  # Random seed.

benchmark:
  warmup_steps: 10  # Number of warmup steps before timing.
  peak_tflops: 989  # Peak hardware TFLOPS for MFU calculation (e.g. 989 for H100).
  nsys_start: -1  # Step to start nsys profiling (-1 to disable).
  nsys_end: -1  # Step to end nsys profiling (-1 to disable).
  nsys_ranks: []  # Ranks to profile with nsys.
  num_nodes: 1  # Number of nodes for TFLOPS calculation.

step_scheduler:
  global_batch_size: null  # Total number of samples processed per optimizer step across all GPUs. This is the effective batch size for the entire training step.
  local_batch_size: null  # Number of samples per micro-batch per GPU. This is the batch size for a single forward/backward pass on one GPU.
  ckpt_every_steps: null  # Frequency of checkpoint steps.
  val_every_steps: null  # Number of training steps between validation.
  log_remote_every_steps: 1  # Frequency of remote logging (e.g., WandB, MLflow). Default: 1 (every step).
  gc_every_steps: null  # Frequency of manual garbage collection steps.
  start_step: 0  # Initial global step. Used when resuming from checkpoint. Default: 0.
  start_epoch: 0  # Initial epoch. Used when resuming from checkpoint. Default: 0.
  num_epochs: null  # Total number of epochs. Default: None or calculated from max_steps if num_epochs is None or 10 if max_steps and num_epochs are both None.
  max_steps: null  # Maximum number of steps to run. If None, calculated from num_epochs.

distributed:
  strategy: fsdp2  # Distribution strategy (fsdp2, megatron_fsdp, ddp).
  tp_size: 1  # Tensor parallel size.
  cp_size: 1  # Context parallel size.
  pp_size: 1  # Pipeline parallel size.
  dp_replicate_size: 1  # Data parallel replicate size (FSDP2 only).
  ep_size: 1  # Expert parallel size.
  sequence_parallel: false  # Enable sequence parallelism in TP plan.
  activation_checkpointing: false  # Enable activation checkpointing.
  defer_fsdp_grad_sync: true  # Defer FSDP gradient sync to final micro-batch.

  pipeline:
    pp_schedule: 1f1b  # Pipeline schedule type. Supported values: "1f1b" (one-forward-one-backward), "gpipe", "interleaved_1f1b", "looped_bfs", "dfs", "v_schedule", "zero_bubble". Defaults to "1f1b".
    pp_schedule_csv: null  # Path to a CSV file defining a custom pipeline schedule. If provided, overrides pp_schedule.
    pp_microbatch_size: 1  # Size of each microbatch for pipeline execution. pp_batch_size must be divisible by pp_microbatch_size.
    pp_batch_size: 1  # Total batch size per pipeline stage. Must be divisible by pp_microbatch_size.
    layers_per_stage: null  # Number of transformer layers per pipeline stage. If None, layers are split evenly across stages.
    round_virtual_stages_to_pp_multiple: null  # When using virtual stages (interleaved schedules), round the number of virtual stages to a multiple of pp_size. "up" rounds up, "down" rounds down. If None, no rounding is applied.
    module_fqns_per_model_part: null  # Explicit specification of which module FQNs belong to each model part/stage. If provided, overrides automatic layer splitting.
    patch_inner_model: true  # Apply pipeline patches to the inner model (e.g., the base transformer in a CausalLM wrapper). Defaults to True.
    patch_causal_lm_model: true  # Apply pipeline patches to the CausalLM wrapper model. Defaults to True.
    patch_stage_backward_maybe_with_nosync: false  # Patch stage backward to use no_sync context for gradient accumulation efficiency. Useful when combining PP with FSDP.
    dtype: null  # Data type for pipeline computation. If None, uses the model's default dtype.
    scale_grads_in_schedule: false  # Scale gradients within the pipeline schedule (by 1/n_microbatches). If False, gradients must be scaled externally. Defaults to False.
    pp_seq_len: null  # Sequence length hint for pipeline parallel shape inference. If None, it will be inferred from the dataset config.

dist_env:
  backend: nccl  # Distributed backend.
  timeout_minutes: 10  # Distributed initialization timeout in minutes.

model:
  _target_: nemo_automodel.NeMoAutoModelForCausalLM.from_config  # Hydra target for model factory.
  trust_remote_code: true  # Trust remote code when loading HF models.

  backend:
    attn: te  # Attention backend ("te", "sdpa", or "flex").
    linear: te  # Linear layer backend ("torch" or "te").
    rms_norm: torch_fp32  # RMSNorm backend ("torch", "torch_fp32", or "te").
    rope_fusion: true  # Whether to use fused RoPE (requires TE).
    experts: torch_mm  # MoE expert GEMM backend. "torch" uses per-expert loop, "te" uses TE GroupedLinear, "gmm" uses grouped_gemm.ops.gmm, "torch_mm" uses torch._grouped_mm.
    dispatcher: torch  # MoE token dispatcher. "torch" uses DTensor all-gather/reduce-scatter, "deepep" uses DeepEP for token dispatch.
    dispatcher_num_sms: 20
    fake_balanced_gate: false  # If True, replace the learned Gate with FakeBalancedGate that assigns tokens to experts without learned routing weights.
    fake_gate_noise: 0.0  # Noise level [0, 1] for FakeBalancedGate. When > 0, uses biased topk selection seeded from the input content so routing varies dynamically across training steps (like real Gate) while remaining deterministic for activation checkpointing recompute (same input = same routing). Only used when fake_balanced_gate=True.
    enable_hf_state_dict_adapter: true  # Whether to enable HuggingFace state dict adapter.
    enable_fsdp_optimizations: false  # Whether to enable FSDP2 optimizations.

    te_fp8:
      recipe: current

checkpoint:
  enabled: false  # Enable checkpointing.
  checkpoint_dir: checkpoints/  # Directory for saving checkpoints.
  model_save_format: torch_save  # Checkpoint format: torch_save or safetensors.
  save_consolidated: false  # Save model in consolidated safetensors format.
  restore_from: null  # Path to restore checkpoint from.

loss_fn:
  _target_: nemo_automodel.components.loss.masked_ce.MaskedCrossEntropy  # Hydra target for loss class.
  fp32_upcast: true  # if True it will cast logits to float32 before computing cross entropy. Default: True.
  ignore_index: -100  # label to ignore in CE calculation. Defaults to -100.
  reduction: sum  # type of reduction. Defaults to "sum".

dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset  # Hydra target for dataset class.
  seq_len: 4096  # Sequence length for training.
  num_samples: 100000  # Number of samples in the dataset.
  batch_size: '${..step_scheduler.local_batch_size}'  # Batch size (usually interpolated from step_scheduler).

dataloader:
  batch_size: null  # DataLoader batch size (null when dataset yields batches).
  _target_: torch.utils.data.DataLoader  # Hydra target for DataLoader class.
  num_workers: 0  # Number of DataLoader workers.

optimizer:
  _target_: torch.optim.Adam  # Hydra target for optimizer class.
  betas: [0.9, 0.999]  # Adam beta coefficients.
  eps: 1.0e-08  # Adam epsilon for numerical stability.
  lr: 1.0e-04  # Learning rate.
  weight_decay: 0  # Weight decay.
  foreach: false  # Use foreach implementation (set false for TE GroupedLinear).

lr_scheduler:
  lr_decay_style: cosine  # LR decay schedule: cosine, linear, constant.
  lr_warmup_steps: 500  # Number of warmup steps.
  min_lr: 0.0  # Minimum learning rate after decay.

validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset  # Hydra target for validation dataset class.
  seq_len: 4096  # Sequence length for validation.
  num_samples: 1000  # Number of validation samples.
  batch_size: '${..step_scheduler.local_batch_size}'  # Validation batch size.

validation_dataloader:
  batch_size: null  # Validation DataLoader batch size (null when dataset yields batches).
  _target_: torch.utils.data.DataLoader  # Hydra target for validation DataLoader class.
  num_workers: 0  # Number of validation DataLoader workers.

clip_grad_norm:
  max_norm: 1.0  # Maximum gradient norm for clipping.
