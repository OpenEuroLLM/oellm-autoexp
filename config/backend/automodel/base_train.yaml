# Training base config for NeMo Automodel.
# Use instead of (or after) base.yaml to switch from benchmarking to full training.
#
# Usage in experiment config:
#   defaults:
#     - /backend/automodel: [base_train, qwen3_moe_30BA3B]

recipe: TrainFinetuneRecipeForNextTokenPrediction

# Remove benchmark section (not used for training)
benchmark: null

step_scheduler:
  ckpt_every_steps: 500
  val_every_steps: 100
  num_epochs: 1
  max_steps: 9500

checkpoint:
  enabled: true
  checkpoint_dir: checkpoints/
  model_save_format: torch_save
  save_consolidated: false

lr_scheduler:
  lr_decay_style: cosine
  lr_warmup_steps: 500
  min_lr: 0.0

optimizer:
  _target_: torch.optim.AdamW
  betas: [0.9, 0.95]
  eps: 1.0e-5
  lr: 4.2e-4
  weight_decay: 0.1

clip_grad_norm:
  max_norm: 1.0

# Validation uses mock data by default; override in experiment config for real data.
validation_dataset:
  _target_: nemo_automodel.components.datasets.llm.mock_iterable_dataset.MockIterableDataset
  seq_len: 4096
  num_samples: 1000
  batch_size: ${..step_scheduler.local_batch_size}

validation_dataloader:
  batch_size: null
  _target_: torch.utils.data.DataLoader
  num_workers: 0
