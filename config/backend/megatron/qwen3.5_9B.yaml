# Source files:
# - https://github.com/NVIDIA-NeMo/Megatron-Bridge/blob/main/src/megatron/bridge/recipes/qwen_vl/qwen35_vl.py
# - https://huggingface.co/Qwen/Qwen3.5-9B/blob/main/config.json
# - /e/home/jusers/harmsen1/jupiter/harmsen1/oellm-autoexp/config/backend/megatron/qwen3_base.yaml
# Qwen 3.5 9B

# model architecture from hf config
num_layers: 28
hidden_size: 4096
num_attention_heads: 32
num_query_groups: 4
swiglu: true
rotary_base: 10000000
normalization: RMSNorm
norm_epsilon: 1e-6
use_bias_linear: false

# gated delta net config
# in the config, it's 3 LA 1 FA
linear_attention_freq: 4 # 3 GDN 1 LA
linear_conv_kernel_dim: 4
linear_conv_head_dim: 128
linear_value_head_dim: 128
linear_num_key_heads: 16
linear_num_value_heads: 32

# settings from `qwen3_base.yaml`
# general setup
seq_length: 4096
encoder_seq_length: null
tokenizer_type: HuggingFaceTokenizer
tokenizer_model: EleutherAI/gpt-neox-20b
make_vocab_size_divisible_by: 128
dist_ckpt_strictness: log_unexpected
ckpt_format: torch_dist

# model setup
bf16: true
untie_embeddings_and_output_weights: True
group_query_attention: true
# swiglu: true
# add_bias_linear: false
rotary_percent: 1.0
# rotary_base: 1000000
# normalization: RMSNorm
# norm_epsilon: 1e-6
position_embedding_type: rope
use_rotary_position_embeddings: true
attention_dropout: 0.0
hidden_dropout: 0.0
attention_softmax_in_fp32: true
qk_layernorm: true

# model setup - sizes/scale - Qwen3.5 9B
# num_layers: 48
# hidden_size: 2048
# ffn_hidden_size: 6144
# num_attention_heads: 32
kv_channels: 128
max_position_embeddings: 8192
# num_query_groups: 4
