# Qwen3_235B_A22B — size overrides on top of qwen3_moe.yaml
#
# Architecture (from HuggingFace config):
#   hidden_size: 4096       → hidden_size: 4096
#   num_hidden_layers: 94   → num_layers: 94
#   num_attention_heads: 64 → num_attention_heads: 64  (Q dim = 64×128 = 8192 = 2×hidden)
#   num_key_value_heads: 4  → num_query_groups: 4      (GQA)
#   head_dim: 128           → kv_channels: 128
#   intermediate_size: 12288→ ffn_hidden_size: 12288   (dense FFN, unused by MoE layers)
#   moe_intermediate_size: 1536 → moe_ffn_hidden_size: 1536
#   num_experts: 128        → inherited from qwen3_moe.yaml
#   num_experts_per_tok: 8  → inherited from qwen3_moe.yaml
#   vocab_size: 151936      → set by tokenizer (neox tokenizer used for training)
#   rope_theta: 5000000     → rotary_base: 5000000

defaults:
  - qwen3_moe
  - _self_

# model sizes - Qwen3 235BA22B
num_layers: 94
hidden_size: 4096
ffn_hidden_size: 12288      # dense FFN (unused in MoE layers, but must be set)
num_attention_heads: 64
kv_channels: 128            # head_dim = 128; Q: 64×128=8192=2×hidden, KV: 4×128=512
num_query_groups: 4         # GQA: 4 KV heads
max_position_embeddings: 131072
rotary_base: 5000000        # rope_theta = 5000000 (differs from 30BA3B's 1000000)

# MoE sizes (128 experts, topk=8 inherited from qwen3_moe.yaml)
moe_ffn_hidden_size: 1536   # per-expert intermediate dim (vs 768 for 30BA3B)

aux:
  model_name: "Qwen235B-A22B"
