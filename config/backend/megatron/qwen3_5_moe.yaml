# Qwen3.5 MoE base architecture config
# HF reference: https://huggingface.co/Qwen/Qwen3.5-35B-A3B-Base/blob/main/config.json
#
# Key differences from Qwen3 MoE (qwen3_moe.yaml):
#   - Hybrid attention: 3x gated_delta_net + 1x full SDPA per 4-layer block
#   - rotary_base: 1e7 (vs 1e6), rotary_percent: 0.25 (vs 1.0)
#   - attention_output_gate, apply_wd_to_qk_layernorm
#   - num_experts: 256, moe_ffn_hidden_size: 512, moe_shared_expert_intermediate_size: 512
#   - vocab_size: 248320

# general setup
seq_length: 8192
encoder_seq_length: null  # must be null when seq_length is set (mutually exclusive in Megatron)
attention_backend: auto
transformer_impl: transformer_engine
te_rng_tracker: true
tokenizer_type: HuggingFaceTokenizer
tokenizer_model: Qwen/Qwen3.5-35B-A3B-Base
vocab_size: 248320
make_vocab_size_divisible_by: 256
dist_ckpt_strictness: log_unexpected
layernorm_zero_centered_gamma: true  # HF Qwen3_5RMSNorm uses (1 + weight) formula; must match
ckpt_format: torch_dist
cross_entropy_loss_fusion: false
manual_gc: true
manual_gc_interval: 100
# cross_entropy_fusion_impl: "te"

sequence_parallel: true
use_flash_attn: true

expert_model_parallel_size: 8
tensor_model_parallel_size: 1

# model setup
bf16: true
untie_embeddings_and_output_weights: True
group_query_attention: true
swiglu: true
add_bias_linear: false
rotary_percent: 0.25
rotary_base: 10000000
normalization: RMSNorm
layernorm_epsilon: 1e-6
position_embedding_type: rope
use_rotary_position_embeddings: true
attention_dropout: 0.0
hidden_dropout: 0.0
attention_softmax_in_fp32: true
qk_layernorm: true
attention_output_gate: true
apply_wd_to_qk_layernorm: true

# Hybrid attention: 3x gated_delta_net + 1x full SDPA repeating (HF full_attention_interval=4)
experimental_attention_variant: gated_delta_net
linear_attention_freq: 4
linear_conv_kernel_dim: 4
linear_key_head_dim: 128
linear_value_head_dim: 128
linear_num_key_heads: 16
linear_num_value_heads: 32

# moe setup
num_experts: 256
moe_router_topk: 8
moe_ffn_hidden_size: 512
moe_shared_expert_intermediate_size: 512
moe_router_dtype: "fp32"
moe_router_load_balancing_type: global_aux_loss
moe_layer_freq: 1
moe_shared_expert_gate: true

# optimization
moe_aux_loss_coeff: 0.001
moe_token_dispatcher_type: allgather
moe_shared_expert_overlap: false
moe_hybridep_num_sms: 0
moe_router_padding_for_fp8: false
moe_grouped_gemm: true
moe_router_fusion: False