defaults:
  - qwen3_5_base

# Qwen3.5-4B-Base — HF: https://huggingface.co/Qwen/Qwen3.5-4B-Base/blob/main/config.json
tokenizer_model: Qwen/Qwen3.5-4B-Base
num_layers: 32
hidden_size: 2560
ffn_hidden_size: 9216
num_attention_heads: 16
num_query_groups: 4  # HF num_key_value_heads
kv_channels: 256  # HF head_dim
max_position_embeddings: 262144
vocab_size: 248320
rotary_base: 10000000
rotary_percent: 0.25
# position_embedding_type is intentionally NOT overridden here.
# The base config (qwen3_5_base.yaml) sets rope, which is correct for
# text-only GPTModel training. The VL model uses mrope, but that requires
# 3D position_ids [3/4, B, S] that pretrain_gpt.py never provides.
# Overriding to mrope silently produces garbage RoPE and a loss near log(vocab).
untie_embeddings_and_output_weights: False  # tie_word_embeddings: true


aux:
  model_name: "Qwen3.5-4B"
