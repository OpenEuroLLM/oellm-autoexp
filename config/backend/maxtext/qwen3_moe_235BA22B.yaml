# Qwen3 235BA22B MoE parameters for MaxText
# Use model_name=default to avoid key conflict (named models set keys that
# can't also be overridden from CLI). Set all architecture params directly.
#
# Architecture: 94 layers, dim=4096, 64 query heads, 4 KV heads (GQA),
#               head_dim=128, 128 experts, topk=8, moe_inter_dim=1536
model_name: "default"
decoder_block: mistral
# Architecture dims (Qwen3-235BA22B MoE)
base_num_decoder_layers: 94
base_num_query_heads: 64
base_num_kv_heads: 4
head_dim: 128
base_mlp_dim: 1536
base_emb_dim: 4096
vocab_size: 151936
# MoE
num_experts: 128
num_experts_per_tok: 8
# Misc
enable_dropout: false
logits_via_embedding: false
max_target_length: 4096
