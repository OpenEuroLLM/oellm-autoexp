# Qwen3 30BA3B MoE parameters for MaxText
# Use model_name=default to avoid key conflict (named models set keys that
# can't also be overridden from CLI). Set all architecture params directly.
model_name: "default"
decoder_block: mistral
# Architecture dims (Qwen3-30BA3B MoE)
base_num_decoder_layers: 48
base_num_query_heads: 16
base_num_kv_heads: 8
head_dim: 128
base_mlp_dim: 1024
base_emb_dim: 2048
vocab_size: 151936
# MoE
num_experts: 128
num_experts_per_tok: 8
# Misc
enable_dropout: false
logits_via_embedding: false
max_target_length: 4096
