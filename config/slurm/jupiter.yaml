defaults:
  - base
  - _self_

template_path: "templates/jupiter.sbatch"
launcher_cmd: "\
  export LOCAL_ADDR=$(nslookup $(hostname) | grep \"Address: \" | sed \"s/Address: //\" | tail) ;\\\n \
  ${oc.select:container.runtime,apptainer} exec \
  ${oc.join:' ',${oc.mapkeyvaltmpl:'--env %k=%v \\\n',${backend.env}}} \
  --writable-tmpfs --nv ${oc.join:' ',${oc.maptmpl:'--bind % \\\n',${container.bind}}} ${oc.select:container.image,container.sif} \\\n"
srun:
  exclusive: true
  wait: 60
  cpus_per_task: 18
  threads_per_core: 1
launcher_env_passthrough: false
env:
  MACHINE_NAME: JUPITER
  WORLD_SIZE: 16
  MASTER_ADDR: "$(scontrol show hostnames \"$SLURM_JOB_NODELIST\" | head -n 1)"
  MASTER_PORT: "20074"
  ARCH: "$(uname -m)"
  NCCL_DEBUG: "INFO"
  NCCL_DEBUG_SUBSYS: "ALL"
  NCCL_DEBUG_FILE: "nccl_debug.log"
  NCCL_SOCKET_IFNAME: "ib0"
  NCCL_SOCKET_FAMILY: "AF_INET"
  TORCH_NCCL_ASYNC_ERROR_HANDLING: "1"
  GLOO_SOCKET_IFNAME: "ib0"
  OC_CAUSE: 1
  TORCH_CPP_LOG_LEVEL: "INFO"
  TORCH_NCCL_ENABLE_MONITORING: "1"
  TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC: "240"
  TORCH_NCCL_DEBUG_INFO_TEMP_FILE: "torch_nccl_debug_info.log"

sbatch:
  nodes: 1
  ntasks_per_node: 1
  gpus_per_node: 4
  gres: "gpu:4"
  cpus_per_task: 18
  partition: ${oc.env:SLURM_PARTITION,booster}
  account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
  time: "12:00:00"
