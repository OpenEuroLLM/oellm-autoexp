# @package _global_

# Small-scale test of 131M active MoE model with pull-based multi-stage cooldown on Leonardo
# Reduced sweep grid (2 lr × 2 gbsz × 2 sparsity) for quick validation before 300BT run

defaults:
  - /backend: megatron_torchrun
  - /container: leonardo
  - /slurm: leonardo
  - /job: default
  - /sweep: none
  - /backend/megatron: base
  - _self_

index: 0
stage: "" # overridden by sweep

job:
  name: "moe_test_nexp_${backend.megatron.num_experts}_lr${backend.megatron.lr}_gbsz${backend.megatron.global_batch_size}_seed${backend.megatron.seed}_${stage}"
  base_output_dir: "results/tests/checkpointing/moe_200MT/${job.name}"

backend:
  megatron:
    wandb_exp_name: "${job.name}"
    wandb_project: moe-ablations
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    # DATA
    data_path: [
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-actual,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-distill,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-diverse_qa_pairs,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-extract_knowledge,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-knowledge_list,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-wrap_medium,
    ]
    data_cache_path: /leonardo_scratch/large/userexternal/shaldar0/MEGATRON_CACHE_DIR
    seq_length: 4096
    max_position_embeddings: 40960
    vocab_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/vocab.json
    merge_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/merges.txt
    num_workers: 8
    split: '99,1,0'
    legacy_tokenizer: True

    # MODEL: 131M active MoE model (downscaled version of Qwen3-30B-A3B)
    num_layers: 12 # reduced for testing
    hidden_size: 768
    num_attention_heads: 12
    num_query_groups: 4
    init_method_std: 0.02
    position_embedding_type: "rope"
    rotary_base: 1000000
    rotary_percent: 1.0
    normalization: RMSNorm
    norm_epsilon: 1.e-6
    qk_layernorm: True
    bf16: True
    swiglu: True
    untie_embeddings_and_output_weights: False
    use_flash_attn: True
    attention_softmax_in_fp32: False

    # MoE PARAMETERS
    num_experts: 8           # overridden by sweep
    moe_ffn_hidden_size: 384 # reduced for testing
    moe_router_load_balancing_type: "aux_loss"
    moe_router_topk: 2
    # moe-router-pre-softmax: false
    moe_grouped_gemm: True
    add_bias_linear: False
    moe_aux_loss_coeff: 1.e-3
    moe_token_dispatcher_type: "allgather"
    moe_router_dtype: "fp32"
    # moe-router-fusion: true
    moe_z_loss_coeff: null

    # regularization
    attention_dropout: 0.0
    hidden_dropout: 0.0

    # TRAINING, PARALLELISM
    recompute_activations: False
    use_torch_fsdp2: False
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    expert_model_parallel_size: 4
    context_parallel_size: 1
    sequence_parallel: True

    distributed_backend: nccl
    distributed_timeout_minutes: 10

    # DISTRIBUTED OPTIM
    use_distributed_optimizer: True

    # OPTIMIZER
    optimizer: adam
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.e-8
    clip_grad: 1.0
    weight_decay: 0.1

    # SCHEDULER
    min_lr: 1.e-05
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_warmup_iters: 50  # placeholder, overridden by sweep to 10% of train_iters

    # PROFILE
    profile: False
    use_pytorch_profiler: False
    profile_ranks: [0]
    profile_step_start: 5
    profile_step_end: 12

    # EVALS
    eval_interval: 100
    eval_iters: 100

    # LOGGING
    log_interval: 10
    log_progress: True
    log_throughput: True
    tensorboard_queue_size: 5
    log_timers_to_tensorboard: True

    # CHECKPOINT FORMAT
    ckpt_format: "torch_dist"
    save_interval: 1000
    save: ${job.base_output_dir}/checkpoints

    # Save exact checkpoints at each decay branching point (start_iter for each decay token budget)
    # Each element resolves to int(ceil(tokens / (seq_length * gbsz)) * 0.8)
    save_extra_steps:
      - "${oc.eval:'int(((10_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((50_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((70_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((100_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((130_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((200_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"

    # Base training configuration (for stable phase)
    micro_batch_size: 16
    global_batch_size: 64  # Will be overridden by sweep
    lr: 4.e-4              # Will be overridden by sweep

    # Auxiliary computation variables
    aux:
      tokens: 200_000_000  # Default: 200M tokens
      max_decay_tokens: 200_000_000  # largest decay budget; stable phase exits at this branching point
      decay_fraction: 0.0  # Default: no decay (overridden to cooldown_decay_fraction in decay stages)
      cooldown_decay_fraction: 0.2  # fraction of iters spent in LR decay during cooldown
      start_iter: 0
      start_iter_round: 0

slurm:
  sbatch:
    nodes: "${oc.eval:'int(${backend.megatron.global_batch_size}//(${backend.megatron.micro_batch_size}*${slurm.sbatch.gpus_per_node}))'}"

# COMPOSABLE SWEEP with PULL-BASED MULTI-STAGE
sweep:
  type: product

  groups:
    - type: list
      configs:
        - job.name: "moe_test_nexp_\\${backend.megatron.num_experts}_lr\\${backend.megatron.lr}_gbsz\\${backend.megatron.global_batch_size}_seed\\${backend.megatron.seed}_\\${stage}"
          backend.megatron.wandb_exp_name: "\\${job.name}"

    # GROUP 1: Hyperparameter configurations (1 lr × 1 batch sizes for simplicity)
    - type: list
      configs:
        - type: product
          params:
            backend.megatron.lr: [1.e-3]
            backend.megatron.global_batch_size: [128]

    # GROUP 2: Sparsity / num_experts (1 value for simplicity)
    - type: list
      configs:
        - backend.megatron.num_experts: 8

    # GROUP 3: Multi-stage training (stable + cooldown/decay)
    - type: list
      configs:
        # STABLE PHASE: Configured for full 200M tokens but exits early at the decay200MT branching point.
        # To resume training beyond that, remove/increase exit_interval and resubmit.
        - stage: stable

          backend.megatron.aux.tokens: 200_000_000
          backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
          backend.megatron.lr_wsd_decay_iters: 0
          backend.megatron.lr_warmup_iters: "\\${oc.eval:'int(0.1 * ((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})))'}"
          # Exit early at the decay200MT branching point = int(ceil(200M / (seq*gbsz)) * 0.8)
          backend.megatron.exit_interval: "\\${oc.eval:'int(((\\${backend.megatron.aux.max_decay_tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
          backend.megatron.aux.start_iter_round: "\\${oc.eval:'int(\\${backend.megatron.aux.start_iter}//\\${backend.megatron.save_interval})*\\${backend.megatron.save_interval}'}"

        # NESTED GROUP: Cooldown/decay stages with shared defaults
        - type: list
          defaults:
            backend.megatron.aux.decay_fraction: "\\${backend.megatron.aux.cooldown_decay_fraction}"

            backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
            backend.megatron.lr_wsd_decay_iters: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*\\${backend.megatron.aux.decay_fraction})'}"
            backend.megatron.lr_warmup_iters: "\\${oc.eval:'int(0.1 * ((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})))'}"
            backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
            backend.megatron.aux.start_iter_round: "\\${oc.eval:'int(\\${backend.megatron.aux.start_iter}//\\${backend.megatron.save_interval})*\\${backend.megatron.save_interval}'}"

            # Checkpoint loading configuration (uses exact start_iter)
            backend.megatron.load: "\\${sibling.stable.job.base_output_dir}/checkpoints"
            backend.megatron.ckpt_step: "\\${backend.megatron.aux.start_iter}"
            backend.megatron.override_opt_param_scheduler: true

            # Start conditions: wait for stable to reach the exact branching checkpoint
            job.start_condition:
              class_name: FileExistsCondition
              path: "\\${sibling.stable.job.base_output_dir}/checkpoints/iter_\\${oc.eval:'str(\\${backend.megatron.aux.start_iter}).zfill(7)'}"

            # Cancel conditions: cancel if stable job fails
            job.cancel_condition:
              class_name: LogPatternCondition
              log_path: "\\${sibling.stable.job.log_path_current}"
              pattern: "FATAL ERROR|OutOfMemoryError|Traceback"
          configs:
            - stage: decay10MT
              backend.megatron.aux.tokens: 10_000_000
            - stage: decay50MT
              backend.megatron.aux.tokens: 50_000_000
            - stage: decay70MT
              backend.megatron.aux.tokens: 70_000_000
            - stage: decay100MT
              backend.megatron.aux.tokens: 100_000_000
            - stage: decay130MT
              backend.megatron.aux.tokens: 130_000_000
            - stage: decay200MT
              backend.megatron.aux.tokens: 200_000_000

  # Filter: warmup must be < 30% of total training iterations
  filter: "\\${oc.eval:'\\${backend.megatron.lr_warmup_iters} / \\${backend.megatron.train_iters} < 0.3'}"


### Initial number of scripts/configurations
# 1 lr × 1 batch size × 1 num_experts × (1 stable + 6 decay) = 1 × 7 = 7 scripts (before filtering)
#
# Stable phase is configured for the full 200M tokens but exits early via exit_interval
# at the decay200MT branching point. To resume training past that, remove exit_interval.
#
# Warmup is 10% of train_iters → ratio is always 0.1 < 0.3 → no filtering → 7 total.
#
# Concrete values (gbsz=128, 200M tokens):
#   train_iters=382, warmup=38, exit_interval=305 (decay200MT branch)
#   save_extra_steps at [16, 76, 107, 152, 198, 305]
