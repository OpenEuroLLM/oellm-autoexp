# @package _global_

# 131M active MoE model (downscaled version of Qwen3-30B-A3B) training with pull-based multi-stage cooldown on Leonardo
# active params fixed by fixing topk to 2
# sparsity is varied by varying num_experts and hence total params

defaults:
  - /backend: megatron_torchrun
  - /container: leonardo
  - /slurm: leonardo
  - /job: default
  - /sweep: none
  - /backend/megatron: base
  - _self_

index: 0
stage: "" # overridden by sweep

# the sweep will vary num_experts, lr, and gbsz and may be seeds?
# the name contains only the sweep variables
job:
  name: "moe_abl_nexp_${backend.megatron.num_experts}_lr${backend.megatron.lr}_gbsz${backend.megatron.global_batch_size}_seed${backend.megatron.seed}_${stage}"
  base_output_dir: "results/moe_bsz_lr_sparsity_grid_A130M_120BT/${job.name}"

backend:
  megatron:
    wandb_exp_name: "${job.name}"
    wandb_project: moe-ablations
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    # DATA
    data_path: [
      # LUMI data
      /leonardo_work/OELLM_prod2026/datasets/Nemotron-cc-2024-HQ-LUMI-sample-318BT/high-all,
    ]
    data_cache_path: /leonardo_scratch/large/userexternal/shaldar0/MEGATRON_CACHE_DIR # megatron cache dir
    seq_length: 4096
    max_position_embeddings: 4096 # https://github.com/yanring/Megatron-MoE-ModelZoo/blob/main/model_configs/benchmarking/Qwen3-30B-A3B.yaml#L48 has 40960
    # still using old legacy tokenizer (gpt-neox-20b)
    vocab_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/vocab.json
    merge_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/merges.txt
    num_workers: 8
    split: '99,1,0'
    legacy_tokenizer: True

    # MODEL: 131M active MoE model (downscaled version of Qwen3-30B-A3B)
    num_layers: 18
    hidden_size: 768
    num_attention_heads: 12
    num_query_groups: 4
    init_method_std: 0.02
    position_embedding_type: "rope"
    rotary_base: 10000
    rotary_percent: 1.0
    normalization: RMSNorm
    norm_epsilon: 1.e-6 # rmsnorm epsilon
    qk_layernorm: True  # enable qk-norm
    bf16: True
    swiglu: True
    untie_embeddings_and_output_weights: False # tied embeddings
    use_flash_attn: True
    attention_softmax_in_fp32: False

    # MoE PARAMETERS
    num_experts: 8           # overridden by sweep
    moe_ffn_hidden_size: 768 # note that it is same as model hidden size
    moe_router_load_balancing_type: "aux_loss"
    moe_router_topk: 2
    moe_grouped_gemm: True
    add_bias_linear: False
    moe_aux_loss_coeff: 1.e-3
    moe_token_dispatcher_type: "allgather"
    moe_router_dtype: "fp32"
    moe_z_loss_coeff: null # disabled by default, do we need this?
    
    # regularization
    attention_dropout: 0.0
    hidden_dropout: 0.0

    # TRAINING, PARALLELISM
    recompute_activations: False
    use_torch_fsdp2: False # it's either this or the next 4 args
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    expert_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: True

    distributed_backend: nccl
    distributed_timeout_minutes: 60

    # DISTRIBUTED OPTIM
    use_distributed_optimizer: True

    # OPTIMIZER
    optimizer: adam
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.e-8
    clip_grad: 1.0
    weight_decay: 0.1

    # SCHEDULER
    min_lr: 1.e-05
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_warmup_iters: 2000  # Fixed to 2k steps

    # PROFILE
    profile: False
    use_pytorch_profiler: False
    profile_ranks: [0]
    profile_step_start: 5
    profile_step_end: 12

    # EVALS
    # Eval interval scales inversely with global batch size,
    # calibrated so that gbsz=1024 evals every 100 iterations.
    eval_interval: "${oc.eval:'int(102400 // ${backend.megatron.global_batch_size})'}"
    eval_iters: 100

    # LOGGING
    log_interval: 10
    log_progress: True
    log_throughput: True
    tensorboard_queue_size: 5
    log_timers_to_tensorboard: True

    # CHECKPOINT FORMAT
    ckpt_format: "torch_dist"
    # Checkpoint interval scales inversely with global batch size, calibrated so that gbsz=1024 saves every 500 iterations.
    # checkpoints are saved at a fixed token frequency (~2.1B tokens) regardless of batch size.
    save_interval: "${oc.eval:'512000 // ${backend.megatron.global_batch_size}'}"
    save: ${job.base_output_dir}/checkpoints

    # Save exact checkpoints at each decay branching point (start_iter for 80BT and 120BT)
    save_extra_steps:
      - "${oc.eval:'int(((80_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((120_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"

    # Base training configuration (for stable phase)
    micro_batch_size: 16
    global_batch_size: 64  # Will be overridden by sweep
    lr: 4.e-4              # Will be overridden by sweep
    seed: 1234

    # Auxiliary computation variables
    # Note: Computed fields (train_iters, lr_wsd_decay_iters, start_iter, start_iter_round)
    # are defined in the sweep defaults alongside the tokens they depend on,
    # so they get resolved together with stage-specific values
    aux:
      tokens: 300_000_000_000  # Default: 300B tokens
      max_decay_tokens: 120_000_000_000  # largest decay budget; stable phase exits at this branching point
      decay_fraction: 0.0  # Default: no decay (overridden to cooldown_decay_fraction in decay stages)
      cooldown_decay_fraction: 0.2  # fraction of iters spent in LR decay during cooldown
      start_iter: 0  # only used in decay
      start_iter_round: 0 # only used in decay

# time is 24 hours by default
slurm:
  sbatch:
    nodes: 4
    # nodes: "${oc.eval:'int(${backend.megatron.global_batch_size}//(${backend.megatron.micro_batch_size}*${slurm.sbatch.gpus_per_node}))'}"
    time: "24:00:00"
    # time: "00:30:00"

# COMPOSABLE SWEEP with PULL-BASED MULTI-STAGE
sweep:
  # Outer level: product (combines hyperparameters × stages)
  type: product

  groups:
    - type: list
      configs:
        - job.name: "moe_abl_nexp_\\${backend.megatron.num_experts}_lr\\${backend.megatron.lr}_gbsz\\${backend.megatron.global_batch_size}_seed\\${backend.megatron.seed}_\\${stage}"
          backend.megatron.wandb_exp_name: "\\${job.name}"
    
    # GROUP 1: Hyperparameter configurations (5 lr × 5 batch sizes)
    - type: list
      configs:
        - type: product
          params:
            backend.megatron.lr: [5.e-4, 1.e-3, 2.e-3, 4.e-3, 8.e-3]
            backend.megatron.global_batch_size: [512]

    # GROUP 2: Sparsity / num_experts
    # Each entry can carry per-expert overrides (e.g. higher expert parallelism) 4 values
    - type: list
      configs:
        - backend.megatron.num_experts: 8
        - backend.megatron.num_experts: 16
        - backend.megatron.num_experts: 32
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.micro_batch_size: 8
        - backend.megatron.num_experts: 64
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.micro_batch_size: 8

    # GROUP 3: Multi-stage training (stable + cooldown/decay)
    # Uses a nested structure with defaults for decay stages
    - type: list
      configs:
        # STABLE PHASE: Configured for full 300B tokens but exits early at the decay120BT branching point.
        # To resume training beyond 120BT, remove/increase exit_interval and resubmit.
        - stage: stable

          backend.megatron.aux.tokens: 300_000_000_000
          backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
          backend.megatron.lr_wsd_decay_iters: 0  # No decay in stable phase
          # Exit early at the decay120BT branching point = int(ceil(120B / (seq*gbsz)) * 0.8)
          backend.megatron.exit_interval: "\\${oc.eval:'int(((\\${backend.megatron.aux.max_decay_tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
          backend.megatron.aux.start_iter_round: "\\${oc.eval:'int(\\${backend.megatron.aux.start_iter}//\\${backend.megatron.save_interval})*\\${backend.megatron.save_interval}'}"

        # NESTED GROUP: Cooldown/decay stages with shared defaults
        # All decay stages share: 20% decay, checkpoint loading, start/cancel conditions
        - type: list
          defaults:
            # Common decay configuration
            backend.megatron.aux.decay_fraction: "\\${backend.megatron.aux.cooldown_decay_fraction}"

            # Computed fields using ESCAPED OmegaConf interpolations (\\$ prevents early resolution)
            # These will be unescaped during sweep expansion and resolved with stage-specific values (80B, 120B)
            # Each computation is self-contained (doesn't reference other computed values) to avoid ordering issues
            backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
            backend.megatron.lr_wsd_decay_iters: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*\\${backend.megatron.aux.decay_fraction})'}"
            backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
            backend.megatron.aux.start_iter_round: "\\${oc.eval:'int(\\${backend.megatron.aux.start_iter}//\\${backend.megatron.save_interval})*\\${backend.megatron.save_interval}'}"

            # Checkpoint loading configuration (uses exact start_iter since save_extra_steps saves at these iterations)
            backend.megatron.load: "\\${sibling.stable.job.base_output_dir}/checkpoints"
            backend.megatron.ckpt_step: "\\${backend.megatron.aux.start_iter}" # it was start_iter_round before
            backend.megatron.override_opt_param_scheduler: true

            # Start conditions: wait for stable to reach the exact branching checkpoint
            job.start_condition:
              class_name: FileExistsCondition
              path: "\\${sibling.stable.job.base_output_dir}/checkpoints/iter_\\${oc.eval:'str(\\${backend.megatron.aux.start_iter}).zfill(7)'}" # it was start_iter_round before but now it is start_iter

            # Cancel conditions: cancel if stable job fails
            job.cancel_condition:
              class_name: LogPatternCondition
              log_path: "\\${sibling.stable.job.log_path_current}"
              pattern: "FATAL ERROR|OutOfMemoryError|Traceback"
          configs:
            - stage: decay80BT
              backend.megatron.aux.tokens: 80_000_000_000
            - stage: decay120BT
              backend.megatron.aux.tokens: 120_000_000_000
  
  # Filter out runs in which the warmup iters take more than 30% of total training iterations & explore 
  # small gbsz (16) only up to and incl. 100MT.
  # The stable stage is always kept (when warmup check passes) because decay stages depend on it.
  filter: "\\${oc.eval:'\\${backend.megatron.lr_warmup_iters} / \\${backend.megatron.train_iters} < 0.3 and (\"\\${stage}\" == \"stable\" or \\${backend.megatron.aux.tokens} <= 100_000_000 or \\${backend.megatron.global_batch_size} >= 32)'}"


### Initial number of scripts/configurations
# 5 lr × 5 batch sizes × 4 num_experts × (1 stable + 2 decay) = 300 scripts (before filtering)
# Stable phase is configured for the full 300B tokens but exits early via exit_interval
# at the decay120BT branching point. To resume training past 120BT, remove exit_interval.
# E.g. gbsz=64:   train_iters=1,144,410 (300B), exit_interval=366,211 (120BT branch)
#      gbsz=1024:  train_iters=71,526 (300B),     exit_interval=22,888 (120BT branch)
# Formulae (seq_length=4096, cooldown_decay_fraction=0.2):
#   train_iters = ceil(tokens / (seq*gbsz))
#   exit_interval = ceil(120B / (seq*gbsz)) * 0.8  (stable exits at 120BT branching point)
#   save_extra_steps = [ceil(80B/(seq*gbsz))*0.8, ceil(120B/(seq*gbsz))*0.8]
#
# train_iters (300B) and save_extra_steps [80BT, 120BT] by batch size:
#   gbsz=64:   train_iters=1,144,410  exit_interval=366,211  save_extra_steps=[244,140, 366,211]
#   gbsz=128:  train_iters=572,205    exit_interval=183,105  save_extra_steps=[122,070, 183,105]
#   gbsz=256:  train_iters=286,103    exit_interval=91,552   save_extra_steps=[61,035,  91,552]
#   gbsz=512:  train_iters=143,051    exit_interval=45,776   save_extra_steps=[30,517,  45,776]
#   gbsz=1024: train_iters=71,526     exit_interval=22,888   save_extra_steps=[15,259,  22,888]
#
# With lr_warmup_iters=2000, the worst case is decay80BT with gbsz=1024:
# train_iters=19,074 → 2000/19074=0.105 < 0.3 → passes. No configs are filtered → 300 total.