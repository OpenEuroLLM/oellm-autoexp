# @package _global_

# 9B dense Qwen3-like model training

defaults:
  - /backend: megatron_torchrun
  - /container: leonardo
  - /slurm: leonardo
  - /job: default
  - /sweep: none
  - /backend/megatron: base
  - /backend/megatron/baby/models: qwen3_dense_9b
  - /backend/megatron/baby/data: oellm_256k_10TT_leonardo_train
  - _self_

index: 0
stage: ""

job:
  name: "qwen3-9b-baby-run"
  base_output_dir: /leonardo_work/OELLM_prod2026/production-training/${job.name}/

backend:
  megatron:
    wandb_project: qwen3-9b-baby-run
    data_cache_path: ${job.base_output_dir}/cache

    train_iters: 2265953 # Check! 1 epoch: 9.5T tokens / (seq_len 4096 × gbs 1024)

    micro_batch_size: 1
    global_batch_size: 2048

    rotary_base: 100000

    save_interval: "${oc.eval:'int(512000 // ${backend.megatron.global_batch_size})'}"
    save: ${job.base_output_dir}/checkpoints
    load: ${.save}

slurm:
  sbatch:
    nodes: 1
    time: "00:30:00"
    # qos: boost_qos_dbg for debugging, qos_oellm for production
