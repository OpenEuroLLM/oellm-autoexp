# @package _global_
#
# qwen3-1.7B-Base pretraining on MixtureVitae-v1 (300B tokens).
# 64 nodes (256 GH200 GPUs) on Jupiter; training schedule mirrors
# opensci_ref_1.7b_mixvitae_jupiter.yaml. Auto-restart (state_events) and a
# finish_condition are enabled so the run resumes across node failures.

defaults:
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /job: default
  - /sweep: none
  - /backend/megatron: [base, qwen3_base, qwen3_1.7B, data_mixturevitae]
  - /postprocess: [ckpt_dist_to_torch_opensci, ckpt_convert_qwen3, eval_opensci]
  - _self_

index: 0
stage: "all"

job:
  name: "qwen3_1.7b_MixtureVitae_300B"
  base_output_dir: ${oc.env:OUTPUT_DIR}/${.name}

  state_events:
    - class_name: StateEvent
      transition: ["RUNNING", "FAILED"]
      action:
        class_name: RestartAction
  finish_condition:
    class_name: LogPatternCondition
    log_path: "${job.log_path_current}"
    pattern: "after training is done"

backend:
  megatron:
    # Training schedule (300B tokens)
    lr: 0.004
    global_batch_size: 1024
    micro_batch_size: 4
    train_iters: 71526           # ceil(300B / (4096 * 1024))
    lr_warmup_iters: 25000
    lr_decay_iters: 71526
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_wsd_decay_iters: 14305    # 1/5 of train_iters (cooldown)
    min_lr: 0.0
    weight_decay: 0.05
    adam_beta2: 0.95
    clip_grad: 1.0
    override_opt_param_scheduler: true
    accumulate_allreduce_grads_in_fp32: false

    bf16: true
    use_flash_attn: true
    seq_length: 4096

    tokenizer_type: HuggingFaceTokenizer
    tokenizer_model: /e/data1/datasets/playground/mmlaion/shared/oellm_shared_evals/models/Qwen/Qwen3-1.7B-Base
    vocab_size: 151936
    legacy_tokenizer: false
    split: "989,10,1"
    num_workers: 4

    # TODO: expand to the full set of MixtureVitae-v1-32k_packed (Qwen-tokenized)
    # shards before launching the 300B-token run. The two shards below are a
    # placeholder/test subset and are NOT enough data for a real fullrun.
    data_path:
      - /e/data1/datasets/playground/mmlaion/shared/tokenized_data/MixtureVitae-v1-32k_packed/business/business-0_text_document
      - /e/data1/datasets/playground/mmlaion/shared/tokenized_data/MixtureVitae-v1-32k_packed/fineweb/fineweb-0_text_document

    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    sequence_parallel: true

    distributed_backend: nccl
    use_distributed_optimizer: true
    overlap_param_gather: true
    overlap_grad_reduce: true
    recompute_activations: true

    ckpt_format: torch_dist
    ckpt_convert_format: torch
    ckpt_convert_save: ${job.base_output_dir}
    ckpt_fully_parallel_save: false
    async_save: false
    save_interval: 2000
    save: ${job.base_output_dir}
    load: ${job.base_output_dir}

    log_interval: 50
    log_throughput: true
    tensorboard_dir: ${job.base_output_dir}/tensorboard
    eval_interval: 71526
    eval_iters: 1
    ckpt_step: ${backend.megatron.train_iters}

    aux:
      model_name: "qwen3-1.7B"
      dataset: mixturevitae
      tokens: 300_000_000_000

slurm:
  env:
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
  sbatch:
    nodes: 64
    time: "12:00:00"
    account: reformo
