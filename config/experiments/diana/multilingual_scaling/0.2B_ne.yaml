# @package _global_

# 0.2B NE dense Qwen3-like model training with pull-based multi-stage cooldown on Leonardo
# Configuration from: https://docs.google.com/spreadsheets/d/17LXPs6O9_6cL7P2KVEJF8LTy5zhy0qLNXEVGRCYOzhY/edit?gid=0#gid=0

defaults:
  - /backend: megatron_torchrun
  - /container: marenostrum
  - /slurm: marenostrum
  - /job: auto_restart
  - /sweep: none
  - /backend/megatron: base
  - /experiments/diana/models: dense_qwen3_0.2B_ne # model configs
  - /experiments/diana/data: oellm_256k # data configs
  - _self_

index: 0
stage: ""

job:
  name: "" # Will be overridden by sweep with stage and hyperparameter info
  base_output_dir: "outputs/multilingual_scaling/dense_qwen3_0.2B_ne/training/${job.name}"

backend:
  megatron:
    wandb_exp_name: "" # Will be overridden by sweep with stage and hyperparameter info
    wandb_project: dense_multilingual_scaling
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    # DATA
    data_cache_path: /gpfs/projects/ehpc533/users/diana/MEGATRON_262k

    # Base training configuration (for stable phase)
    micro_batch_size: 8
    global_batch_size: 64  # Will be overridden by sweep
    lr: 5.e-4  # Will be overridden by sweep

slurm:
  sbatch:
    nodes: "${oc.eval:'int(${backend.megatron.global_batch_size}//(${backend.megatron.micro_batch_size}*${slurm.sbatch.gpus_per_node}))'}"
    qos: acc_ehpc
    account: ehpc715
    time: "72:00:00"

# COMPOSABLE SWEEP with PULL-BASED MULTI-STAGE
sweep:
  # Outer level: product (combines hyperparameters × stages)
  type: product

  groups:
    - type: list
      configs:
        - job.name: "dense_qwen3_0.2B_ne_lr\\${backend.megatron.lr}_gbsz\\${backend.megatron.global_batch_size}_\\${stage}"
          backend.megatron.wandb_exp_name: "\\${job.name}"
    
    # GROUP 1: Hyperparameter configurations (list of two product grids)
    - type: list
      configs:
        # Grid 1: XX configurations (X lr × X batch sizes)
        - type: product
          params:
            ##### TO DO: Still have to be configured
            backend.megatron.lr: [1.e-3]
            backend.megatron.global_batch_size: [128]
            # backend.megatron.lr: [5.e-4, 1.e-3, 2.e-3, 4.e-3, 8.e-3]
            # backend.megatron.global_batch_size: [16, 32, 64, 128, 256, 512, 1024]

    # GROUP 2: Multi-stage training (stable + cooldown/decay)
    # Uses a nested structure with defaults for decay stages
    - type: list
      configs:
        # STABLE PHASE: Train for 300B tokens with no decay
        - stage: stable300BT

          backend.megatron.aux.tokens: 300_000_000_000
          # Computed fields using ESCAPED OmegaConf interpolations (\\$ prevents early resolution)
          # These will be unescaped during sweep expansion and resolved with stage-specific values
          backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
          backend.megatron.lr_wsd_decay_iters: 0  # No decay in stable phase
          backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
          
# Save checkpoints at the two decay branching points (6B, 12B)
          backend.megatron.aux.save_step_0: "\\${oc.eval:'int(((6_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_1: "\\${oc.eval:'int(((12_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_2: "\\${oc.eval:'int(((20_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_3: "\\${oc.eval:'int(((30_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}" 
          backend.megatron.aux.save_step_4: "\\${oc.eval:'int(((50_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_5: "\\${oc.eval:'int(((80_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_6: "\\${oc.eval:'int(((120_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_7: "\\${oc.eval:'int(((200_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_8: "\\${oc.eval:'int(((300_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"

        # NESTED GROUP: Cooldown/decay stages with shared defaults
        # All decay stages share: 20% decay, checkpoint loading, start/cancel conditions
        - type: list
          defaults:
            # Common decay configuration
            backend.megatron.aux.decay_fraction: 0.2

            # Computed fields using ESCAPED OmegaConf interpolations (\\$ prevents early resolution)
            # These will be unescaped during sweep expansion and resolved with stage-specific values (6B, 12B, 30B, 50B, 80B, 120B, 200B, 300B tokens)
            # Each computation is self-contained (doesn't reference other computed values) to avoid ordering issues
            backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
            backend.megatron.lr_wsd_decay_iters: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*\\${backend.megatron.aux.decay_fraction})'}"
            backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"

            # Checkpoint loading configuration
            backend.megatron.load: "\\${sibling.stable300BT.job.base_output_dir}/checkpoints"
            backend.megatron.ckpt_step: "\\${backend.megatron.aux.start_iter}"
            backend.megatron.override_opt_param_scheduler: true

            # Start conditions: wait for stable to reach checkpoint (new async approach)
            job.start_condition:
              class_name: FileExistsCondition
              path: "\\${sibling.stable300BT.job.base_output_dir}/checkpoints/iter_\\${oc.eval:'str(\\${backend.megatron.aux.start_iter}).zfill(7)'}"

            # Cancel conditions: cancel if stable job fails
            job.cancel_condition:
              class_name: LogPatternCondition
              log_path: "\\${sibling.stable300BT.job.log_path_current}"
              pattern: "FATAL ERROR|OutOfMemoryError|Traceback"
          configs:
            # Each decay stage only needs to specify its unique stage and tokens
            - stage: decay6BT
              backend.megatron.aux.tokens: 6_000_000_000
            - stage: decay12BT
              backend.megatron.aux.tokens: 12_000_000_000
            - stage: decay20BT
              backend.megatron.aux.tokens: 20_000_000_000
            - stage: decay30BT
              backend.megatron.aux.tokens: 30_000_000_000
            - stage: decay50BT
              backend.megatron.aux.tokens: 50_000_000_000
            - stage: decay80BT
              backend.megatron.aux.tokens: 80_000_000_000
            - stage: decay120BT
              backend.megatron.aux.tokens: 120_000_000_000
            - stage: decay200BT
              backend.megatron.aux.tokens: 200_000_000_000
            - stage: decay300BT
              backend.megatron.aux.tokens: 300_000_000_000
  
  # Filter out runs in which the warmup iters take more than 30% of total training iterations.
  filter: "\\${oc.eval:'\\${backend.megatron.lr_warmup_iters} / \\${backend.megatron.train_iters} < 0.3'}"

