# @package _global_

# 150M dense model training with pull-based multi-stage cooldown
# Translation of dense_150M_50BT.yaml to new composable sweep system

defaults:
  - /backend: megatron_torchrun
  - /container: leonardo
  - /slurm: leonardo
  - /job: auto_restart
  - /sweep: none
  - /backend/megatron: base
  - _self_

index: 0
stage: ""

job:
  name: "dense_150M_lr${backend.megatron.lr}_gbsz${backend.megatron.global_batch_size}_beta2${backend.megatron.adam_beta2}"
  base_output_dir: "results/tests/dense_Sampo_Qwen_150M/${job.name}"
  # resume: true

backend:
  megatron:
    wandb_exp_name: "${job.name}"
    wandb_project: sanity-checks
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    # DATA
    train_data_path: [
      /leonardo_work/OELLM_prod2026/datasets/Nemotron-cc-2024-HQ-LUMI-sample-318BT/high-all,
    ]
    valid_data_path: [
      /leonardo_work/OELLM_prod2026/datasets/Nemotron-cc-2024-HQ-LUMI-sample-valid/high-all,
    ]

    data_cache_path: /leonardo_scratch/large/userexternal/donutu00/MEGATRON_CACHEDIR
    seq_length: 4096
    max_position_embeddings: 4096
    vocab_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/vocab.json
    merge_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/merges.txt
    num_workers: 8
    # split: '99,1,0'
    legacy_tokenizer: True

    # MODEL: 150M
    num_layers: 16
    hidden_size: 512
    ffn_hidden_size: 1536
    num_attention_heads: 8
    num_query_groups: ${.num_attention_heads}
    kv_channels: 128
    init_method_std: 0.02
    position_embedding_type: "rope"
    rotary_base: 10000
    rotary_percent: 1.0
    attention_dropout: 0.0
    hidden_dropout: 0.0
    normalization: RMSNorm
    norm_epsilon: 1.e-5
    qk_layernorm: True
    bf16: True
    swiglu: True
    untie_embeddings_and_output_weights: False
    use_flash_attn: True
    attention_softmax_in_fp32: True  # different
    add_bias_linear: False   # different than opensci

    # TRAINING, PARALLELISM
    recompute_activations: False
    use_torch_fsdp2: False
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: True

    distributed_backend: nccl
    distributed_timeout_minutes: 10

    # DISTRIBUTED OPTIM
    use_distributed_optimizer: True

    # OPTIMIZER
    optimizer: adam
    adam_beta1: 0.9
    adam_beta2: 0.95 # different than opensci
    adam_eps: 1.e-8
    clip_grad: 1.0
    weight_decay: 0.05  # different than opensci

    # SCHEDULER
    min_lr: 0
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_warmup_iters: 2000

    # PROFILE
    profile: False
    use_pytorch_profiler: False
    profile_ranks: [0]
    profile_step_start: 5
    profile_step_end: 12

    # EVALS
    eval_interval: 2000
    eval_iters: 100

    # LOGGING
    log_interval: 10
    log_progress: True
    log_throughput: True
    tensorboard_queue_size: 5
    log_timers_to_tensorboard: True

    # CHECKPOINT FORMAT
    ckpt_format: "torch_dist"
    save_interval: 2000
    save: ${job.base_output_dir}/checkpoints


    # Base training configuration
    train_iters: 114441
    lr_wsd_decay_iters: 22888
    lr_decay_iters: 114441

    micro_batch_size: 16
    global_batch_size: 256 
    lr: 4.e-3  

slurm:
  sbatch:
    nodes: "${oc.eval:'int(${backend.megatron.global_batch_size}//(${backend.megatron.micro_batch_size}*${slurm.sbatch.gpus_per_node}))'}"
