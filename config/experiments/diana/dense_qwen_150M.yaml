# @package _global_

# 150M dense Qwen3 model training with pull-based multi-stage cooldown on Leonardo
# Configuration from 150M (gpt-oss reduced): https://docs.google.com/spreadsheets/d/129mvSQ2K3m_hLaH2zk8R2Zr1-RsFyhTphXyN_ErSWFs/edit?gid=1329178961#gid=1329178961

defaults:
  - /backend: megatron_torchrun
  - /container: leonardo
  - /slurm: leonardo
  - /job: default
  - /sweep: none
  - /backend/megatron: base
  - _self_

index: 0
stage: ""

job:
  name: "dense_qwen3_150M_gpt_oss_lr${backend.megatron.lr}_gbsz${backend.megatron.global_batch_size}_beta2${backend.megatron.adam_beta2}_${stage}"
  base_output_dir: "results/qwen3_gpt_oss/${job.name}"

backend:
  megatron:
    wandb_exp_name: "${job.name}"
    wandb_project: qwen3_experiments
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    # DATA
    ## TO DO, adjust to tokenized dataset path
    data_path: [
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-actual,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-distill,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-diverse_qa_pairs,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-extract_knowledge,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-knowledge_list,
      /leonardo_work/OELLM_prod2026/preprocessed/gpt-neox-20b/nemotron-cc/1.0/high-synthetic-wrap_medium
    ]
    data_cache_path: /leonardo_scratch/large/userexternal/donutu00/MEGATRON_CACHEDIR
    seq_length: 4096
    max_position_embeddings: 4096
    
    ## TO DO, adjust with tokenizer path
    vocab_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/vocab.json
    merge_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/merges.txt
    num_workers: 8
    split: '99,1,0'
    legacy_tokenizer: True

    # MODEL: 150M
    num_layers: 16
    hidden_size: 512
    ffn_hidden_size: 1536
    num_attention_heads: 8
    num_query_groups: 4
    init_method_std: 0.02
    position_embedding_type: "rope"
    rotary_base: 10000
    rotary_percent: 1.0
    attention_dropout: 0.0
    hidden_dropout: 0.0
    normalization: RMSNorm
    norm_epsilon: 1.e-5 # rmsnorm epsilon
    qk_layernorm: True # enable qk-norm
    bf16: True
    swiglu: True
    untie_embeddings_and_output_weights: False
    use_flash_attn: True
    attention_softmax_in_fp32: False # OpenSci style
    add_bias_linear: False


    # TRAINING, PARALLELISM
    recompute_activations: False
    use_torch_fsdp2: False # it's either this or the next 4 args
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: True

    distributed_backend: nccl
    distributed_timeout_minutes: 10

    # DISTRIBUTED OPTIM
    use_distributed_optimizer: True

    # OPTIMIZER
    optimizer: adam
    adam_beta1: 0.9
    adam_beta2: 0.99 # 0.99 for models up to 150M, then 0.95
    adam_eps: 1.e-8
    clip_grad: 1.0
    weight_decay: 0.1

    # SCHEDULER
    min_lr: 1.e-05
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_warmup_iters: 2000 # Fixed for all.

    # PROFILE
    profile: False
    use_pytorch_profiler: False
    profile_ranks: [0]
    profile_step_start: 5
    profile_step_end: 12

    # EVALS
    # Eval interval scales inversely with global batch size,
    # calibrated so that gbsz=1024 evals every 200 iterations.
    eval_interval: "${oc.eval:'int(204800 // ${backend.megatron.global_batch_size})'}"
    eval_iters: 100

    # LOGGING
    log_interval: 10
    log_progress: True
    log_throughput: True
    tensorboard_queue_size: 5
    log_timers_to_tensorboard: True

    # CHECKPOINT FORMAT
    ckpt_format: "torch_dist"
    # Checkpoint interval scales inversely with global batch size,
    # calibrated so that gbsz=1024 saves every 500 iterations.
    save_interval: "${oc.eval:'int(512000 // ${backend.megatron.global_batch_size})'}"
    save: ${job.base_output_dir}/checkpoints

    # Save exact checkpoints at each decay branching point (start_iter for each decay token budget)
    # Each element resolves to int(ceil(tokens / (seq_length * gbsz)) * 0.8)
    save_extra_steps:
      - "${oc.eval:'int(((6_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((12_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((20_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((30_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((50_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((80_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((120_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((200_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"
      - "${oc.eval:'int(((300_000_000_000 + ${backend.megatron.seq_length}*${backend.megatron.global_batch_size} - 1) // (${backend.megatron.seq_length}*${backend.megatron.global_batch_size})) * (1 - ${backend.megatron.aux.cooldown_decay_fraction}))'}"

    # Base training configuration (for stable phase)
    micro_batch_size: 8
    global_batch_size: 64  # Will be overridden by sweep
    lr: 5.e-4  # Will be overridden by sweep

    # Auxiliary computation variables
    # Note: Computed fields (train_iters, lr_wsd_decay_iters, start_iter, start_iter_round)
    # are defined in the sweep defaults alongside the tokens they depend on,
    # so they get resolved together with stage-specific values
    aux:
      tokens: 300_000_000_000  # Default: 300B tokens
      decay_fraction: 0.0  # Default: no decay
      start_iter: 0  # only used in decay
      start_iter_round: 0 # only used in decay
      cooldown_decay_fraction: 0.2  # fraction of iters spent in LR decay during cooldown

slurm:
  sbatch:
    nodes: "${oc.eval:'int(${backend.megatron.global_batch_size}//(${backend.megatron.micro_batch_size}*${slurm.sbatch.gpus_per_node}))'}"

# COMPOSABLE SWEEP with PULL-BASED MULTI-STAGE
sweep:
  type: product

  groups:
    - type: list
      configs:
        - job.name: "dense_qwen3_150M_gpt_oss_lr\\${backend.megatron.lr}_gbsz\\${backend.megatron.global_batch_size}_beta2\\${backend.megatron.adam_beta2}_\\${stage}"
          backend.megatron.wandb_exp_name: "\\${job.name}"

    # Multi-stage training (stable + cooldown/decay)
    # Uses a nested structure with defaults for decay stages
    - type: list
      configs:
        # STABLE PHASE: Train for 300B tokens with no decay
        - stage: stable

          backend.megatron.aux.tokens: 20_000_000_000
          # Computed fields using ESCAPED OmegaConf interpolations (\\$ prevents early resolution)
          # These will be unescaped during sweep expansion and resolved with stage-specific values
          backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
          backend.megatron.lr_wsd_decay_iters: 0  # No decay in stable phase
          backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
          backend.megatron.aux.start_iter_round: "\\${oc.eval:'int(\\${backend.megatron.aux.start_iter}//\\${backend.megatron.save_interval})*\\${backend.megatron.save_interval}'}"

        # NESTED GROUP: Cooldown/decay stages with shared defaults
        # All decay stages share: 20% decay, checkpoint loading, start/cancel conditions
        - type: list
          defaults:
            # Common decay configuration
            backend.megatron.aux.decay_fraction: 0.2

            # Computed fields using ESCAPED OmegaConf interpolations (\\$ prevents early resolution)
            # These will be unescaped during sweep expansion and resolved with stage-specific values (6B, 12B, 30B, 50B)
            # Each computation is self-contained (doesn't reference other computed values) to avoid ordering issues
            backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
            backend.megatron.lr_wsd_decay_iters: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*\\${backend.megatron.aux.decay_fraction})'}"
            backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
            backend.megatron.aux.start_iter_round: "\\${oc.eval:'int(\\${backend.megatron.aux.start_iter}//\\${backend.megatron.save_interval})*\\${backend.megatron.save_interval}'}"

            # Checkpoint loading configuration
            backend.megatron.load: "\\${sibling.stable.job.base_output_dir}/checkpoints"
            backend.megatron.ckpt_step: "\\${backend.megatron.aux.start_iter_round}"
            backend.megatron.override_opt_param_scheduler: true

            # Start conditions: wait for stable to reach checkpoint (new async approach)
            job.start_condition:
              class_name: FileExistsCondition
              # path: "\\${sibling.stable.job.base_output_dir}/checkpoints/iter_\\${backend.megatron.aux.start_iter_round}"
              path: "\\${sibling.stable.job.base_output_dir}/checkpoints/iter_\\${oc.eval:'str(\\${backend.megatron.aux.start_iter_round}).zfill(7)'}"

            # Cancel conditions: cancel if stable job fails
            job.cancel_condition:
              class_name: LogPatternCondition
              log_path: "\\${sibling.stable.job.log_path_current}"
              pattern: "FATAL ERROR|OutOfMemoryError|Traceback"
          configs:
            # Each decay stage only needs to specify its unique stage and tokens
            - stage: decay6BT
              backend.megatron.aux.tokens: 6_000_000_000
              backend.megatron.lr: 2.e-3
              backend.megatron.global_batch_size: 32
            - stage: decay12BT
              backend.megatron.aux.tokens: 12_000_000_000
              backend.megatron.lr: 2.e-3
              backend.megatron.global_batch_size: 64
            - stage: decay20BT
              backend.megatron.aux.tokens: 20_000_000_000
              backend.megatron.lr: 2.e-3
              backend.megatron.global_batch_size: 64
            - stage: decay30BT
              backend.megatron.aux.tokens: 30_000_000_000
              backend.megatron.lr: 2.e-3
              backend.megatron.global_batch_size: 64
            - stage: decay50BT
              backend.megatron.aux.tokens: 50_000_000_000
              backend.megatron.lr: 2.e-3
              backend.megatron.global_batch_size: 64
            - stage: decay80BT
              backend.megatron.aux.tokens: 80_000_000_000
              backend.megatron.lr: 4.e-3
              backend.megatron.global_batch_size: 256
            - stage: decay120BT
              backend.megatron.aux.tokens: 120_000_000_000
              backend.megatron.lr: 4.e-3
              backend.megatron.global_batch_size: 256
            - stage: decay200BT
              backend.megatron.aux.tokens: 200_000_000_000
              backend.megatron.lr: 4.e-3
              backend.megatron.global_batch_size: 256
            - stage: decay300BT
              backend.megatron.aux.tokens: 300_000_000_000
              backend.megatron.lr: 4.e-3
              backend.megatron.global_batch_size: 256
  
  # Filter out runs in which the warmup iters take more than 30% of total training iterations & explore 
  # small gbsz (16, 32) only up to and incl. 50BT, otherwise training will take an enourmous amount of iters
  # The stable stage is always kept (when warmup check passes) because decay stages depend on it.
  filter: "\\${oc.eval:'\\${backend.megatron.lr_warmup_iters} / \\${backend.megatron.train_iters} < 0.3 and (\"\\${stage}\" == \"stable\" or \\${backend.megatron.aux.tokens} <= 50_000_000_000 or \\${backend.megatron.global_batch_size} >= 64)'}"
