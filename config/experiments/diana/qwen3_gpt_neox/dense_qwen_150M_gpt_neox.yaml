# @package _global_

# 150M dense Qwen3 model training with pull-based multi-stage cooldown on Leonardo
# Configuration from 150M (gpt-oss reduced): https://docs.google.com/spreadsheets/d/129mvSQ2K3m_hLaH2zk8R2Zr1-RsFyhTphXyN_ErSWFs/edit?gid=1329178961#gid=1329178961

defaults:
  - /backend: megatron_torchrun
  - /container: leonardo
  - /slurm: leonardo
  - /job: auto_restart
  - /sweep: none
  - /backend/megatron: base
  - _self_

index: 0
stage: ""

job:
  name: "dense_qwen3_150M_gpt_neox_lr${backend.megatron.lr}_gbsz${backend.megatron.global_batch_size}_beta2${backend.megatron.adam_beta2}_${stage}"
  base_output_dir: "results/qwen3_150M_gpt_neox/${job.name}"

backend:
  megatron:
    wandb_exp_name: "${job.name}"
    wandb_project: qwen3_experiments
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    # DATA
    data_path: [
      /leonardo_work/OELLM_prod2026/datasets/Nemotron-cc-2024-HQ-LUMI-sample-318BT/high-all,
    ]
    data_cache_path: /leonardo_scratch/large/userexternal/donutu00/MEGATRON_CACHEDIR
    seq_length: 4096
    max_position_embeddings: 4096

    vocab_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/vocab.json
    merge_file: /leonardo_work/OELLM_prod2026/models/EleutherAI/gpt-neox-20b/merges.txt
    num_workers: 8
    split: '99,1,0'
    legacy_tokenizer: True

    # MODEL: 150M
    num_layers: 16
    hidden_size: 512
    ffn_hidden_size: 1536
    num_attention_heads: 8
    num_query_groups: 4
    group_query_attention: True
    init_method_std: 0.02
    position_embedding_type: "rope"
    rotary_base: 10000
    rotary_percent: 1.0
    attention_dropout: 0.0
    hidden_dropout: 0.0
    normalization: RMSNorm
    norm_epsilon: 1.e-5 # rmsnorm epsilon
    qk_layernorm: True # enable qk-norm
    bf16: True
    swiglu: True
    untie_embeddings_and_output_weights: False
    use_flash_attn: True
    attention_softmax_in_fp32: False # OpenSci style
    add_bias_linear: False


    # TRAINING, PARALLELISM
    recompute_activations: False
    use_torch_fsdp2: False # it's either this or the next 4 args
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: True

    distributed_backend: nccl
    distributed_timeout_minutes: 10

    # DISTRIBUTED OPTIM
    use_distributed_optimizer: True

    # OPTIMIZER
    optimizer: adam
    adam_beta1: 0.9
    adam_beta2: 0.99 # 0.99 for models up to 150M, then 0.95
    adam_eps: 1.e-8
    clip_grad: 1.0
    weight_decay: 0.1

    # SCHEDULER
    min_lr: 1.e-05
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_warmup_iters: 2000 # Fixed for all.

    # PROFILE
    profile: False
    use_pytorch_profiler: False
    profile_ranks: [0]
    profile_step_start: 5
    profile_step_end: 12

    # EVALS
    # Eval interval scales inversely with global batch size,
    # calibrated so that gbsz=1024 evals every 200 iterations.
    eval_interval: "${oc.eval:'int(204800 // ${backend.megatron.global_batch_size})'}"
    eval_iters: 100

    # LOGGING
    log_interval: 10
    log_progress: True
    log_throughput: True
    tensorboard_queue_size: 5
    log_timers_to_tensorboard: True

    # CHECKPOINT FORMAT
    ckpt_format: "torch_dist"
    # Checkpoint interval scales inversely with global batch size,
    # calibrated so that gbsz=1024 saves every 500 iterations.
    save_interval: "${oc.eval:'int(512000 // ${backend.megatron.global_batch_size})'}"
    save: ${job.base_output_dir}/checkpoints

    # Extra checkpoints at decay branching points.
    # References aux.save_step_* scalars, which are overridden per stable phase in the sweep.
    # Scalar overrides avoid Hydra's list-override parser which can't handle oc.eval expressions.
    # Unused slots default to 999_999_999 (a sentinel that is never reached).
    save_extra_steps:
      - "${backend.megatron.aux.save_step_0}"
      - "${backend.megatron.aux.save_step_1}"
      - "${backend.megatron.aux.save_step_2}"
      - "${backend.megatron.aux.save_step_3}"

    # Base training configuration (for stable phase)
    micro_batch_size: 8
    global_batch_size: 64  # Will be overridden by sweep
    lr: 5.e-4  # Will be overridden by sweep

    # Auxiliary computation variables
    # Note: Computed fields (train_iters, lr_wsd_decay_iters, start_iter)
    # are defined in the sweep defaults alongside the tokens they depend on,
    # so they get resolved together with stage-specific values
    aux:
      tokens: 300_000_000_000  # Default: 300B tokens
      decay_fraction: 0.0  # Default: no decay
      start_iter: 0  # only used in decay
      cooldown_decay_fraction: 0.2  # fraction of iters spent in LR decay during cooldown
      # Decay branching checkpoints: overridden per stable phase in the sweep.
      # Sentinel 999_999_999 is never reached, so unused slots produce no extra saves.
      save_step_0: 999_999_999
      save_step_1: 999_999_999
      save_step_2: 999_999_999
      save_step_3: 999_999_999

slurm:
  sbatch:
    nodes: "${oc.eval:'int(${backend.megatron.global_batch_size}//(${backend.megatron.micro_batch_size}*${slurm.sbatch.gpus_per_node}))'}"

# COMPOSABLE SWEEP with PULL-BASED MULTI-STAGE
# Three hyperparameter groups sharing stable runs:
#   Group 1: gbsz=32,  lr=0.001  →  12B stable  → decay at 6B, 12B
#   Group 2: gbsz=128, lr=0.002  →  80B stable  → decay at 20B, 30B, 50B, 80B
#   Group 3: gbsz=256, lr=0.002  → 300B stable  → decay at 120B, 200B, 300B
sweep:
  type: product

  groups:
    - type: list
      configs:
        - job.name: "dense_qwen3_150M_gpt_neox_lr\\${backend.megatron.lr}_gbsz\\${backend.megatron.global_batch_size}_beta2\\${backend.megatron.adam_beta2}_\\${stage}"
          backend.megatron.wandb_exp_name: "\\${job.name}"

    # Multi-stage training: three groups of (stable + cooldown/decay stages)
    # Each group shares the same gbsz and lr; the stable run is reused for all decays in the group.
    - type: list
      configs:

        # ============================================================
        # GROUP 1: gbsz=32, lr=0.001 — 6B / 12B token budgets
        # ============================================================

        # STABLE PHASE: Train for 12B tokens (max of this group) with no decay
        - stage: stable12BT
          backend.megatron.global_batch_size: 32
          backend.megatron.lr: 1.e-3
          backend.megatron.aux.tokens: 12_000_000_000
          # Computed fields using ESCAPED OmegaConf interpolations (\\$ prevents early resolution)
          backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
          backend.megatron.lr_wsd_decay_iters: 0  # No decay in stable phase
          backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
          # Save checkpoints at the two decay branching points (6B, 12B)
          backend.megatron.aux.save_step_0: "\\${oc.eval:'int(((6_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_1: "\\${oc.eval:'int(((12_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"

        # DECAY STAGES: Cooldown at 6B / 12B, both branching from stable12BT
        - type: list
          defaults:
            backend.megatron.aux.decay_fraction: 0.2
            backend.megatron.global_batch_size: 32
            backend.megatron.lr: 1.e-3
            # Computed fields
            backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
            backend.megatron.lr_wsd_decay_iters: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*\\${backend.megatron.aux.decay_fraction})'}"
            backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
            # Checkpoint loading from stable12BT
            backend.megatron.load: "\\${sibling.stable12BT.job.base_output_dir}/checkpoints"
            backend.megatron.ckpt_step: "\\${backend.megatron.aux.start_iter}"
            backend.megatron.override_opt_param_scheduler: true
            # Start conditions: wait for stable12BT to reach the branching checkpoint
            job.start_condition:
              class_name: FileExistsCondition
              path: "\\${sibling.stable12BT.job.base_output_dir}/checkpoints/iter_\\${oc.eval:'str(\\${backend.megatron.aux.start_iter}).zfill(7)'}"
            # Cancel conditions: cancel if stable12BT job fails
            job.cancel_condition:
              class_name: LogPatternCondition
              log_path: "\\${sibling.stable12BT.job.log_path_current}"
              pattern: "FATAL ERROR|OutOfMemoryError|Traceback"
          configs:
            - stage: decay6BT
              backend.megatron.aux.tokens: 6_000_000_000
            - stage: decay12BT
              backend.megatron.aux.tokens: 12_000_000_000

        # ============================================================
        # GROUP 2: gbsz=128, lr=0.002 — 20B / 30B / 50B / 80B budgets
        # ============================================================

        # STABLE PHASE: Train for 80B tokens (max of this group) with no decay
        - stage: stable80BT
          backend.megatron.global_batch_size: 128
          backend.megatron.lr: 2.e-3
          backend.megatron.aux.tokens: 80_000_000_000
          backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
          backend.megatron.lr_wsd_decay_iters: 0  # No decay in stable phase
          backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
          # Save checkpoints at the four decay branching points (20B, 30B, 50B, 80B)
          backend.megatron.aux.save_step_0: "\\${oc.eval:'int(((20_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_1: "\\${oc.eval:'int(((30_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_2: "\\${oc.eval:'int(((50_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_3: "\\${oc.eval:'int(((80_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"

        # DECAY STAGES: Cooldown at 20B / 30B / 50B / 80B, all branching from stable80BT
        - type: list
          defaults:
            backend.megatron.aux.decay_fraction: 0.2
            backend.megatron.global_batch_size: 128
            backend.megatron.lr: 2.e-3
            # Computed fields
            backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
            backend.megatron.lr_wsd_decay_iters: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*\\${backend.megatron.aux.decay_fraction})'}"
            backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
            # Checkpoint loading from stable80BT
            backend.megatron.load: "\\${sibling.stable80BT.job.base_output_dir}/checkpoints"
            backend.megatron.ckpt_step: "\\${backend.megatron.aux.start_iter}"
            backend.megatron.override_opt_param_scheduler: true
            # Start conditions: wait for stable80BT to reach the branching checkpoint
            job.start_condition:
              class_name: FileExistsCondition
              path: "\\${sibling.stable80BT.job.base_output_dir}/checkpoints/iter_\\${oc.eval:'str(\\${backend.megatron.aux.start_iter}).zfill(7)'}"
            # Cancel conditions: cancel if stable80BT job fails
            job.cancel_condition:
              class_name: LogPatternCondition
              log_path: "\\${sibling.stable80BT.job.log_path_current}"
              pattern: "FATAL ERROR|OutOfMemoryError|Traceback"
          configs:
            - stage: decay20BT
              backend.megatron.aux.tokens: 20_000_000_000
            - stage: decay30BT
              backend.megatron.aux.tokens: 30_000_000_000
            - stage: decay50BT
              backend.megatron.aux.tokens: 50_000_000_000
            - stage: decay80BT
              backend.megatron.aux.tokens: 80_000_000_000

        # ============================================================
        # GROUP 3: gbsz=256, lr=0.002 — 120B / 200B / 300B budgets
        # ============================================================

        # STABLE PHASE: Train for 300B tokens (max of this group) with no decay
        - stage: stable300BT
          backend.megatron.global_batch_size: 256
          backend.megatron.lr: 2.e-3
          backend.megatron.aux.tokens: 300_000_000_000
          backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
          backend.megatron.lr_wsd_decay_iters: 0  # No decay in stable phase
          backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
          # Save checkpoints at the three decay branching points (120B, 200B, 300B; save_step_3 stays at sentinel)
          backend.megatron.aux.save_step_0: "\\${oc.eval:'int(((120_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_1: "\\${oc.eval:'int(((200_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"
          backend.megatron.aux.save_step_2: "\\${oc.eval:'int(((300_000_000_000 + \\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size} - 1) // (\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})) * (1 - \\${backend.megatron.aux.cooldown_decay_fraction}))'}"

        # DECAY STAGES: Cooldown at 120B / 200B / 300B, all branching from stable300BT
        - type: list
          defaults:
            backend.megatron.aux.decay_fraction: 0.2
            backend.megatron.global_batch_size: 256
            backend.megatron.lr: 2.e-3
            # Computed fields
            backend.megatron.train_iters: "\\${oc.eval:'(\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size})'}"
            backend.megatron.lr_wsd_decay_iters: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*\\${backend.megatron.aux.decay_fraction})'}"
            backend.megatron.aux.start_iter: "\\${oc.eval:'int(((\\${backend.megatron.aux.tokens}+\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}-1)//(\\${backend.megatron.seq_length}*\\${backend.megatron.global_batch_size}))*(1-\\${backend.megatron.aux.decay_fraction}))'}"
            # Checkpoint loading from stable300BT
            backend.megatron.load: "\\${sibling.stable300BT.job.base_output_dir}/checkpoints"
            backend.megatron.ckpt_step: "\\${backend.megatron.aux.start_iter}"
            backend.megatron.override_opt_param_scheduler: true
            # Start conditions: wait for stable300BT to reach the branching checkpoint
            job.start_condition:
              class_name: FileExistsCondition
              path: "\\${sibling.stable300BT.job.base_output_dir}/checkpoints/iter_\\${oc.eval:'str(\\${backend.megatron.aux.start_iter}).zfill(7)'}"
            # Cancel conditions: cancel if stable300BT job fails
            job.cancel_condition:
              class_name: LogPatternCondition
              log_path: "\\${sibling.stable300BT.job.log_path_current}"
              pattern: "FATAL ERROR|OutOfMemoryError|Traceback"
          configs:
            - stage: decay120BT
              backend.megatron.aux.tokens: 120_000_000_000
            - stage: decay200BT
              backend.megatron.aux.tokens: 200_000_000_000
            - stage: decay300BT
              backend.megatron.aux.tokens: 300_000_000_000