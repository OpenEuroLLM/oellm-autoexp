# @package _global_
defaults:
  - ../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base,qwen3_base,data_slimpajama_jupiter]
  - /sweep: none
  - _self_

# will be overridden
aux:
  width: 512
  nheads: 8
  layers: 12
  ffn_scale: 3
  num_kv_heads: 8

  total_tokens: ${oc.eval:${backend.megatron.seq_length}*${backend.megatron.global_batch_size}*${backend.megatron.train_iters}}

backend:
  megatron:
    train_iters: 24000
    global_batch_size: 512
    micro_batch_size: 8
    expert_model_parallel_size: 1
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    use_distributed_optimizer: true
    sequence_parallel: false
    eval_interval: 1000
    seq_length: 4096
    log_interval: 100
    grad_reduce_in_bf16: false

    # basic setup
    lr: 0.002  # best for gbs 1024 in Niccolo's plots
    lr_decay_style: "WSD"
    lr_warmup_iters: 2000
    lr_wsd_decay_iters: ${oc.eval:0.2*${backend.megatron.train_iters}}
    wandb_project: depth_width_scaling_dense

    kv_channels: 128
    untie_embeddings_and_output_weights: False

    hidden_size: ${aux.width}
    ffn_hidden_size: ${oc.muli:${aux.width},${aux.ffn_scale}}
    num_layers: ${aux.layers}
    num_attention_heads: ${aux.nheads}
    num_query_groups: ${oc.eval:${.num_attention_heads}/${aux.num_kv_heads}}


  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    TORCHDYNAMO_DISABLE: "1"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"

slurm:
  sbatch:
    nodes: 16


job:
  name: megatron_qwen3_depth_width_scaling_D${backend.megatron.aux.dataset}__W${aux.width}_NH${aux.nheads}_L${aux.layers}_FFNS${aux.ffn_scale}
  base_output_dir: ${oc.concat:${oc.env:OUTPUT_DIR,"./output"}/depth_width_scaling_dense_lr2e3/,${job.name}${oc.if:${slurm.array}, "_${index}", ""}}

sweep:
  # Outer level: product (combines hyperparameters × stages)
  type: product

  groups:
    - type: list
      configs:
      # not as wide
        - aux.width:  512
          aux.ffn_scale:  3.2
          aux.nheads: 24
          aux.num_kv_heads: 12
          aux.layers: 24

        - aux.width: 512
          aux.ffn_scale: 4
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 24

        - aux.width: 512
          aux.ffn_scale: 5
          aux.nheads: 8
          aux.num_kv_heads: 4
          aux.layers: 24
      # medium
        - aux.width: 640
          aux.ffn_scale: 3.2
          aux.nheads: 24
          aux.num_kv_heads: 12
          aux.layers: 16

        - aux.width: 640
          aux.ffn_scale: 4
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 16

        - aux.width: 640
          aux.ffn_scale: 5
          aux.nheads: 8
          aux.num_kv_heads: 4
          aux.layers: 16
      # wide
        - aux.width: 768
          aux.ffn_scale: 3.2
          aux.nheads: 24
          aux.num_kv_heads: 12
          aux.layers: 11

        - aux.width: 768
          aux.ffn_scale: 4
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 11

        - aux.width: 768
          aux.ffn_scale: 5
          aux.nheads: 8
          aux.num_kv_heads: 4
          aux.layers: 11

        - aux.width: 512
          aux.ffn_scale: 3
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 12

        - aux.width: 768
          aux.ffn_scale: 3
          aux.nheads: 24
          aux.num_kv_heads: 12
          aux.layers: 12

        - aux.width: 1024
          aux.ffn_scale: 3
          aux.nheads: 32
          aux.num_kv_heads: 16
          aux.layers: 12

        - aux.width: 512
          aux.ffn_scale: 3
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 24

        - aux.width: 512
          aux.ffn_scale: 3
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 36
