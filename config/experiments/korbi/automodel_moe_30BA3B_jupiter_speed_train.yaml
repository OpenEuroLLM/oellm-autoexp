# @package _global_
# NeMo Automodel MoE 30BA3B TRAINING speed test on JUPITER (2 nodes, 8x GH200)
#
# Uses TrainFinetuneRecipeForNextTokenPrediction (actual training with optimizer
# step, LR scheduler, grad clipping) instead of BenchmarkingRecipe.
#
# Parallelism: TP=1, EP=4 (intra-node NVLink), PP=2 (inter-node IB)
# Same as megatron_moe_qwen30BA3B_jupiter_speed_max and titan EP4+PP2 configs.
#
# IMPORTANT: Automodel reports tps/GPU dividing by dp_size (not world_size).
# With PP=2, dp_size=4, world_size=8, so reported value is 2x inflated.
# All values below normalized to ÷world_size=8 for cross-framework comparison.
#
# Run history (all tps/GPU ÷ world_size=8):
#   pp_mbs=2, lbs=8,  gbs=64:   2,783 tps/GPU, 38 GiB
#   pp_mbs=2, lbs=16, gbs=256:  5,983 tps/GPU, 38 GiB (grad accum)
#   pp_mbs=2, lbs=24, gbs=96:   5,835 tps/GPU, 38 GiB
#   pp_mbs=4, lbs=16, gbs=64:   6,175 tps/GPU, 42 GiB  ← BEST
#   pp_mbs=6, lbs=24, gbs=96:   5,600 tps/GPU, 47 GiB (slower, larger mbs hurts)
#   pp_mbs=4, lbs=32+: OOM (logit tensor: lbs × 4096 × 151936 × bf16)
#   pp_mbs=2, lbs=32+: OOM (same logit bottleneck)
#   pp_mbs=8/32/64:    OOM (per-microbatch logit exceeds headroom)
#
# OOM bottleneck: pipeline accumulates ALL microbatch logits before loss.
# Qwen3 152K vocab → 1.16 GiB per sample. lbs=16 → ~18.5 GiB logits.
# FSDP2+full-AC base memory is ~20-27 GiB; rest is logit accumulation.
#
# Cross-framework comparison (all ÷ world_size=8):
#   Megatron allgather (EP4+PP2, mbs=4):    5,513 tps/GPU, 81 GiB
#   Megatron DeepEP+VPP2 (EP4+PP2, mbs=4): 5,878 tps/GPU, 87 GiB
#   Titan (compile+sel-AC4, EP4+PP2):       5,146 tps/GPU, 86 GiB
#   Automodel (pp_mbs=4, lbs=16):           6,175 tps/GPU, 42 GiB  +12%/+5%

defaults:
  - ../base
  - /backend: automodel
  - /container: jupiter_automodel
  - /slurm: jupiter
  - /sweep: none
  - override /backend/automodel: [base, base_train]
  - override /backend/automodel/model: qwen3_moe_30BA3B
  - override /job: default
  - _self_

aux:
  experiment_group: "automodel_moe_speed"

backend:
  automodel:
    # Training recipe (overrides base_train defaults for speed test)
    step_scheduler:
      global_batch_size: 64   # dp=4 * lbs=16, grad_accum=1
      local_batch_size: 16
      max_steps: 20
      ckpt_every_steps: 9999  # no checkpointing during speed test
      val_every_steps: 9999   # no validation during speed test
      num_epochs: 1

    # Disable checkpointing for speed test (avoid checkpoint I/O noise)
    checkpoint:
      enabled: false

    distributed:
      strategy: fsdp2
      tp_size: 1
      cp_size: 1
      ep_size: 4
      pp_size: 2
      sequence_parallel: false
      activation_checkpointing: true
      pipeline:
        pp_schedule: interleaved1f1b
        pp_microbatch_size: 4    # best: 42 GiB, 6175 tps/GPU (÷8)
        layers_per_stage: 12

    # LR scheduler: warmup must be < max_steps (50)
    lr_scheduler:
      lr_warmup_steps: 5

    dist_env:
      backend: nccl
      timeout_minutes: 30

  env:
    NCCL_NET_GDR_LEVEL: "0"
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    TORCH_NCCL_AVOID_RECORD_STREAMS: "1"
    HF_DATASETS_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 2
    time: "00:30:00"
  env:
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: automodel_moe_30BA3B_ep4pp2_train_speed
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"
