# @package _global_
# MaxText (JAX) MoE 30BA3B speed test on JUPITER (2 nodes, 8x GH200)
#
# MaxText uses JAX distributed (not torchrun). srun launches one process per
# node; MaxText's GPU init uses JAX_COORDINATOR_IP/PORT + NNODES/NODE_RANK.
#
# Synthetic data for speed benchmarking — no data prep needed.
# Model: Qwen3-30BA3B dims mapped to Mixtral-style MoE architecture.
#
# Parallelism: ICI EP=4 (intra-node NVLink), DCN DP=2 (inter-node IB)

defaults:
  - ../base
  - /backend: maxtext
  - /container: jupiter_maxtext
  - /slurm: jupiter
  - /sweep: none
  - override /backend/maxtext: [base, qwen3_moe_30BA3B]
  - override /job: default
  - _self_

aux:
  experiment_group: "maxtext_moe_speed"

backend:
  maxtext:
    run_name: "maxtext_moe_30BA3B_speed"
    attention: dot_product
    # Megablox kernel is TPU-only (uses pltpu.VMEM, PrefetchScalarGridSpec).
    # sparse_matmul=true with megablox=false uses jax.lax.ragged_dot (GPU-compatible).
    megablox: false
    sparse_matmul: true
    steps: 100
    per_device_batch_size: 1
    dataset_type: synthetic
    remat_policy: full
    enable_checkpointing: false
    scan_layers: false
    max_target_length: 2048
    # Reduced layers to fit in memory (XLA involuntary rematerialization of MoE
    # dense_matmul causes full expert weight un-sharding during backward pass)
    base_num_decoder_layers: 24
    monitor_goodput: false
    enable_goodput_recording: false
    base_output_directory: "${job.base_output_dir}"
    # Parallelism: EP=2 + FSDP_T=2 per node (ICI), FSDP=2 across nodes (DCN)
    # 8-way total sharding to fit ~38B-param MoE + optimizer in 96GB GH200 memory
    # embed axis: fsdp(2)*fsdp_T(2)*expert(2) = 8-way, mlp axis: fsdp_T(2)
    ici_fsdp_parallelism: 1
    ici_fsdp_transpose_parallelism: 2
    ici_expert_parallelism: 2
    ici_tensor_parallelism: 1
    ici_data_parallelism: 1
    dcn_data_parallelism: 1
    dcn_fsdp_parallelism: 2
    dcn_expert_parallelism: 1

  env:
    PYTHONPATH: ".:submodules/MaxText:stubs"
    XLA_FLAGS: "--xla_gpu_enable_command_buffer="
    XLA_PYTHON_CLIENT_MEM_FRACTION: "0.95"
    # MaxText GPU distributed uses these specific env var names
    NNODES: "$SLURM_NNODES"
    NODE_RANK: "$SLURM_NODEID"
    JAX_COORDINATOR_PORT: "1234"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  srun_opts: "--mpi=none --nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  sbatch:
    nodes: 2
    time: "00:30:00"
    cpus_per_task: 72
  env:
    # JAX coordinator IP for MaxText GPU distributed (uses hostname)
    JAX_COORDINATOR_IP: "$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n1)"
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: maxtext_moe_30BA3B_ep4_speed
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"
