# @package _global_
# Qwen3 30BA3B "maximally comparable" Titan config for direct Megatron comparison.
#
# Goal: eliminate confounding factors (batch size, FSDP, TP/PP) to isolate
#       framework overhead between Titan and Megatron on equal footing.
#
# Design choices:
#   EP=8, dp_shard=8, efsdp=1 → no expert FSDP (each EP rank owns its experts fully)
#   bs=1 → same effective tokens/step as Megatron mbs=1 GBS=8
#   dp_replicate=1 → no DDP replication
#
# Note: attention params are still FSDP-sharded 8-way (unavoidable in Titan when EP=8;
#   EP is carved from dp_shard, which requires dp_shard ≥ EP = 8).
#   efsdp = dp_shard×tp/(etp×ep) = 8×1/(1×8) = 1 → zero extra FSDP for experts.
#
# Comparable Megatron config: megatron_moe_30BA3B_comparable_jupiter.yaml
#   (EP=8, PP=1, TP=1, mbs=1, GBS=8, full_recompute)
#
# ── Results (2 nodes, 8×GH200, EP=8, dp_shard=8, bs=1) ─────────────────────
#   nocompile, full AC,  bs=1 → 56.4 TFLOPS, 3.95 GiB (4%)  (job 309056)
#   compile,   full AC,  bs=1 → 55.4 TFLOPS, 3.95 GiB (4%)  (job 309066)
#   nocompile, no AC,    bs=1 → 79.7 TFLOPS, 5.71 GiB (6%)  (job 309058)  ← no-AC BEST
#   compile,   no AC,    bs=1 → 78.8 TFLOPS, 5.71 GiB (6%)  (job 309055)
#
# Key finding: compile barely helps at bs=1 (~1-2% diff). Full AC costs ~30%.
#
defaults:
  - ../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_30BA3B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_30BA3B_comparable"
  compile_tag: "nocompile"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b

    training:
      steps: 100
      local_batch_size: 1
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 10

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 1
      expert_parallel_degree: 8
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 8   # minimum for EP=8; efsdp=8*1/(1*8)=1 → no expert FSDP
      context_parallel_degree: 1

    activation_checkpoint:
      mode: full

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "1"
    PYTHONPATH: .:./submodules/titan-oellm:./submodules/titan-oellm/torchtitan
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_ALGO: "Ring"
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_30BA3B_ep8_${aux.compile_tag}_ac${backend.titan.activation_checkpoint.mode}_bs${backend.titan.training.local_batch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 2
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "00:30:00"
  srun_opts: "--nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── nocompile (raw framework overhead, no torch.compile) ──────────────
        - aux.compile_tag: nocompile
          backend.titan.activation_checkpoint.mode: full
          backend.titan.training.local_batch_size: 1
          backend.env.TORCHDYNAMO_DISABLE: "1"
          # Result: 56.4 TFLOPS, 3.95 GiB (4%) (job 309056)

        - aux.compile_tag: nocompile
          backend.titan.activation_checkpoint.mode: none
          backend.titan.training.local_batch_size: 1
          backend.env.TORCHDYNAMO_DISABLE: "1"
          # Result: 79.7 TFLOPS, 5.71 GiB (6%) (job 309058) ← no-AC BEST

        # ── compile ───────────────────────────────────────────────────────────
        - aux.compile_tag: compile
          backend.titan.activation_checkpoint.mode: full
          backend.titan.training.local_batch_size: 1
          # Result: 55.4 TFLOPS, 3.95 GiB (4%) (job 309066)

        - aux.compile_tag: compile
          backend.titan.activation_checkpoint.mode: none
          backend.titan.training.local_batch_size: 1
          # Result: 78.8 TFLOPS, 5.71 GiB (6%) (job 309055)
