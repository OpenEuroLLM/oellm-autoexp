# @package _global_
defaults:
  - ../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/model: qwen3_base
  - override /backend/titan/data: slimpajama_jupiter
  - _self_

# will be overridden
aux:
  width: 512
  nheads: 8
  nkvheads: 2
  layers: 12
  ffn_scale: 3

  total_tokens: ${oc.eval:${backend.titan.training.seq_len}*${backend.titan.training.global_batch_size}*${backend.titan.training.steps}}

backend:
  titan:
    training:
      steps: 24000
      global_batch_size: 512
      local_batch_size: 8
      seq_len: 4096

    model:
      vocab_size: 50384  # Qwen3 vocabulary size (must match tokenizer)
      # tokenizer_path: /leonardo_scratch/fast/EUHPC_D29_026/tokenizer/neox
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b

      dim: ${aux.width}
      hidden_dim: ${oc.muli:${aux.width},${aux.ffn_scale}}
      n_layers: ${aux.layers}
      n_heads: ${aux.nheads}
      n_kv_heads: ${aux.nheads}
      enable_weight_tying: true



    lr_scheduler:
      warm_steps: 2000
      warm_ratio: 0
      decay_ratio: 0.2

    checkpoint:
      enable: true
      interval: 2000


  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    TORCHDYNAMO_DISABLE: "1"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONPATH: "./submodules/titan-oellm:./submodules/titan-oellm/torchtitan:."
    NCCL_SOCKET_TIMEOUT: 60000
    NCCL_TIMEOUT: 1800
    NCCL_IB_TIMEOUT: 100
    NCCL_IB_RETRY_CNT: 20
    NCCL_ALGO: Ring

slurm:
  sbatch:
    nodes: 16


job:
  name: titan_qwen3_depth_width_scaling_Dspaj__W${aux.width}_NH${aux.nheads}_L${aux.layers}_FFNS${aux.ffn_scale}
  base_output_dir: ${oc.concat:${oc.env:OUTPUT_DIR,"./output"}/depth_width_scaling_dense/,${job.name}${oc.if:${slurm.array}, "_${index}", ""}}

sweep:
  # Outer level: product (combines hyperparameters × stages)
  type: product

  groups:
    - type: list
      configs:
      # not as wide
        - aux.width:  512
          aux.ffn_scale:  3.2
          aux.nheads: 24
          aux.num_kv_heads: 12
          aux.layers: 24

        - aux.width: 512
          aux.ffn_scale: 4
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 24

        - aux.width: 512
          aux.ffn_scale: 5
          aux.nheads: 8
          aux.num_kv_heads: 4
          aux.layers: 24
      # medium
        - aux.width: 640
          aux.ffn_scale: 3.2
          aux.nheads: 24
          aux.num_kv_heads: 12
          aux.layers: 16

        - aux.width: 640
          aux.ffn_scale: 4
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 16

        - aux.width: 640
          aux.ffn_scale: 5
          aux.nheads: 8
          aux.num_kv_heads: 4
          aux.layers: 16
      # wide
        - aux.width: 768
          aux.ffn_scale: 3.2
          aux.nheads: 24
          aux.num_kv_heads: 12
          aux.layers: 11

        - aux.width: 768
          aux.ffn_scale: 4
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 11

        - aux.width: 768
          aux.ffn_scale: 5
          aux.nheads: 8
          aux.num_kv_heads: 4
          aux.layers: 11

        - aux.width: 512
          aux.ffn_scale: 3
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 12

        - aux.width: 768
          aux.ffn_scale: 3
          aux.nheads: 24
          aux.num_kv_heads: 12
          aux.layers: 12

        - aux.width: 1024
          aux.ffn_scale: 3
          aux.nheads: 32
          aux.num_kv_heads: 16
          aux.layers: 12

        - aux.width: 512
          aux.ffn_scale: 3
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 24

        - aux.width: 512
          aux.ffn_scale: 3
          aux.nheads: 16
          aux.num_kv_heads: 8
          aux.layers: 36
