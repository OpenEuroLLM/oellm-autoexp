# @package _global_
# Titan MoE 30BA3B — NCCL GDR level test (PP=2, EP=4)
#
# PROBLEM: With NCCL_NET_GDR_LEVEL=0, PP P2P bandwidth is ~237 MB/s effective.
#   This causes 9.1s (32%) of step time in PP P2P communication.
#   Root cause: GDR disabled → CPU-staged path (GPU→ARM→IB→ARM→GPU) is slow.
#
# HYPOTHESIS: GDR_LEVEL=0 was required to prevent PP P2P hang on JUPITER GH200.
#   The hang was discovered empirically (old NCCL? specific IB config?).
#   GDR_LEVEL=1 is a partial-GDR mode (use GDR when GPU is on same socket as IB).
#   On GH200 with NVLink-C2C (ARM+GPU tightly coupled), GDR_LEVEL=1 MIGHT work
#   without causing hangs, while enabling GPU-direct IB transfers.
#
# TEST DESIGN:
#   Very short run (5 steps, nocompile for fast startup).
#   Time limit: 5 minutes (fast timeout if hang occurs).
#   Config 0: GDR_LEVEL=1 → test if hang occurs; if not, measure P2P improvement
#   Config 1: GDR_LEVEL=0 → baseline for direct comparison
#
# EXPECTED RESULT IF GDR_LEVEL=1 WORKS:
#   P2P bandwidth: ~237 MB/s → potentially 10+ GB/s
#   P2P time: 9.1s → ~0.2s → step time 28s → ~19s → +47% TFLOPS → ~213 TFLOPS!
#
# FAILURE MODE: GDR_LEVEL=1 causes PP P2P hang → job times out in 5 min.
# RECOVERY: if both 1 and 2 hang, stick with GDR_LEVEL=0 and try other approaches.
#
# NOTE: nocompile used here to avoid long compilation masking the hang behavior.
# If GDR_LEVEL=1 works with nocompile, then separately test with compile.

defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_30BA3B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_30BA3B_gdr_test"
  gdr_tag: "gdr0"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b

    training:
      steps: 5
      local_batch_size: 64
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 1

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 2
      expert_parallel_degree: 4
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 4
      context_parallel_degree: 1

    activation_checkpoint:
      mode: selective
      selective_ac_option: "4"

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "1"  # nocompile for fast startup
    PYTHONPATH: .:./submodules/titan-oellm:./submodules/titan-oellm/torchtitan
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_NET_GDR_LEVEL: "0"  # overridden in sweep
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_30BA3B_ep4pp2_nocompile_acselective_opt4_bs64_${aux.gdr_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 2
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "00:05:00"  # very short: fast timeout if hang occurs
  srun_opts: "--mpi=none --nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: GDR_LEVEL=1 — test for hang ─────────────────────────────
        # GDR used when GPU is on same socket as IB NIC.
        # On GH200 (ARM+GPU tightly coupled), this might work without hang.
        # If 5 steps complete cleanly: BIG win → submit full benchmark.
        - aux.gdr_tag: gdr1
          backend.env.NCCL_NET_GDR_LEVEL: "1"

        # ── Config 1: GDR_LEVEL=0 — known-good baseline ───────────────────────
        # Should complete successfully in ~2-3 minutes for 5 steps.
        # Use to measure baseline nocompile TFLOPS for comparison.
        - aux.gdr_tag: gdr0
          backend.env.NCCL_NET_GDR_LEVEL: "0"
