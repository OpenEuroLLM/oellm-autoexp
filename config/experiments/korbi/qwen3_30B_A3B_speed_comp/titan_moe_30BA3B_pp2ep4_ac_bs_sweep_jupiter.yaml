# @package _global_
# Titan MoE 30BA3B PP=2 EP=4 — AC mode + batch size sweep — JUPITER
#
# Builds on confirmed PP2EP4 results:
#   nocompile + full-AC + bs=4 → 83.4 TFLOPS
#   compile   + full-AC + bs=4 → 89.6 TFLOPS
#   nocompile + full-AC + bs=8 → 94.5 TFLOPS  (step-window mem ~56 GiB, 59%)
#
# Memory budget: ~56 GiB static (model+optimizer, dp_shard=4) + activations
#   EP=8 had: static ~58 GiB, no-AC even bs=1 OOMed (48 layers too large)
#   EP=4+PP=2: each stage has 24 layers → ~19 GiB no-AC activations at bs=1
#   → no-AC at bs=1..4 should fit with 39 GiB headroom
#
# Pipeline bubble: with each sequence = 1 microbatch, bubble ≈ 1/(bs+1)
#   bs=4  → 20% bubble, bs=8 → 11%, bs=16 → 5.9%, bs=32 → 3%
#   (Confirmed: bs=8 +13% over bs=4, consistent with bubble model)
#
# Expected peaks:
#   compile + no-AC + bs=4:  ~107 TFLOPS (no recompute + compile)
#   compile + full-AC + bs=16: ~107 TFLOPS (pipeline fully filled)
#   compile + no-AC + bs=8:  ~120+ TFLOPS (if memory fits) — near/exceeding Megatron

defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_30BA3B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_30BA3B_pp2ep4_ac_bs"
  compile_tag: "nocompile"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b

    training:
      steps: 100
      local_batch_size: 4
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 10

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 2
      expert_parallel_degree: 4
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 4
      context_parallel_degree: 1

    activation_checkpoint:
      mode: full

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "1"
    PYTHONPATH: .:./submodules/titan-oellm:./submodules/titan-oellm/torchtitan
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_NET_GDR_LEVEL: "0"        # REQUIRED: PP inter-node P2P hangs with GDR_LEVEL=2
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_30BA3B_ep4pp2_${aux.compile_tag}_ac${backend.titan.activation_checkpoint.mode}_bs${backend.titan.training.local_batch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 2
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "01:00:00"
  srun_opts: "--nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: compile + full-AC + bs=8 ────────────────────────────────
        - aux.compile_tag: compile
          backend.titan.activation_checkpoint.mode: full
          backend.titan.training.local_batch_size: 8
          backend.env.TORCHDYNAMO_DISABLE: "0"
          # Expected: ~101 TFLOPS (compile +7% over nocompile+bs=8 94.5)

        # ── Config 1: nocompile + full-AC + bs=16 ─────────────────────────────
        - aux.compile_tag: nocompile
          backend.titan.activation_checkpoint.mode: full
          backend.titan.training.local_batch_size: 16
          backend.env.TORCHDYNAMO_DISABLE: "1"
          # Expected: ~100 TFLOPS (bubble 5.9% vs 11% at bs=8; +5-6%)
          # Memory: full-AC activations barely scale with bs → should still be ~58 GiB

        # ── Config 2: compile + full-AC + bs=16 ───────────────────────────────
        - aux.compile_tag: compile
          backend.titan.activation_checkpoint.mode: full
          backend.titan.training.local_batch_size: 16
          backend.env.TORCHDYNAMO_DISABLE: "0"
          # Expected: ~107 TFLOPS (compile + reduced bubble)

        # ── Config 3: nocompile + no-AC + bs=2 ────────────────────────────────
        - aux.compile_tag: nocompile
          backend.titan.activation_checkpoint.mode: none
          backend.titan.training.local_batch_size: 2
          backend.env.TORCHDYNAMO_DISABLE: "1"
          # Conservative no-AC test. EP=8 no-AC OOMed (48 layers); EP=4+PP=2
          # has 24 layers per stage → ~half the activation memory.
          # At bs=2 expected ~68-75 GiB (72-79%). Speedup: ~20% from no recompute.
          # Expected: ~100 TFLOPS

        # ── Config 4: nocompile + no-AC + bs=4 ────────────────────────────────
        - aux.compile_tag: nocompile
          backend.titan.activation_checkpoint.mode: none
          backend.titan.training.local_batch_size: 4
          backend.env.TORCHDYNAMO_DISABLE: "1"
          # Expected: ~100-107 TFLOPS if memory fits (~75-82 GiB)

        # ── Config 5: compile + no-AC + bs=4 ──────────────────────────────────
        - aux.compile_tag: compile
          backend.titan.activation_checkpoint.mode: none
          backend.titan.training.local_batch_size: 4
          backend.env.TORCHDYNAMO_DISABLE: "0"
          # Expected: ~107-115 TFLOPS — potentially near/above Megatron 118

        # ── Config 6: nocompile + selective-AC + bs=4 ─────────────────────────
        - aux.compile_tag: nocompile
          backend.titan.activation_checkpoint.mode: selective
          backend.titan.activation_checkpoint.selective_ac_option: "2"
          backend.titan.training.local_batch_size: 4
          backend.env.TORCHDYNAMO_DISABLE: "1"
          # EP=8 selective AC was near-OOM (93 GiB). EP=4+PP=2 has more headroom.
          # Expected: ~90-100 TFLOPS (less recompute than full-AC, less memory than no-AC)
