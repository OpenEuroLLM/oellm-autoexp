# @package _global_
# Titan MoE 30BA3B — NCCL_IB_QPS_PER_CONNECTION sweep (compile + opt4 + bs=64)
#
# BACKGROUND: NCCL diagnostic jobs (321532/321533) confirmed:
#   QPS=1: P2P Chunksize = 131072 bytes (128 KB)
#   QPS=4: P2P Chunksize = 524288 bytes (512 KB) — 4× larger
#
# Nocompile step 5 results:
#   QPS=1 default: 131.1 TFLOPS
#   QPS=4: 135.7 TFLOPS (+3.4%)
#
# Mechanism: P2P chunking — each 16.8 MB send requires:
#   QPS=1:  16.8 MB / 128 KB = 128 sequential RDMA ops
#   QPS=4:  16.8 MB / 512 KB =  32 sequential RDMA ops
#   QPS=8:  16.8 MB /   1 MB =  16 sequential RDMA ops
#   QPS=16: 16.8 MB /   2 MB =   8 sequential RDMA ops
#
# Hypothesis: more QPs → larger chunks → fewer RDMA roundtrips → lower P2P latency.
#
# Config 0: QPS=1 (default, baseline for direct comparison)
# Config 1: QPS=4 (P2P Chunksize 512 KB)
# Config 2: QPS=8 (P2P Chunksize 1 MB)
# Config 3: QPS=16 (P2P Chunksize 2 MB)
#
# 100 steps compile + opt4 + bs=64. Steady state from steps 70-100.

defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_30BA3B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_30BA3B_nccl_qps_sweep"
  qps_tag: "qps1"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b

    training:
      steps: 100
      local_batch_size: 64
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 10

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 2
      expert_parallel_degree: 4
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 4
      context_parallel_degree: 1

    activation_checkpoint:
      mode: selective
      selective_ac_option: "4"

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "0"
    PYTHONPATH: .:./submodules/titan-oellm:./submodules/titan-oellm/torchtitan
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_NET_GDR_LEVEL: "0"
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_30BA3B_ep4pp2_compile_acselective_opt4_bs64_${aux.qps_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 2
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "01:00:00"
  srun_opts: "--nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: QPS=1 (default baseline) ──────────────────────────────
        # Baseline: P2P Chunksize = 128 KB, ~128 RDMA ops per 16.8 MB send.
        # Expected: ~142-145 TFLOPS (same as autotune baseline job 321442).
        - aux.qps_tag: qps1

        # ── Config 1: QPS=4 ──────────────────────────────────────────────────
        # P2P Chunksize = 512 KB, ~32 RDMA ops per 16.8 MB send.
        # Nocompile step 5: 135.7 vs 131.1 (+3.4%). With compile: ~147 TFLOPS?
        - aux.qps_tag: qps4
          backend.env.NCCL_IB_QPS_PER_CONNECTION: "4"

        # ── Config 2: QPS=8 ──────────────────────────────────────────────────
        # P2P Chunksize = 1 MB, ~16 RDMA ops per 16.8 MB send.
        # Testing if benefit compounds (expect diminishing returns beyond QPS=4).
        - aux.qps_tag: qps8
          backend.env.NCCL_IB_QPS_PER_CONNECTION: "8"

        # ── Config 3: QPS=16 ─────────────────────────────────────────────────
        # P2P Chunksize = 2 MB, ~8 RDMA ops per 16.8 MB send.
        # Near-optimal chunking: further QPs unlikely to help if IB bandwidth-limited.
        - aux.qps_tag: qps16
          backend.env.NCCL_IB_QPS_PER_CONNECTION: "16"
