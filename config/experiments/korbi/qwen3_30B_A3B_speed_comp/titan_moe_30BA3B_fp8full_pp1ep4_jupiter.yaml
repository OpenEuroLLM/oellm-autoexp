# @package _global_
# Titan MoE 30BA3B — FP8 linear + FP8 expert GEMMs (PP=1, EP=4, DPr=2)
#
# Float8 grouped MM (MoE expert matrix multiply) requires PP=1 (hard assert in torchtitan).
# Combined with FP8 linear, this quantizes ALL GEMMs to FP8 (linear layers + expert GEMMs).
#
# Parallelism change vs baseline (PP=2, EP=4, DPs=4, DPr=1):
#   PP=1 → EP=4 (intra-node NVLink only) → DP_shard=4 × DP_replicate=2
#   Check: dp_replicate(2) × dp_shard(4) × cp(1) × tp(1) × pp(1) = 8 = world_size ✓
#   efsdp = fsdp × tp // (etp × ep) = (4×1)×1 // (1×4) = 1 ✓
#
# Pros vs PP=2 config:
#   + No PP bubble overhead (1F1B schedule removed)
#   + EP AllToAll purely intra-node (NVLink, fast)
#   + FP8 expert GEMMs → 2× faster expert computation in theory
#   + No PP P2P send/recv across IB
# Cons:
#   - Both nodes hold full (EP-sharded) model → no parameter count reduction per node
#   - DDP gradient sync across nodes (IB allreduce, every step)
#   - No pipeline overlap for compute/communication
#
# Memory estimate (PP=1, no AC, BF16 baseline):
#   Previous: model+optim ~58 GiB + activations OOM at any bs
#   With FP8 weights (1B/param vs 2B BF16): save ~16-20 GiB on model buffers
#   With selective AC opt=4 + FP8: ~69 GiB model+optim + activations at bs=16 ~13 GiB = ~82 GiB?
#   Caution: starting with small bs=8 to check memory
#
# Expected throughput:
#   FP8 linear+experts, no PP bubble, compile: potentially 200+ TFLOPS
#
# quantize.grouped_mm.float8.fqns: ["experts"] — quantizes expert grouped GEMMs
# NOTE: torchao nightly may be needed (float8 grouped MM is a prototype feature)

defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_30BA3B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_30BA3B_fp8full_pp1ep4"
  compile_tag: "compile"
  ac_opt_tag: "opt4"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b
      converters:
        - "quantize.linear.float8"
        - "quantize.grouped_mm.float8"

    training:
      steps: 50
      local_batch_size: 16
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 10

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 1
      expert_parallel_degree: 4
      data_parallel_replicate_degree: 2
      data_parallel_shard_degree: 4
      context_parallel_degree: 1

    activation_checkpoint:
      mode: selective
      selective_ac_option: "4"

    quantize:
      linear:
        float8:
          recipe_name: "rowwise"
          enable_fsdp_float8_all_gather: false
      grouped_mm:
        float8:
          fqns:
            - "experts"

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "0"
    PYTHONPATH: .:./submodules/titan-oellm:./submodules/titan-oellm/torchtitan
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_NET_GDR_LEVEL: "0"
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_30BA3B_ep4pp1_${aux.compile_tag}_acselective_${aux.ac_opt_tag}_fp8full_bs${backend.titan.training.local_batch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 2
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "01:00:00"
  srun_opts: "--nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: compile + FP8 linear+experts + opt4 + bs=16 (PP=1) ─────
        # First run: small bs=16 to check memory. PP=1 → EP=4 intra-node only.
        # Expected: OOM-free run; ~200+ TFLOPS if FP8 expert GEMMs work.
        # This is a prototype feature — if torchao float8 grouped MM errors,
        # fall back to fp8linear-only (titan_moe_30BA3B_fp8linear_pp2ep4).
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt4
          backend.titan.activation_checkpoint.selective_ac_option: "4"
          backend.titan.training.local_batch_size: 16
          backend.env.TORCHDYNAMO_DISABLE: "0"

        # ── Config 1: compile + FP8 linear+experts + opt4 + bs=32 (PP=1) ─────
        # Larger batch if bs=16 succeeds. More AllToAll tokens per step.
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt4
          backend.titan.activation_checkpoint.selective_ac_option: "4"
          backend.titan.training.local_batch_size: 32
          backend.env.TORCHDYNAMO_DISABLE: "0"

        # ── Config 2: compile + FP8 linear ONLY + opt4 + bs=32 (PP=1) ────────
        # Control: same PP=1 config but without FP8 expert GEMMs.
        # Isolates PP=1 effect vs FP8 expert gain.
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt4
          backend.titan.activation_checkpoint.selective_ac_option: "4"
          backend.titan.training.local_batch_size: 32
          backend.env.TORCHDYNAMO_DISABLE: "0"
          backend.titan.quantize.grouped_mm.float8.fqns: []
