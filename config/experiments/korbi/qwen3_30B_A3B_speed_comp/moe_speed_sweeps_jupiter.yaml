# @package _global_
#
# 300M dense model training with pull-based multi-stage cooldown
# Translation of dense_300M_50BT.yaml to new composable sweep system
#
defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base,qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

index: 0
stage: "all"

job:
  base_output_dir: "${oc.env:OUTPUT_DIR,'.'}/speed_sweep/${.name}"
  name: "speed_cl${oc.select:slurm.env.MACHINE_NAME,none}_D${oc.select:backend.megatron.aux.dataset,''}_m${backend.megatron.aux.model_name}_gbsz${backend.megatron.global_batch_size}_mbsz${backend.megatron.micro_batch_size}_nodes${slurm.sbatch.nodes}"

backend:
  megatron:
    train_iters: 100
    global_batch_size: ${oc.eval:32*${slurm.sbatch.nodes}}
    micro_batch_size: 2
    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 2
    tensor_model_parallel_size: 1
    eval_interval: 1000
    seq_length: 4096
    lr: 0.001
    log_interval: 1

    # from https://github.com/yanring/Megatron-MoE-ModelZoo/blob/main/sbatch_benchmarking.sh
    # https://github.com/yanring/Megatron-MoE-ModelZoo/blob/main/best_practice/Qwen3/run_30b.sh
    # moe_router_force_load_balancing: true
    # recompute_granularity: full
    # recompute_method: uniform
    # recompute_num_layers: 1
    # recompute_modules: ["moe_act", "layernorm"]
    # tensor_model_parallel_size: 1
    use_distributed_optimizer: true
    save: null
    load: null
    ckpt_step: 0
    moe_router_dtype: "fp32"

    data_path:
     - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/
  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}

    # jupiter
    # NCCL_DEBUG: "INFO"
    NCCL_NET_GDR_LEVEL: "0"
    NCCL_PROTO: "Simple"
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONWARNINGS: "ignore::UserWarning"

slurm:
  sbatch:
    # will be overridden
    nodes: 2
    time: "00:30:00"

sweep:
  groups:
    # GROUP0 default settings
    - type: product
      params:
        slurm.sbatch.nodes: [2, 4, 8, 16, 32, 64, 128]
