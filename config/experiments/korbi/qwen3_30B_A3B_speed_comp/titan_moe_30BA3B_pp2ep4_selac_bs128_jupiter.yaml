# @package _global_
# Titan MoE 30BA3B PP=2 EP=4 — selective-AC bs=128 + option sweep
#
# Results so far (compile + selective-AC option=2):
#   bs=16: 121.90 TFLOPS (79% mem)
#   bs=32: pending
#   bs=64: 129-131 TFLOPS (79-81% mem) ← NEW BEST (+10% over Megatron 118)
#
# Key insight: 1F1B pipeline keeps only 1 microbatch in-flight at each stage.
#   This means activation memory is FLAT with batch size for selective-AC.
#   bs=16 ≈ 75 GiB, bs=64 ≈ 75-77 GiB — same! Memory budget = 95 GiB.
#
# Therefore bs=128 should also fit (~77-78 GiB expected).
#   Previously: compile+full-AC+bs=128 timed out (per-step recompilation).
#   But compile+selective-AC+bs=64 works fine (no retracing).
#   Hypothesis: selective-AC avoids the retracing issue at bs=128 too.
#
# Also testing selective_ac_option=3 (every 3rd layer recomputed instead of 2nd):
#   - Less recompute overhead → potentially higher throughput
#   - Only 4 more layers saved in memory → minimal memory increase
#   - Expected: +2-4% over option=2 at same bs
#
# Pipeline bubble model (each seq = 1 microbatch, PP=2):
#   bs=64:  bubble=1.54% → 129-131 TFLOPS (confirmed)
#   bs=128: bubble=0.78% → expected ~130-132 TFLOPS (+1%)
#
# Memory stays flat (1F1B), so bs=128 should be ~77-78 GiB (81-82%).

defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_30BA3B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_30BA3B_pp2ep4_selac_bs128"
  compile_tag: "compile"
  ac_opt_tag: "opt2"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b

    training:
      steps: 100
      local_batch_size: 128
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 10

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 2
      expert_parallel_degree: 4
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 4
      context_parallel_degree: 1

    activation_checkpoint:
      mode: selective
      selective_ac_option: "2"

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "0"
    PYTHONPATH: .:./submodules/titan-oellm:./submodules/titan-oellm/torchtitan
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_NET_GDR_LEVEL: "0"
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_30BA3B_ep4pp2_${aux.compile_tag}_acselective_${aux.ac_opt_tag}_bs${backend.titan.training.local_batch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 2
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "02:00:00"   # Extended: bs=128 → ~53s/step × 100 steps ≈ 88 min + compile warmup
  srun_opts: "--mpi=none --nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: compile + selective-AC option=2 + bs=128 ─────────────────
        # THE KEY TEST: compile+selective+bs=64=129-131 TFLOPS.
        # bs=128: bubble 0.78% vs 1.54% at bs=64 → +0.8% marginal gain.
        # Memory: flat with batch size (1F1B, 1 microbatch inflight) → ~77-78 GiB.
        # Previously compile+full-AC+bs=128 timed out, but selective-AC+bs=64 works.
        # Hypothesis: selective-AC avoids per-step retracing issue.
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt2
          backend.titan.activation_checkpoint.selective_ac_option: "2"
          backend.titan.training.local_batch_size: 128
          backend.env.TORCHDYNAMO_DISABLE: "0"

        # ── Config 1: compile + selective-AC option=3 + bs=64 ──────────────────
        # Less recompute: checkpoint every 3rd layer instead of every 2nd.
        # 1F1B: only 1 microbatch inflight → ~4 more layers saved vs option=2.
        # Memory increase: ~4 × 16MB = ~64MB (negligible on 95GB budget).
        # Expected: +2-4% over option=2 (less recompute overhead).
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt3
          backend.titan.activation_checkpoint.selective_ac_option: "3"
          backend.titan.training.local_batch_size: 64
          backend.env.TORCHDYNAMO_DISABLE: "0"

        # ── Config 2: nocompile + selective-AC option=3 + bs=64 ────────────────
        # Baseline for option=3 without compile.
        # Expected: +2-4% over nocompile+option=2+bs=64=121 TFLOPS → ~123-126 TFLOPS.
        - aux.compile_tag: nocompile
          aux.ac_opt_tag: opt3
          backend.titan.activation_checkpoint.selective_ac_option: "3"
          backend.titan.training.local_batch_size: 64
          backend.env.TORCHDYNAMO_DISABLE: "1"
