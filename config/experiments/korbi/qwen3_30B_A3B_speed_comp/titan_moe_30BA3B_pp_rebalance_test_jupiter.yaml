# @package _global_
# Titan MoE 30BA3B — PP stage layer rebalancing test (PP=2, EP=4)
#
# HYPOTHESIS: Stage 1 (layers.24-47 + norm + output) is slower than stage 0
# (tok_embeddings + layers.0-23) because the output head (vocab_size=50304 ×
# hidden=2048) adds significant computation. This causes stage 0 to spin-wait
# in NCCL SendRecv while stage 1 finishes, accounting for the 9.1s PP P2P stall.
#
# Current split (last_stage_less_layers=1):
#   Stage 0: tok_embeddings + layers.0-23   (24 transformer layers)
#   Stage 1: layers.24-47 + norm + output   (24 transformer layers + output head)
#
# Test splits:
#   last_stage_less_layers=4 → stage 0: 26 layers, stage 1: 22 layers + output
#   last_stage_less_layers=8 → stage 0: 28 layers, stage 1: 20 layers + output
#
# Memory:
#   Stage 0 gets more layers → more activation memory.
#   Current stage 0: ~84 GiB (88.5%).
#   k=4: +2 layers = +8.3% → ~91 GiB (95.8%) — borderline safe
#   k=8: +4 layers = +16.7% → ~98 GiB → likely OOM
#
# EXPECTED: If output head causes 9.1s stall, reducing stage 1 layers
# should proportionally reduce P2P wait → TFLOPS increase.
# EXPECTED FAILURE: If no change, stage imbalance is NOT from output head.
#
# Using nocompile for fast startup; log_freq=5 to see progression quickly.

defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_30BA3B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_30BA3B_pp_rebalance_test"
  rebalance_tag: "k1"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b

    training:
      steps: 20
      local_batch_size: 64
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 5

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 2
      expert_parallel_degree: 4
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 4
      context_parallel_degree: 1
      pipeline_parallel_last_stage_less_layers: 1  # overridden in sweep

    activation_checkpoint:
      mode: selective
      selective_ac_option: "4"

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "1"  # nocompile for fast startup
    PYTHONPATH: .:./submodules/titan-oellm:./submodules/titan-oellm/torchtitan
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_NET_GDR_LEVEL: "0"
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_30BA3B_ep4pp2_nocompile_acselective_opt4_bs64_${aux.rebalance_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 2
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "00:10:00"  # short: 20 steps nocompile ≈ 5 min
  srun_opts: "--nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: k=1 (current default) ────────────────────────────────────
        # Stage 0: tok_embeddings + layers.0-23 (24 layers)
        # Stage 1: layers.24-47 + norm + output (24 layers + output head)
        # This is the baseline. Expected: ~131-132 TFLOPS (nocompile)
        - aux.rebalance_tag: k1
          backend.titan.parallelism.pipeline_parallel_last_stage_less_layers: 1

        # ── Config 1: k=4 ───────────────────────────────────────────────────────
        # Stage 0: tok_embeddings + layers.0-25 (26 layers)
        # Stage 1: layers.26-47 + norm + output (22 layers + output head)
        # Gives stage 1 two fewer transformer layers to compensate for output head.
        # Memory: stage 0 +8.3% activation → ~91 GiB (borderline, should fit).
        # If output head is worth 2+ transformer layers: should see TFLOPS increase.
        - aux.rebalance_tag: k4
          backend.titan.parallelism.pipeline_parallel_last_stage_less_layers: 4
