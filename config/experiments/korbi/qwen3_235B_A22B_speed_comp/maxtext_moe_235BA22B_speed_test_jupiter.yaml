# @package _global_
# MaxText (JAX) MoE 235BA22B speed test on JUPITER (16 nodes, 64x GH200)
#
# MaxText uses JAX distributed (not torchrun). srun launches one process per
# node; MaxText's GPU init uses JAX_COORDINATOR_IP/PORT + NNODES/NODE_RANK.
#
# Architecture: 94 layers, dim=4096, 64 query heads, 4 KV heads (GQA),
#               head_dim=128, 128 experts, topk=8, moe_inter_dim=1536
#
# NOTE: MaxText on GPU is 3-6x slower than PyTorch backends due to:
#   - No megablox on GPU (falls back to dense_matmul or ragged_dot)
#   - XLA involuntary rematerialization of MoE expert weights
#   - TPU-optimized sharding strategies
# This config is primarily for completeness in framework comparison.
#
# Parallelism: With GPU multinode patch, JAX sees 4 GPUs/node.
#   ICI (intra-node NVLink): EP=2 + FSDP_T=2 (same as working 30BA3B)
#   DCN (inter-node IB): FSDP=16
# Memory: 4096 hidden is 4x larger → need aggressive FSDP sharding
#
# scan_layers=true lets XLA reuse activation buffers across layers (nn.scan).
# Without it, XLA builds separate computation graphs for every layer → OOM.
# With scan, memory is O(1) in num_layers for activations.
#
# ── Results ──────────────────────────────────────────────────────────────────
# scan_layers=false, ICI EP=2+FSDP_T=2:
#   4L  → 790 tps/dev, 7.8 TFLOP/s (loss=NaN)
#   8L  → 366 tps/dev, 5.87 TFLOP/s (loss=12.4, valid)
#   12L → 260 tps/dev, 5.81 TFLOP/s (loss=NaN)
#   16L → OOM 95.19 GB (2026-04-10)
# scan_layers=false, ICI FSDP=4:
#   16L → OOM 98 GB/dev (2026-04-09)
#   24L → OOM ~150 GB/dev
#   48L → OOM ~257 GB/dev
#
# scan_layers=true, ICI EP=2+FSDP_T=2 (2026-04-10):
#   24L → 139 tps/dev, 5.66 TFLOP/s (loss=10.2, valid!) ← COMPLETED
#   48L → OOM (cancelled after ~2 min, compilation phase)
#   94L → OOM 86.4 GB allocation (model too large for 64-way sharding)
#
# ── Active sweep: scan_layers=true, layer count ─────────────────────────────

defaults:
  - ../../base
  - /backend: maxtext
  - /container: jupiter_maxtext
  - /slurm: jupiter
  - /sweep: none
  - override /backend/maxtext: [base, qwen3_moe_235BA22B]
  - override /job: default
  - _self_

aux:
  experiment_group: "maxtext_moe_235BA22B_speed_v2"
  layers_tag: "24L"

backend:
  maxtext:
    run_name: "maxtext_moe_235BA22B_speed"
    attention: dot_product
    megablox: false
    sparse_matmul: true
    steps: 30
    per_device_batch_size: 1
    dataset_type: synthetic
    remat_policy: full
    enable_checkpointing: false
    scan_layers: true
    max_target_length: 2048
    base_num_decoder_layers: 24
    monitor_goodput: false
    enable_goodput_recording: false
    base_output_directory: "${job.base_output_dir}"
    # ICI (intra-node, NVLink): EP=2 + FSDP_T=2 (same strategy as working 30BA3B)
    # DCN (inter-node, IB): FSDP=16 across nodes
    # Total sharding: EP=2 × FSDP_T=2 × DCN_FSDP=16 = 64-way
    ici_fsdp_parallelism: 1
    ici_fsdp_transpose_parallelism: 2
    ici_expert_parallelism: 2
    ici_tensor_parallelism: 1
    ici_data_parallelism: 1
    dcn_data_parallelism: 1
    dcn_fsdp_parallelism: 16
    dcn_expert_parallelism: 1

  env:
    PYTHONPATH: ".:submodules/MaxText:stubs"
    XLA_FLAGS: "--xla_gpu_enable_command_buffer="
    XLA_PYTHON_CLIENT_MEM_FRACTION: "0.90"
    NNODES: "$SLURM_NNODES"
    NODE_RANK: "$SLURM_NODEID"
    JAX_COORDINATOR_PORT: "1234"
    GPUS_PER_NODE: "4"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  srun_opts: "--mpi=none --nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  sbatch:
    nodes: 16
    time: "00:30:00"
    cpus_per_task: 72
  env:
    JAX_COORDINATOR_IP: "$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n1)"
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: maxtext_moe_235BA22B_16node_${aux.layers_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── All configs below use scan_layers=true (nn.scan) ────────────────
        # scan_layers reuses activation buffers across layers → O(1) memory
        # in num_layers, so full 94L may now fit where 16L OOMed before.

        # ── 24 layers (conservative with scan) ──────────────────────────────
        - aux.layers_tag: 24L_scan
          backend.maxtext.base_num_decoder_layers: 24

        # ── 48 layers (half model) ──────────────────────────────────────────
        - aux.layers_tag: 48L_scan
          backend.maxtext.base_num_decoder_layers: 48

        # ── 94 layers (full model!) ─────────────────────────────────────────
        - aux.layers_tag: 94L_scan
          backend.maxtext.base_num_decoder_layers: 94

        # ═════════════════════════════════════════════════════════════════════
        # FAILED CONFIGS — documented for reference
        # ═════════════════════════════════════════════════════════════════════
        #
        # scan_layers=false (XLA builds separate graph per layer → OOM):
        # 16L, ICI EP=2+FSDP_T=2, DCN FSDP=16 → OOM 95.19 GB (2026-04-10)
        # 16L, ICI FSDP=4, DCN FSDP=16 → OOM 98 GB (2026-04-09)
        # 24L, ICI FSDP=4, DCN FSDP=16 → OOM ~150 GB (2026-04-09)
        # 48L, ICI FSDP=4, DCN FSDP=16 → OOM ~257 GB (2026-04-09)
