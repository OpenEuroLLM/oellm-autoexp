# @package _global_
# Megatron 235BA22B — ModelZoo parallelism (TP=1, PP=4, VPP=12) on JUPITER 16N
#
# v2: Uses allgather/alltoall dispatchers (flex/DeepEP broken on JUPITER GH200)
#
# Key change from prior TP=4+PP=2+EP=8 (27.5 TFLOPS):
#   → TP=1 eliminates TP communication entirely
#   → PP=4, VPP=12 (2 layers/virtual stage) → interleaved 1F1B, small pipeline bubble
#   → Selective recompute (moe_act + layernorm only)
#   → mock_data for pure compute benchmark (avoids corrupt dataset index issue)
#
# Parallelism: TP=1, PP=4, EP=16
#   DP = 64 / (1×4) = 16. EP=16 ≤ DP → DP_no_ep = 1.
#   96 effective layers → 24/stage → 12 virtual stages → 2 layers/virtual stage
#   GBS=512 → 32 microbatches >> min(PP×VPP=48) ... wait, min_micro = PP×chunks
#   Actually with PP=4 and 12 virtual stages per rank: num_model_chunks=12
#   min_micro = PP × num_model_chunks = 4 × 12 = 48. GBS/DP = 512/16 = 32 < 48!
#   → Need GBS ≥ 48 × 16 = 768. Use GBS=1024 (64 microbatches per DP rank).
#
# ── Results (16 nodes, 64×GH200) ─────────────────────────────────────────────
# allgather_selrecomp: CANCELLED (timeout — VPP pipeline bubble too large?)
# alltoall_selrecomp:  OOM
# allgather_fullrecomp: OOM
# ep8_alltoall_selrecomp: OOM
# VPP=12 with TP=1+PP=4 requires too much activation memory at EP=16/8.

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_235BA22B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_moe_235BA22B_modelzoo_16node_v2"
  tag: "allgather_selrecomp"

backend:
  megatron:
    train_iters: 50
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    log_throughput: true
    exit_interval: 50

    # ═══ ModelZoo parallelism: TP=1, PP=4, EP=16 ═══
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 4
    expert_model_parallel_size: 16
    context_parallel_size: 1
    global_batch_size: 1024
    micro_batch_size: 1

    # VPP: 96 layers / PP=4 = 24/stage, VPP=12 → 2 layers/virtual stage
    account_for_embedding_in_pipeline_split: true
    account_for_loss_in_pipeline_split: true
    num_virtual_stages_per_pipeline_rank: 12

    # ═══ Dispatcher: allgather (working on JUPITER) ═══
    moe_token_dispatcher_type: allgather
    moe_grouped_gemm: true

    # ═══ Selective recompute ═══
    recompute_granularity: selective
    recompute_modules:
      - moe_act
      - layernorm
    recompute_method: null
    recompute_num_layers: null

    # ═══ Communication overlap ═══
    overlap_grad_reduce: true
    overlap_param_gather: true

    # ═══ Attention + compute ═══
    attention_backend: fused
    sequence_parallel: false   # TP=1 → no SP needed
    cross_entropy_loss_fusion: true
    cross_entropy_fusion_impl: te
    enable_experimental: true
    create_attention_mask_in_dataloader: false

    # ═══ Router ═══
    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    moe_aux_loss_coeff: 0.001
    moe_z_loss_coeff: 1e-4

    # ═══ Optimizer ═══
    use_distributed_optimizer: true
    lr: 3e-4
    min_lr: 0
    adam_beta1: 0.9
    adam_beta2: 0.95

    # ═══ Memory ═══
    manual_gc: true
    manual_gc_interval: 5

    # ═══ Data — mock ═══
    mock_data: true
    seq_length: 4096
    max_position_embeddings: 4096

    # ═══ Misc ═══
    te_rng_tracker: true
    cuda_graph_impl: "none"
    cuda_graph_scope: "full"
    make_vocab_size_divisible_by: 256
    dataloader_type: single

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    NCCL_NVLS_ENABLE: "1"
    NVTE_ALLOW_NONDETERMINISTIC_ALGO: "1"
    PYTHONPATH: ".:submodules/Megatron-LM:/opt/"
    NCCL_NET_GDR_LEVEL: "0"
    PYTHONWARNINGS: "ignore::UserWarning"

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER_pt2510_aarch64_202602262033.sif

slurm:
  sbatch:
    nodes: 16
    time: "00:30:00"
  env:
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    UB_SKIPMC: "1"
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: meg_mz_235BA22B_16n_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ═══════════════════════════════════════════════════════════════════════
        # TP=1, PP=4, EP=16, VPP=12 — allgather vs alltoall
        # ═══════════════════════════════════════════════════════════════════════

        # ── allgather, selective recompute ────────────────────────────────
        - aux.tag: allgather_selrecomp
          backend.megatron.moe_token_dispatcher_type: allgather

        # ── alltoall, selective recompute ─────────────────────────────────
        - aux.tag: alltoall_selrecomp
          backend.megatron.moe_token_dispatcher_type: alltoall

        # ── allgather, full recompute (memory comparison) ─────────────────
        - aux.tag: allgather_fullrecomp
          backend.megatron.moe_token_dispatcher_type: allgather
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_method: uniform
          backend.megatron.recompute_num_layers: 1
          backend.megatron.recompute_modules: null

        # ═══════════════════════════════════════════════════════════════════════
        # EP=8 comparison (more DP parallelism, less EP comm)
        # DP_no_ep = 2 at EP=8
        # ═══════════════════════════════════════════════════════════════════════

        # ── EP=8, alltoall, selective recompute ───────────────────────────
        - aux.tag: ep8_alltoall_selrecomp
          backend.megatron.expert_model_parallel_size: 8
          backend.megatron.moe_token_dispatcher_type: alltoall
