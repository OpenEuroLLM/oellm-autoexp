# @package _global_
# Megatron 235BA22B flex dispatcher sweep (HybridEP + DeepEP) on JUPITER
#
# Architecture: 94 layers, hidden=4096, 128 experts, topk=8
# Parallelism: TP=4+PP=2+EP=8 (only viable Megatron parallelism for 235BA22B)
#   TP=4: fills node (4 GPUs NVLink). EP=8: spans 2 nodes. PP=2: 47 layers/stage.
#   DP=1 (64/(4×2×8)=1), GBS = mbs × DP × num_nodes × gpus_per_node = mbs × 64
#
# Flex dispatcher decouples communication group from model parallelism:
#   - deepep: cross-node NVSHMEM-based EP communication (best for inter-node EP)
#   - hybridep: NVLink-optimized fused dispatch/combine (best for intra-node EP)
#   On JUPITER with EP=8 spanning 2 nodes, deepep should win. hybridep for comparison.
#
# Compared to allgather baseline (27.5 TFLOPS, 75 GiB):
#   flex adds moe_grouped_gemm + moe_permute_fusion + NVSHMEM comm optimization
#   30BA3B saw 4.6× improvement with flex+VPP (127 vs 27.5 TFLOPS)
#   235BA22B can't use VPP (47 layers/stage is prime), but grouped_gemm should still help
#
# Container: DeepEP+NVSHMEM container (has deep_ep package at /opt/)
# Requires: /dev/shm bind, PYTHONPATH includes /opt/, no expandable_segments
#
# ── Results ──────────────────────────────────────────────────────────────────
# (to be filled in after jobs complete)

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_235BA22B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_moe_235BA22B_flex_sweep"
  tag: "deepep_mbs1"

backend:
  megatron:
    train_iters: 50
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001
    log_throughput: true

    global_batch_size: 64
    micro_batch_size: 1
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 2
    tensor_model_parallel_size: 4

    # Flex dispatcher (DeepEP backend by default)
    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: deepep
    moe_grouped_gemm: true
    moe_permute_fusion: true
    moe_router_fusion: true

    # Full recompute (required — no-recompute OOMs at 94.6 GiB)
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    seq_length: 4096

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTHONPATH: ".:submodules/Megatron-LM:/opt/"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    PATH: "/usr/local/bin:/usr/bin:/bin"
    CUDNN_PATH: "/usr/lib/aarch64-linux-gnu"
    NCCL_NET_GDR_LEVEL: "0"
    PYTHONWARNINGS: "ignore::UserWarning"

# Use DeepEP container with NVSHMEM
container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603312032.sif
  bind:
    - /e
    - /dev/shm
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 16
    time: "00:30:00"
  env:
    PYTORCH_CUDA_ALLOC_CONF: ""   # NVSHMEM conflicts with expandable_segments
    UB_SKIPMC: "1"
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: meg_flex_235BA22B_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ═══════════════════════════════════════════════════════════════════════
        # DeepEP backend (cross-node NVSHMEM optimization)
        # ═══════════════════════════════════════════════════════════════════════

        # ── DeepEP, mbs=1, full recompute (baseline) ────────────────────────
        - aux.tag: deepep_mbs1
          backend.megatron.moe_flex_dispatcher_backend: deepep
          backend.megatron.micro_batch_size: 1

        # ── DeepEP, mbs=2, full recompute ───────────────────────────────────
        - aux.tag: deepep_mbs2
          backend.megatron.moe_flex_dispatcher_backend: deepep
          backend.megatron.micro_batch_size: 2

        # ═══════════════════════════════════════════════════════════════════════
        # HybridEP backend (NVLink-optimized fused dispatch/combine)
        # ═══════════════════════════════════════════════════════════════════════

        # ── HybridEP, mbs=1, full recompute ─────────────────────────────────
        - aux.tag: hybridep_mbs1
          backend.megatron.moe_flex_dispatcher_backend: hybridep
          backend.megatron.micro_batch_size: 1

        # ── HybridEP, mbs=2, full recompute ─────────────────────────────────
        - aux.tag: hybridep_mbs2
          backend.megatron.moe_flex_dispatcher_backend: hybridep
          backend.megatron.micro_batch_size: 2

        # ═══════════════════════════════════════════════════════════════════════
        # DeepEP + EP comm overlap
        # ═══════════════════════════════════════════════════════════════════════

        # ── DeepEP, mbs=1, EP overlap (overlap A2A with next mb compute) ────
        - aux.tag: deepep_mbs1_overlap
          backend.megatron.moe_flex_dispatcher_backend: deepep
          backend.megatron.micro_batch_size: 1
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true
          backend.env.CUDA_DEVICE_MAX_CONNECTIONS: "32"
          backend.env.NVTE_FWD_LAYERNORM_SM_MARGIN: "24"
          backend.env.NVTE_BWD_LAYERNORM_SM_MARGIN: "24"
