# @package _global_
# NeMo Automodel MoE 235BA22B speed sweep on JUPITER (16 nodes, 64x GH200)
#
# Architecture: 94 layers, hidden=4096, 64 heads, 4 KV heads (GQA),
#               128 experts, topk=8, moe_inter_dim=1536, ~159B params
#
# Parallelism: PP=2, EP=8/16, DP=32 (dp = world/(PP*TP*CP) = 64/2 = 32)
#   EP does NOT reduce DP in Automodel — each DP rank still needs its own batch
#   layers_per_stage: 94/2 = 47
#
# IMPORTANT: Automodel reports tps/GPU dividing by dp_size (not world_size).
# With PP=2, dp_size=32, world_size=64 → raw reported value is 2x inflated.
# Always normalize to ÷world_size=64 for cross-framework comparison.
#
# Prereq: HF config.json cached at ~/work/hf_cache/Qwen3-235B-A22B/ on JUPITER
#
# Sweep axes:
#   - lbs: {4, 8, 16} — local batch size
#   - pp_mbs: {1, 2, 4} — pipeline microbatch size
#   - EP: {8, 16} — expert parallelism degree
#
# ── Results ──────────────────────────────────────────────────────────────────
# (to be filled in after jobs complete)

defaults:
  - ../../base
  - /backend: automodel
  - /container: jupiter_automodel
  - /slurm: jupiter
  - /sweep: none
  - override /backend/automodel/model: qwen3_moe_235BA22B
  - override /job: default
  - _self_

aux:
  experiment_group: "automodel_moe_235BA22B_speed_sweep"
  ep_tag: "ep8"

backend:
  automodel:
    benchmark:
      peak_tflops: 989
      num_nodes: 16

    distributed:
      strategy: fsdp2
      tp_size: 1
      cp_size: 1
      ep_size: 8
      pp_size: 2
      sequence_parallel: false
      activation_checkpointing: true
      pipeline:
        pp_schedule: 1f1b
        pp_microbatch_size: 2
        layers_per_stage: 47

    step_scheduler:
      global_batch_size: 128
      local_batch_size: 4
      max_steps: 50

    dist_env:
      backend: nccl
      timeout_minutes: 30

  env:
    NCCL_NET_GDR_LEVEL: "0"
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    TORCH_NCCL_AVOID_RECORD_STREAMS: "1"
    HF_DATASETS_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "static"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 16
    time: "00:45:00"
  env:
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: automodel_moe_235BA22B_${aux.ep_tag}_pp2_lbs${backend.automodel.step_scheduler.local_batch_size}_ppmbs${backend.automodel.distributed.pipeline.pp_microbatch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # dp_size = 64 / (PP=2 * TP=1 * CP=1) = 32. GBS = lbs * dp_size.
        # ── EP=8, lbs=4, pp_mbs=1 (conservative baseline) ─────────────────────
        - aux.ep_tag: ep8
          backend.automodel.distributed.ep_size: 8
          backend.automodel.distributed.pipeline.layers_per_stage: 47
          backend.automodel.step_scheduler.local_batch_size: 4
          backend.automodel.step_scheduler.global_batch_size: 128
          backend.automodel.distributed.pipeline.pp_microbatch_size: 1

        # ── EP=8, lbs=4, pp_mbs=2 ─────────────────────────────────────────────
        - aux.ep_tag: ep8
          backend.automodel.distributed.ep_size: 8
          backend.automodel.distributed.pipeline.layers_per_stage: 47
          backend.automodel.step_scheduler.local_batch_size: 4
          backend.automodel.step_scheduler.global_batch_size: 128
          backend.automodel.distributed.pipeline.pp_microbatch_size: 2

        # ── EP=8, lbs=4, pp_mbs=4 ─────────────────────────────────────────────
        - aux.ep_tag: ep8
          backend.automodel.distributed.ep_size: 8
          backend.automodel.distributed.pipeline.layers_per_stage: 47
          backend.automodel.step_scheduler.local_batch_size: 4
          backend.automodel.step_scheduler.global_batch_size: 128
          backend.automodel.distributed.pipeline.pp_microbatch_size: 4

        # ── EP=8, lbs=8, pp_mbs=2 ─────────────────────────────────────────────
        - aux.ep_tag: ep8
          backend.automodel.distributed.ep_size: 8
          backend.automodel.distributed.pipeline.layers_per_stage: 47
          backend.automodel.step_scheduler.local_batch_size: 8
          backend.automodel.step_scheduler.global_batch_size: 256
          backend.automodel.distributed.pipeline.pp_microbatch_size: 2

        # ── EP=8, lbs=8, pp_mbs=4 ─────────────────────────────────────────────
        - aux.ep_tag: ep8
          backend.automodel.distributed.ep_size: 8
          backend.automodel.distributed.pipeline.layers_per_stage: 47
          backend.automodel.step_scheduler.local_batch_size: 8
          backend.automodel.step_scheduler.global_batch_size: 256
          backend.automodel.distributed.pipeline.pp_microbatch_size: 4

        # ── EP=8, lbs=16, pp_mbs=4 ────────────────────────────────────────────
        - aux.ep_tag: ep8
          backend.automodel.distributed.ep_size: 8
          backend.automodel.distributed.pipeline.layers_per_stage: 47
          backend.automodel.step_scheduler.local_batch_size: 16
          backend.automodel.step_scheduler.global_batch_size: 512
          backend.automodel.distributed.pipeline.pp_microbatch_size: 4

        # ── EP=16, lbs=4, pp_mbs=2 (wider EP, less expert per GPU) ────────────
        - aux.ep_tag: ep16
          backend.automodel.distributed.ep_size: 16
          backend.automodel.distributed.pipeline.layers_per_stage: 47
          backend.automodel.step_scheduler.local_batch_size: 4
          backend.automodel.step_scheduler.global_batch_size: 128
          backend.automodel.distributed.pipeline.pp_microbatch_size: 2

        # ── EP=16, lbs=8, pp_mbs=4 ────────────────────────────────────────────
        - aux.ep_tag: ep16
          backend.automodel.distributed.ep_size: 16
          backend.automodel.distributed.pipeline.layers_per_stage: 47
          backend.automodel.step_scheduler.local_batch_size: 8
          backend.automodel.step_scheduler.global_batch_size: 256
          backend.automodel.distributed.pipeline.pp_microbatch_size: 4
