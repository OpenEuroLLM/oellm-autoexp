# @package _global_
# Megatron 235BA22B — ModelZoo GB200-reference parallelism on JUPITER (32 nodes, 128 GPUs)
#
# Reference: https://github.com/yanring/Megatron-MoE-ModelZoo (GB200 EP32 config)
# GB200 reference achieved 245-276 TFLOPS on H100 (256 GPUs, TP=2, PP=8, EP=32)
#
# Parallelism: TP=1, PP=4, EP=32 (exact GB200 parallelism for 128 GPUs)
#   DP = 128 / (1×4) = 32. EP=32 = DP → DP_no_ep = 1.
#   96 effective layers (94 + embedding + loss) → 24/stage.
#   VPP: 12 virtual stages/rank → 2 layers/virtual stage.
#   GBS = MBS × DP × num_micro = 1 × 32 × 32 = 1024 (matches reference).
#   Min microbatches for interleaved 1F1B: PP × chunks = 4 × 2 = 8.
#
# Memory per GPU (24 layers/stage, EP=32 → 4 experts/GPU):
#   4 experts × 24 layers × 3 × 4096 × 1536 × bf16 ≈ 3.6 GB expert params
#   Attention (TP=1): ~1.5 GB for 24 layers
#   Optimizer (distributed): ~10 GB
#   Activations (selective recompute): ~15-20 GB
#   Total: ~35-45 GiB — excellent headroom on 95 GiB
#
# Container: DeepEP+NVSHMEM
#
# ── Results ──────────────────────────────────────────────────────────────────
# (to be filled in after jobs complete)

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_235BA22B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_moe_235BA22B_modelzoo_32node"
  tag: "deepep_selrecomp"

backend:
  megatron:
    train_iters: 50
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001
    log_throughput: true

    # Parallelism: TP=1, PP=4, EP=32 (GB200 reference)
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 4
    expert_model_parallel_size: 32
    global_batch_size: 1024
    micro_batch_size: 1

    # Virtual Pipeline Parallelism
    account_for_embedding_in_pipeline_split: true
    account_for_loss_in_pipeline_split: true
    num_virtual_stages_per_pipeline_rank: 12

    # Flex dispatcher — DeepEP
    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: deepep
    moe_grouped_gemm: true
    moe_permute_fusion: true
    moe_router_fusion: true

    # Selective recompute
    recompute_granularity: selective
    recompute_modules:
      - moe_act
      - layernorm
    recompute_method: null
    recompute_num_layers: null

    sequence_parallel: false  # TP=1 → not needed

    use_distributed_optimizer: true
    cross_entropy_loss_fusion: true
    cross_entropy_fusion_impl: te
    enable_experimental: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    manual_gc: true
    manual_gc_interval: 5
    seq_length: 4096

    cuda_graph_impl: "none"
    cuda_graph_scope: "full"
    te_rng_tracker: true

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTHONPATH: ".:submodules/Megatron-LM:/opt/"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    PATH: "/usr/local/bin:/usr/bin:/bin"
    CUDNN_PATH: "/usr/lib/aarch64-linux-gnu"
    NCCL_NET_GDR_LEVEL: "0"
    PYTHONWARNINGS: "ignore::UserWarning"

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603312032.sif
  bind:
    - /e
    - /dev/shm
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 32
    time: "00:30:00"
  env:
    PYTORCH_CUDA_ALLOC_CONF: ""
    UB_SKIPMC: "1"
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: meg_modelzoo_235BA22B_32n_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ═══════════════════════════════════════════════════════════════════════
        # GB200 reference configs: TP=1, PP=4, EP=32
        # ═══════════════════════════════════════════════════════════════════════

        # ── DeepEP, selective recompute (exact GB200 reference) ────────────
        - aux.tag: deepep_selrecomp
          backend.megatron.moe_flex_dispatcher_backend: deepep

        # ── DeepEP, selective recompute + A2A overlap ─────────────────────
        # GB200 reference + 1F1B overlap (276 vs 245 TFLOPS on H100)
        - aux.tag: deepep_selrecomp_overlap
          backend.megatron.moe_flex_dispatcher_backend: deepep
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true
          backend.env.CUDA_DEVICE_MAX_CONNECTIONS: "32"
          backend.env.NVTE_FWD_LAYERNORM_SM_MARGIN: "24"
          backend.env.NVTE_BWD_LAYERNORM_SM_MARGIN: "24"

        # ── HybridEP, selective recompute ─────────────────────────────────
        - aux.tag: hybridep_selrecomp
          backend.megatron.moe_flex_dispatcher_backend: hybridep
          backend.megatron.moe_hybridep_num_sms: 32

        # ── DeepEP, full recompute (memory headroom comparison) ───────────
        - aux.tag: deepep_fullrecomp
          backend.megatron.moe_flex_dispatcher_backend: deepep
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_method: uniform
          backend.megatron.recompute_num_layers: 1
          backend.megatron.recompute_modules: null

        # ═══════════════════════════════════════════════════════════════════════
        # GB200 EP64 variant: TP=1, PP=2, EP=64
        # Reference uses this with MBS=2 and recompute-modules=moe
        # DP = 128/(1×2) = 64. EP=64 = DP → DP_no_ep = 1.
        # 96/2 = 48 layers/stage. VPP=24 → 2 layers/virtual.
        # GBS=1024, MBS=2 → num_micro = 1024/(2×64) = 8. Min for VPP.
        # ═══════════════════════════════════════════════════════════════════════

        - aux.tag: pp2_ep64_deepep
          backend.megatron.pipeline_model_parallel_size: 2
          backend.megatron.expert_model_parallel_size: 64
          backend.megatron.micro_batch_size: 2
          backend.megatron.num_virtual_stages_per_pipeline_rank: 24
          backend.megatron.moe_flex_dispatcher_backend: deepep
          backend.megatron.recompute_modules:
            - moe
