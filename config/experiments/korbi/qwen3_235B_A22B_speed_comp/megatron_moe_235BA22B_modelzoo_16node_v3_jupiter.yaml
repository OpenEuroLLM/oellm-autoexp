# @package _global_
# Megatron 235BA22B — ModelZoo (TP=1, PP=4, VPP=12) + Risto optimizations on JUPITER 16N
#
# v3: Adds options from risto_qwen3_train.sh / risto_qwen3_235BA22B_config.sh
#   that were missing in v2:
#   1. moe_permute_fusion: fuses token permutation ops in MoE dispatch
#   2. moe_router_fusion: fuses router softmax+topk into single kernel
#   3. NCCL HPC-X IB verbs plugin: native ibverbs/UCX for inter-node collectives
#      (bypasses IPoIB, uses RDMA SHARP plugin)
#   4. nemo-v26.02-nemotron3-super container (Risto's container, 19GB vs 297GB pt2510)
#      — different PyTorch/TE/NCCL versions, has RDMA SHARP plugin built-in
#
# Base: v2 best = TP=1, PP=4, EP=16, VPP=12, allgather, full recompute → 51.0 TFLOPS
# (selective recompute OOMed on 16N)
#
# ── Results ──────────────────────────────────────────────────────────────────
# (to be filled in after jobs complete)

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_235BA22B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_moe_235BA22B_modelzoo_16node_v3"
  tag: "baseline"

backend:
  megatron:
    train_iters: 50
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    log_throughput: true
    exit_interval: 50

    # ═══ ModelZoo parallelism: TP=1, PP=4, EP=16 ═══
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 4
    expert_model_parallel_size: 16
    context_parallel_size: 1
    global_batch_size: 1024
    micro_batch_size: 1

    # VPP: 96 layers / PP=4 = 24/stage, VPP=12 → 2 layers/virtual stage
    account_for_embedding_in_pipeline_split: true
    account_for_loss_in_pipeline_split: true
    num_virtual_stages_per_pipeline_rank: 12

    # ═══ Dispatcher: allgather ═══
    moe_token_dispatcher_type: allgather
    moe_grouped_gemm: true

    # ═══ MoE fusions (from Risto config — missing in v2) ═══
    moe_permute_fusion: true
    moe_router_fusion: true

    # ═══ Full recompute (selective OOMs at 16N) ═══
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    # ═══ Communication overlap ═══
    overlap_grad_reduce: true
    overlap_param_gather: true

    # ═══ Attention + compute ═══
    attention_backend: fused
    sequence_parallel: false   # TP=1 → no SP needed
    cross_entropy_loss_fusion: true
    cross_entropy_fusion_impl: te
    enable_experimental: true
    create_attention_mask_in_dataloader: false

    # ═══ Router ═══
    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    moe_aux_loss_coeff: 0.001
    moe_z_loss_coeff: 1e-4

    # ═══ Optimizer ═══
    use_distributed_optimizer: true
    lr: 3e-4
    min_lr: 0
    adam_beta1: 0.9
    adam_beta2: 0.95

    # ═══ Memory ═══
    manual_gc: true
    manual_gc_interval: 5

    # ═══ Data — mock ═══
    mock_data: true
    seq_length: 4096
    max_position_embeddings: 4096

    # ═══ Misc ═══
    te_rng_tracker: true
    cuda_graph_impl: "none"
    cuda_graph_scope: "full"
    make_vocab_size_divisible_by: 256
    dataloader_type: single

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    NCCL_NVLS_ENABLE: "1"
    NVTE_ALLOW_NONDETERMINISTIC_ALGO: "1"
    PYTHONPATH: ".:submodules/Megatron-LM:/opt/"
    NCCL_NET_GDR_LEVEL: "0"
    PYTHONWARNINGS: "ignore::UserWarning"

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER_pt2510_aarch64_202602262033.sif

slurm:
  sbatch:
    nodes: 16
    time: "00:30:00"
  env:
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    UB_SKIPMC: "1"
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: meg_mz_235BA22B_16n_v3_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ═══════════════════════════════════════════════════════════════════════
        # Round 2: nemo container + router_fusion isolation
        # (Round 1 results: permute_fusion=catastrophic, NCCL IB=neutral on pt2510)
        # ═══════════════════════════════════════════════════════════════════════

        # ── 5. nemo container, no fusions (isolate container effect) ────────
        - aux.tag: nemo_nofusions
          container.image: "/e/project1/laionize/luukkonen1/container_cachedir/nemo-v26.02-nemotron3-super.sif"
          backend.megatron.moe_permute_fusion: false
          backend.megatron.moe_router_fusion: false

        # ── 6. nemo container + NCCL IB plugin (no fusions) ─────────────────
        - aux.tag: nemo_nccl_ib
          container.image: "/e/project1/laionize/luukkonen1/container_cachedir/nemo-v26.02-nemotron3-super.sif"
          backend.megatron.moe_permute_fusion: false
          backend.megatron.moe_router_fusion: false
          backend.env.NCCL_NET_PLUGIN: "/opt/hpcx/nccl_rdma_sharp_plugin/lib/libnccl-net.so"
          backend.env.NCCL_SOCKET_FAMILY: "AF_INET"
          backend.env.NCCL_SOCKET_IFNAME: "ib"

        # ── 7. nemo container + router_fusion only (no permute_fusion) ──────
        - aux.tag: nemo_routerfusion_nccl_ib
          container.image: "/e/project1/laionize/luukkonen1/container_cachedir/nemo-v26.02-nemotron3-super.sif"
          backend.megatron.moe_permute_fusion: false
          backend.megatron.moe_router_fusion: true
          backend.env.NCCL_NET_PLUGIN: "/opt/hpcx/nccl_rdma_sharp_plugin/lib/libnccl-net.so"
          backend.env.NCCL_SOCKET_FAMILY: "AF_INET"
          backend.env.NCCL_SOCKET_IFNAME: "ib"

        # ── 8. pt2510 + router_fusion only (no permute_fusion) ──────────────
        - aux.tag: routerfusion_only
          backend.megatron.moe_permute_fusion: false
          backend.megatron.moe_router_fusion: true
