# @package _global_
# Titan 235BA22B PP=2 debug — verify both PP+FSDP reshard fixes work (no OOM)
# Fix 1 (backward): backward_maybe_with_nosync set reshard_after_backward=False always
# → all 47 layers' unsharded params accumulated in memory during backward.
# Fix: monkey-patch in titan_custom_config.py sets reshard_after_backward=True.
# Fix 2 (forward): fsdp_reshard_after_forward='default' → False when PP enabled
# → all 47 layers' AllGather buffers (~35 GiB) accumulate during forward.
# Fix: set fsdp_reshard_after_forward: always in parallelism config.
# Job 324626 OOM'd at 89.69 GiB in forward (MoE AllToAll token combine).
# Expected memory with both fixes: ~50-55 GiB (fits within 95 GiB).

defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_235BA22B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_235BA22B_pp2ep8_debug"
  compile_tag: "nocompile"
  ac_tag: "full"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b
      multiple_of: null

    training:
      steps: 15
      local_batch_size: 4
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 1

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 2
      expert_parallel_degree: 8
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 32
      context_parallel_degree: 1
      fsdp_reshard_after_forward: always  # Fix: default=False with PP, causes ~35 GiB AllGather buffer accumulation

    activation_checkpoint:
      mode: full

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "1"
    PYTHONPATH: "${oc.env:HOME}/work/Projects/oellm-autoexp:${oc.env:HOME}/work/Projects/oellm-autoexp/submodules/titan-oellm:${oc.env:HOME}/work/Projects/oellm-autoexp/submodules/titan-oellm/torchtitan"
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "120"            # 2-min timeout to fail fast on NCCL hang
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_NET_GDR_LEVEL: "0"        # REQUIRED: PP inter-node P2P hangs with GDR_LEVEL=2
    NCCL_DEBUG: "WARN"             # Basic NCCL warnings only
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_235BA22B_pp2ep8_debug_acfull_bs4
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 16
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "00:30:00"
    exclude: "jpbo-070-17,jpbo-070-18,jpbo-070-19,jpbo-070-20,jpbo-070-21,jpbo-070-22,jpbo-070-23,jpbo-070-25,jpbo-070-26,jpbo-070-29,jpbo-070-30,jpbo-070-31,jpbo-070-32,jpbo-070-33,jpbo-070-34,jpbo-070-35,jpbo-070-36,jpbo-070-39,jpbo-070-40,jpbo-070-41,jpbo-070-42,jpbo-070-43,jpbo-070-44,jpbo-070-45,jpbo-070-46,jpbo-070-47,jpbo-070-48,jpbo-093-33,jpbo-093-34,jpbo-093-35,jpbo-093-37,jpbo-093-39,jpbo-093-41,jpbo-093-43,jpbo-093-44,jpbo-093-45,jpbo-093-47,jpbo-093-48,jpbo-097-01,jpbo-097-02,jpbo-097-03,jpbo-097-04,jpbo-097-05,jpbo-097-06,jpbo-097-07,jpbo-097-08,jpbo-097-09,jpbo-097-10,jpbo-097-11,jpbo-097-12,jpbo-097-13,jpbo-097-14,jpbo-097-15,jpbo-097-16,jpbo-097-17,jpbo-097-19,jpbo-097-20,jpbo-097-21,jpbo-097-22,jpbo-097-23,jpbo-097-24,jpbo-097-25,jpbo-097-26,jpbo-097-27,jpbo-097-28,jpbo-097-32,jpbo-097-33,jpbo-097-34,jpbo-097-35,jpbo-097-36,jpbo-097-37,jpbo-097-38,jpbo-097-39,jpbo-097-40,jpbo-097-41,jpbo-097-42,jpbo-097-43,jpbo-097-44,jpbo-097-45,jpbo-097-46,jpbo-097-47,jpbo-097-48,jpbo-100-01,jpbo-100-02,jpbo-100-03,jpbo-100-04,jpbo-100-05,jpbo-100-06,jpbo-100-09,jpbo-100-10,jpbo-100-11,jpbo-100-12,jpbo-100-13,jpbo-100-14,jpbo-100-15,jpbo-100-16,jpbo-100-17,jpbo-100-18,jpbo-100-19,jpbo-100-20,jpbo-100-23,jpbo-100-24,jpbo-100-25,jpbo-100-26,jpbo-100-27,jpbo-100-28,jpbo-100-29,jpbo-100-30,jpbo-100-31,jpbo-100-32,jpbo-100-34,jpbo-100-35,jpbo-100-36,jpbo-100-37,jpbo-100-38,jpbo-100-39,jpbo-100-40,jpbo-100-41,jpbo-100-42,jpbo-100-43,jpbo-100-44,jpbo-100-45,jpbo-100-46,jpbo-100-47,jpbo-100-48"
  srun_opts: "--mpi=none --nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"
