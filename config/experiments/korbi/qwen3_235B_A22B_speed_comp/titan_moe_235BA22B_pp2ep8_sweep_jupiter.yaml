# @package _global_
# Titan 235BA22B PP=2 sweep — JUPITER (16 nodes, 64×GH200)
#
# Architecture: 94 layers, dim=4096, 64 heads, 4 KV heads (GQA)
#               128 experts, topk=8, moe_inter_dim=1536
#
# Parallelism: PP=2, EP=8, dp_shard=32, TP=1
#   Total GPUs = PP × dp_shard = 2 × 32 = 64 ✓
#   efsdp = dp_shard / EP = 32 / 8 = 4 → expert AllGather = 4 GPUs = 1 node (NVLink!)
#   Layers per stage: 94 / 2 = 47
#
# Motivation: PP=1 + FSDP(64) forces full-AC (no-AC OOMs even at bs=1).
#   PP=2 halves activation memory per stage (47 layers, 1 microbatch in-flight via 1F1B).
#   Expected: no-AC viable (~65-68 GiB at bs=1), selective-AC with large batch possible.
#
# Memory model (empirical, 1F1B flat with batch size):
#   Fixed overhead (optimizer+params+FSDP): ~38-41 GiB (same params/GPU as PP=1)
#   No-AC activations (47 layers, 1 microbatch): ~27 GiB  (half of PP=1's 54 GiB)
#   Total no-AC: ~65-68 GiB  ← should fit within 95 GiB
#   Selective-AC opt=4 (75% stored): ~20 GiB activations → total ~58-61 GiB
#
# CRITICAL: NCCL_NET_GDR_LEVEL=0 required — PP inter-node P2P hangs with GDR_LEVEL=2
#   (same issue as 30BA3B PP=2; see MEMORY.md issue #5)
#
# ── Results ──────────────────────────────────────────────────────────────────
# (to be filled in after jobs complete)

defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_235BA22B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_235BA22B_pp2ep8_sweep"
  compile_tag: "nocompile"
  ac_tag: "full"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b
      multiple_of: null

    training:
      steps: 100
      local_batch_size: 4
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 10

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 2
      expert_parallel_degree: 8
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 32
      context_parallel_degree: 1

    activation_checkpoint:
      mode: full

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "1"
    PYTHONPATH: "${oc.env:HOME}/work/Projects/oellm-autoexp:${oc.env:HOME}/work/Projects/oellm-autoexp/submodules/titan-oellm:${oc.env:HOME}/work/Projects/oellm-autoexp/submodules/titan-oellm/torchtitan"
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_NET_GDR_LEVEL: "0"        # REQUIRED: PP inter-node P2P hangs with GDR_LEVEL=2
    NCCL_DEBUG: "WARN"             # Enable NCCL warnings for debugging init hang
    NCCL_TIMEOUT: "120"            # Short timeout (2 min) to fail fast on hang
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_235BA22B_pp2ep8_${aux.compile_tag}_ac${aux.ac_tag}_bs${backend.titan.training.local_batch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 16
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "00:10:00"
  srun_opts: "--mpi=none --nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: nocompile + full-AC + bs=4 (sanity check) ───────────────
        # Baseline to verify PP=2 works. Memory ~same as PP=1 full-AC bs=1 (~40 GiB).
        # 1F1B: only 1 microbatch activations in-flight → memory flat with batch size.
        # Expected: <50 GiB, training should run without OOM.
        - aux.compile_tag: nocompile
          aux.ac_tag: full
          backend.titan.activation_checkpoint.mode: full
          backend.titan.training.local_batch_size: 4
          backend.env.TORCHDYNAMO_DISABLE: "1"

        # ── Config 1: nocompile + no-AC + bs=4 ────────────────────────────────
        # Key test: does no-AC fit? Expected ~65-68 GiB (38 GiB fixed + 27 GiB activations).
        # PP=2 halves activation memory vs PP=1 (47 layers, 1 microbatch via 1F1B).
        # PP=1 no-AC OOMed at 95 GiB; PP=2 should bring this down to ~65-68 GiB.
        - aux.compile_tag: nocompile
          aux.ac_tag: noac
          backend.titan.activation_checkpoint.mode: none
          backend.titan.training.local_batch_size: 4
          backend.env.TORCHDYNAMO_DISABLE: "1"

        # ── Config 2: nocompile + no-AC + bs=64 ───────────────────────────────
        # Throughput test with no-AC. Memory should be flat (1F1B) vs bs=4.
        # Pipeline bubble: 1/(64-1) ≈ 1.6% — nearly ideal efficiency.
        # Expected: significant throughput over PP=1 full-AC (46-47 TFLOPS).
        - aux.compile_tag: nocompile
          aux.ac_tag: noac
          backend.titan.activation_checkpoint.mode: none
          backend.titan.training.local_batch_size: 64
          backend.env.TORCHDYNAMO_DISABLE: "1"

        # ── Config 3: nocompile + selective-AC opt=4 + bs=64 ──────────────────
        # Safer memory profile: 75% of layer activations stored, 25% recomputed.
        # Expected: ~58-61 GiB, slightly lower throughput than no-AC.
        # Good candidate if no-AC has memory issues with MoE token imbalance spikes.
        - aux.compile_tag: nocompile
          aux.ac_tag: selac_opt4
          backend.titan.activation_checkpoint.mode: selective
          backend.titan.activation_checkpoint.selective_ac_option: "4"
          backend.titan.training.local_batch_size: 64
          backend.env.TORCHDYNAMO_DISABLE: "1"
