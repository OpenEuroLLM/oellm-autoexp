# @package _global_
# Titan 235BA22B selective-AC sweep — trying to exceed no-AC bs=16 (252 TFLOPS)
#
# Architecture: 94 layers, dim=4096, 64 heads, 4 KV heads (GQA)
#               128 experts, topk=8, moe_inter_dim=1536
# Parallelism: EP=8, dp_shard=64, PP=1, TP=1
#
# Current best (no-AC, bs=16): 251.95 TFLOPS, 73.91 GiB (78%)
# bs=32 with no-AC: OOM
#
# Strategy: selective-AC saves ~25% of activation memory (opt=4: every 4th layer recomputed)
# Memory model from no-AC data: A ≈ 4.56 GiB/sample, fixed overhead ≈ 0.90 GiB
#
#   bs=16  no-AC:  73.91 GiB (78%)    ← current optimal
#   bs=16  opt=4:  ~55.7 GiB (59%)   saves 18 GiB, allows higher bs
#   bs=20  opt=4:  ~69.3 GiB (73%)   fits well
#   bs=24  opt=4:  ~83.0 GiB (87%)   fits, good headroom
#   bs=28  opt=4:  ~96.7 GiB (OOM)   expected OOM
#
# ── RESULTS: selective-AC is NOT viable for PP=1 + FSDP (235BA22B) ──────────
#   NOTE: Jobs 322034-322037 used BUGGY titan_custom_config.py (wrong model).
#   All results below (73.91 GiB, 252 TFLOPS) are from the WRONG model — INVALID.
#
#   Correct 235BA22B (2026-03-30 re-run, 323676-323684):
#   - ALL no-AC configs OOM (even nocompile+no-AC+bs=1 hits 95 GiB)
#   - No-AC is INFEASIBLE for 235BA22B on 64×GH200 with PP=1+FSDP
#   - Only full-AC is viable: bs=1→40 GiB, bs=4→69 GiB
#   - See titan_moe_235BA22B_fullac_bs_sweep_jupiter.yaml for correct sweep
#
defaults:
  - ../../base
  - /backend: titan
  - /container: jupiter_titan
  - /slurm: jupiter
  - /sweep: none
  - override /backend/titan/data: nemonicco_jupiter
  - override /backend/titan/model: qwen3_moe_235BA22B
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_235BA22B_selac_sweep"
  compile_tag: "compile"
  ac_opt_tag: "opt4"

backend:
  titan:
    model:
      vocab_size: 50304
      tokenizer_path: /e/project1/projectnucleus/franke5/workspace/titan-train/torchtitan/assets/tokenizer/gpt-neox-20b
      multiple_of: null

    training:
      steps: 100
      local_batch_size: 16
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 10

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 1
      expert_parallel_degree: 8
      data_parallel_replicate_degree: 1
      data_parallel_shard_degree: 64
      context_parallel_degree: 1

    activation_checkpoint:
      mode: selective
      selective_ac_option: "4"

    benchmarks:
      wikitext2_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext2/wikitext2
      wikitext103_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/wikitext103/wikitext103
      lambada_path: /e/project1/projectnucleus/franke5/data/benchmarks/neox/lambada/lambada

  env:
    TORCHDYNAMO_DISABLE: "0"
    PYTHONPATH: "${oc.env:HOME}/work/Projects/oellm-autoexp:${oc.env:HOME}/work/Projects/oellm-autoexp/submodules/titan-oellm:${oc.env:HOME}/work/Projects/oellm-autoexp/submodules/titan-oellm/torchtitan"
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_ALGO: "Ring"
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_235BA22B_ep8_${aux.compile_tag}_ac${aux.ac_opt_tag}_bs${backend.titan.training.local_batch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  template_path: "templates/jupiter_mod.sbatch"
  sbatch:
    nodes: 16
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 72
    threads_per_core: 1
    account: ${oc.env:SLURM_ACCOUNT,e-sta-openeurollm}
    partition: booster
    time: "00:45:00"
  srun_opts: "--nodes=$SLURM_NNODES --gres=gpu:4 --cpus-per-task=72 --wait=20 --kill-on-bad-exit=1 --label "
  env:
    NUM_NODES: "$SLURM_JOB_NUM_NODES"
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
    SLURM_CPUS_PER_TASK: "72"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: compile + selective opt=4 + bs=16 (comparison baseline) ───
        # Same bs as no-AC optimal. Saves ~18 GiB → 55.7 GiB (59%).
        # Expected: slightly below no-AC 252 TFLOPS (recompute overhead).
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt4
          backend.titan.activation_checkpoint.mode: selective
          backend.titan.activation_checkpoint.selective_ac_option: "4"
          backend.titan.training.local_batch_size: 16
          # Result: OOM — 91-92 GiB (job 322036). selective-AC +18 GiB vs no-AC 73.91 GiB!

        # ── Config 1: compile + selective opt=4 + bs=20 ──────────────────────────
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt4
          backend.titan.activation_checkpoint.mode: selective
          backend.titan.activation_checkpoint.selective_ac_option: "4"
          backend.titan.training.local_batch_size: 20
          # Result: OOM — ~88 GiB (job 322037)

        # ── Config 2: compile + selective opt=4 + bs=24 ──────────────────────────
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt4
          backend.titan.activation_checkpoint.mode: selective
          backend.titan.activation_checkpoint.selective_ac_option: "4"
          backend.titan.training.local_batch_size: 24
          # Result: OOM — 89-93 GiB (job 322035)

        # ── Config 3: compile + selective opt=4 + bs=28 ──────────────────────────
        - aux.compile_tag: compile
          aux.ac_opt_tag: opt4
          backend.titan.activation_checkpoint.mode: selective
          backend.titan.activation_checkpoint.selective_ac_option: "4"
          backend.titan.training.local_batch_size: 28
          # Result: OOM (job 322034 — as expected)
