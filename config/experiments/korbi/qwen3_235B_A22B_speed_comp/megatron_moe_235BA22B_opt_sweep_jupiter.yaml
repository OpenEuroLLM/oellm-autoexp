# @package _global_
# Megatron 235BA22B optimization sweep — testing alltoall dispatcher
#
# Architecture: 94 layers, hidden=4096, TP=4, PP=2, EP=8 (only viable config)
#   DP = world_size / (TP×PP) = 64 / (4×2) = 8
#   EP=8 → expert groups span 2 nodes each (inter-node IB communication)
#
# Baseline (from prior sweep): allgather, mbs=1, full-recompute
#   → 27.5 TFLOPS, 75.3 GiB (79%)  (job 307427)
#
# Optimization lever: alltoall dispatcher
#   For 30BA3B (EP=4 intra-node): allgather +13% over alltoall (NVLink favors allgather)
#   For 235BA22B (EP=8 inter-node IB): unclear — alltoall routes only relevant tokens
#   (8 tokens/expert/GPU for topk=8) vs allgather (all tokens replicated)
#   Inter-node EP may benefit from alltoall's smaller footprint.
#
# NOTE: container.yaml points to non-existent sif; override with known-good pt2510.
#
# ── Parallelism constraints (all others OOM or invalid) ─────────────────────
#   PP=1 OOM (all 94 layers on GPU, doubles model footprint)
#   EP=4 OOM (52.88 GiB grad buffer from 32 experts × 47 layers DDP)
#   No-recompute OOM at mbs=1 (94.6 GiB, only 0.4 GiB headroom)
#   mbs=1 optimal (mbs=2: 84% mem, mbs=4: 94% slower)
#   → TP=4+PP=2+EP=8, mbs=1, full-recompute is the only viable config
#
defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_235BA22B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_moe_235BA22B_opt_sweep"
  recompute_tag: "full_recompute"
  dispatcher_tag: "allgather"

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001

    global_batch_size: 64
    micro_batch_size: 1
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 2
    tensor_model_parallel_size: 4

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: "fp32"
    moe_token_dispatcher_type: allgather

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONWARNINGS: "ignore::UserWarning"
    NCCL_NET_GDR_LEVEL: "0"  # disable GDRDMA — required for PP=2 inter-node P2P
    CUDA_DEVICE_MAX_CONNECTIONS: "1"  # required for TP≥2

# Override broken container.yaml (202603120039.sif doesn't exist on cluster)
container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER_pt2510_aarch64_202602262033.sif

job:
  name: meg_moe_235BA22B_tp${backend.megatron.tensor_model_parallel_size}_ep${backend.megatron.expert_model_parallel_size}_pp${backend.megatron.pipeline_model_parallel_size}_mbs${backend.megatron.micro_batch_size}_${aux.recompute_tag}_${aux.dispatcher_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

slurm:
  sbatch:
    nodes: 16
    time: "00:45:00"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── Config 0: allgather (baseline re-run) ─────────────────────────────────
        # Confirm prior result: 27.5 TFLOPS, 75.3 GiB (79%) (job 307427)
        - aux.dispatcher_tag: allgather
          backend.megatron.moe_token_dispatcher_type: allgather
          # Result: 26.7 TFLOPS, 183.2 tps/GPU, 75.4 GiB (79%)

        # ── Config 1: alltoall dispatcher ─────────────────────────────────────────
        # For EP=8 inter-node (IB): alltoall routes only selected tokens per expert
        # (topk=8 → 8 tokens/expert/GPU) vs allgather (all tokens broadcast to all ranks).
        # For 30BA3B intra-node EP=4: allgather +13% (NVLink favors allgather).
        # For inter-node EP=8 on IB: alltoall may be comparable or better.
        - aux.dispatcher_tag: alltoall
          backend.megatron.moe_token_dispatcher_type: alltoall
          # Result: 17.1 TFLOPS, 117.7 tps/GPU, 82.7 GiB (87%) — alltoall 36% SLOWER
