# @package _global_
# NeMo Automodel MoE 235BA22B scaling sweep — 64 nodes (256 GPUs) on JUPITER
#
# Architecture: 94 layers, hidden=4096, 128 experts, topk=8
# Parallelism: PP=2, EP sweep, DP varies
#   layers_per_stage: 94/2 = 47
#
# Sweep axes:
#   - EP: {16, 32, 64}
#   - lbs: {4, 8, 16}
#   - pp_mbs: {2, 4}
#
# EP=16: DP = 256/(2*16) = 8
# EP=32: DP = 256/(2*32) = 4
# EP=64: DP = 256/(2*64) = 2
#
# IMPORTANT: Automodel reports tps/GPU ÷ dp_size. Always normalize to ÷world_size.
#
# CRITICAL FIX: rdzv_backend changed from "c10d" to "static" (2026-04-10).
# c10d dynamic discovery failed at 64 nodes — ALL configs got
# RendezvousConnectionError. "static" avoids dynamic discovery entirely.
#
# ── Results (64 nodes, 256×GH200) ────────────────────────────────────────────
# c10d backend: ALL failed with RendezvousConnectionError (2026-04-10)
# static backend: ALL OOM — same memory bottleneck as 16/32-node.
# Automodel accumulates all microbatch logits before loss computation,
# causing OOM regardless of EP/lbs/ppmbs configuration.

defaults:
  - ../../base
  - /backend: automodel
  - /container: jupiter_automodel
  - /slurm: jupiter
  - /sweep: none
  - override /backend/automodel/model: qwen3_moe_235BA22B
  - override /job: default
  - _self_

aux:
  experiment_group: "automodel_moe_235BA22B_64node_sweep"
  ep_tag: "ep16"

backend:
  automodel:
    benchmark:
      peak_tflops: 989
      num_nodes: 64

    distributed:
      strategy: fsdp2
      tp_size: 1
      cp_size: 1
      ep_size: 16
      pp_size: 2
      sequence_parallel: false
      activation_checkpointing: true
      pipeline:
        pp_schedule: 1f1b
        pp_microbatch_size: 2
        layers_per_stage: 47

    step_scheduler:
      global_batch_size: 512
      local_batch_size: 4
      max_steps: 50

    dist_env:
      backend: nccl
      timeout_minutes: 30

  env:
    NCCL_NET_GDR_LEVEL: "0"
    NCCL_SOCKET_FAMILY: "AF_INET"
    GLOO_SOCKET_FAMILY: "AF_INET"
    NCCL_SOCKET_IFNAME: "ib0"
    GLOO_SOCKET_IFNAME: "ib0"
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    TORCH_NCCL_AVOID_RECORD_STREAMS: "1"
    HF_DATASETS_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "static"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

container:
  bind:
    - /e/
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 64
    time: "00:45:00"
  env:
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: automodel_moe_235BA22B_64node_${aux.ep_tag}_lbs${backend.automodel.step_scheduler.local_batch_size}_ppmbs${backend.automodel.distributed.pipeline.pp_microbatch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # dp_size = 256 / (PP=2 * TP=1 * CP=1) = 128. GBS = lbs * dp_size.
        # ── EP=16, lbs=4, pp_mbs=2 ────────────────────────────────────────────
        - aux.ep_tag: ep16
          backend.automodel.distributed.ep_size: 16
          backend.automodel.step_scheduler.local_batch_size: 4
          backend.automodel.step_scheduler.global_batch_size: 512
          backend.automodel.distributed.pipeline.pp_microbatch_size: 2

        # ── EP=16, lbs=8, pp_mbs=4 ────────────────────────────────────────────
        - aux.ep_tag: ep16
          backend.automodel.distributed.ep_size: 16
          backend.automodel.step_scheduler.local_batch_size: 8
          backend.automodel.step_scheduler.global_batch_size: 1024
          backend.automodel.distributed.pipeline.pp_microbatch_size: 4

        # ── EP=16, lbs=16, pp_mbs=4 ───────────────────────────────────────────
        - aux.ep_tag: ep16
          backend.automodel.distributed.ep_size: 16
          backend.automodel.step_scheduler.local_batch_size: 16
          backend.automodel.step_scheduler.global_batch_size: 2048
          backend.automodel.distributed.pipeline.pp_microbatch_size: 4

        # ── EP=32, lbs=4, pp_mbs=2 ────────────────────────────────────────────
        - aux.ep_tag: ep32
          backend.automodel.distributed.ep_size: 32
          backend.automodel.step_scheduler.local_batch_size: 4
          backend.automodel.step_scheduler.global_batch_size: 512
          backend.automodel.distributed.pipeline.pp_microbatch_size: 2

        # ── EP=32, lbs=8, pp_mbs=4 ────────────────────────────────────────────
        - aux.ep_tag: ep32
          backend.automodel.distributed.ep_size: 32
          backend.automodel.step_scheduler.local_batch_size: 8
          backend.automodel.step_scheduler.global_batch_size: 1024
          backend.automodel.distributed.pipeline.pp_microbatch_size: 4

        # ── EP=64, lbs=4, pp_mbs=2 ────────────────────────────────────────────
        - aux.ep_tag: ep64
          backend.automodel.distributed.ep_size: 64
          backend.automodel.step_scheduler.local_batch_size: 4
          backend.automodel.step_scheduler.global_batch_size: 512
          backend.automodel.distributed.pipeline.pp_microbatch_size: 2

        # ── EP=64, lbs=8, pp_mbs=4 ────────────────────────────────────────────
        - aux.ep_tag: ep64
          backend.automodel.distributed.ep_size: 64
          backend.automodel.step_scheduler.local_batch_size: 8
          backend.automodel.step_scheduler.global_batch_size: 1024
          backend.automodel.distributed.pipeline.pp_microbatch_size: 4
