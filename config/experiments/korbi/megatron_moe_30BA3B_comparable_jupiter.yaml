# @package _global_
# Qwen3 30BA3B "maximally comparable" Megatron config for direct Titan comparison.
#
# Goal: eliminate confounding factors (batch size, TP/PP overhead) to isolate
#       framework overhead between Megatron and Titan on equal footing.
#
# Design choices (EP=8):
#   EP=8, PP=1, TP=1; DP = 8/(1×1) = 8 → distributed optimizer shards 8-way
#   mbs=1, GBS=8 (DP=8 × mbs=1); full_recompute → analogous to Titan AC=full
#
# Design choices (EP=4):
#   EP=4, PP=1, TP=1; DP = 8/(1×1) = 8 (unchanged) → optimizer still shards 8-way
#   mbs=1, GBS=8 (unchanged); 32 experts/GPU (vs 16 for EP=8)
#   EP=4 ≤ DP=8 ✓; 2 independent EP groups of 4 within DP=8
#   Expert grad buffer ≈ 32 experts × 48 layers × 3×768×2048 ≈ 14.5 GiB (fits)
#
# Comparable Titan config: titan_moe_30BA3B_comparable_jupiter.yaml
#
# ── Results (2 nodes, 8×GH200, PP=1, TP=1, GBS=8) ──────────────────────────
# EP=8:
#   mbs=1, full_recompute → 56.2 TFLOPS,  2,583 TPS/GPU, 81.3% mem (job 309061) ← EP=8 BEST
#   mbs=1, no_recompute   → OOM at iter 2 (94.75 GiB in use) (job 309060)
#   mbs=2, full_recompute → 64.3 TFLOPS,  2,954 TPS/GPU, 85.3% mem (job 311769)
#   mbs=4, full_recompute → 65.9 TFLOPS,  3,030 TPS/GPU, 94.9% mem (job 311770) ← mbs max
# EP=4:
#   mbs=1, full_recompute → OOM (NCCL calloc 4 bytes: 0 free GPU mem after init) (job 309632)
#   mbs=1, no_recompute   → OOM (same; 2× expert params fills GPU) (job 309631)
#   Root cause: 32 experts/GPU × 48 layers ≈ 14.5 GiB extra params vs EP=8 (7.24 GiB)
#
# Key finding (EP=8): At bs=1+full_AC, Titan (56.9 TFLOPS, 41,720 TPS/GPU) ≈ Megatron in TFLOPS
#   but Titan is 16× faster in TPS/GPU (41,720 vs 2,583) due to different FLOPs/token accounting.
# At larger mbs: Megatron memory-limited (mbs=4 max, 94.9%); only 17% gain mbs=1→4.
# Titan full_AC TPS/GPU: bs=1→41,720; bs=2→82,524; bs=4→133,010; bs=8→153,134.
# At mbs=4 (equal batch): Titan 133,010 vs Megatron 3,030 TPS/GPU → Titan 44× faster in TPS.
#
defaults:
  - ../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_moe_30BA3B_comparable"
  recompute_tag: "full_recompute"
  ep_tag: "ep8"

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001

    global_batch_size: 8   # DP=8 × mbs=1 × 1 microbatch/step
    micro_batch_size: 1
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 1
    tensor_model_parallel_size: 1

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: "fp32"
    moe_token_dispatcher_type: allgather

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONWARNINGS: "ignore::UserWarning"
    NCCL_NET_GDR_LEVEL: "0"  # keep for safety; PP=1 has no P2P but harmless

job:
  name: meg_moe_30BA3B_${aux.ep_tag}_pp1_mbs${backend.megatron.micro_batch_size}_${aux.recompute_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── full recompute (analogous to Titan AC=full) ───────────────────────
        - aux.recompute_tag: full_recompute
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 56.2 TFLOPS, 2,583 TPS/GPU, 81.3% mem (job 309061) ← OPTIMAL

        # ── no recompute (analogous to Titan AC=none; may fit at mbs=1) ──────
        - aux.recompute_tag: no_recompute
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          # Result: OOM at iter 2 (94.75 GiB, alloc failed for 196 MiB in expert fc1) (job 309060)

        # ── EP=4 (32 experts/GPU; DP=8 unchanged, 2 EP groups of 4) ─────────
        # Expert grad buffer ≈ 14.5 GiB; EP=4 halves EP comm, more expert compute
        - aux.ep_tag: ep4
          aux.recompute_tag: full_recompute
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: OOM — NCCL calloc 4 bytes fails (0 free GPU mem after init) (job 309632)

        - aux.ep_tag: ep4
          aux.recompute_tag: no_recompute
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          # Result: OOM — same (2× expert params vs EP=8 exceeds 95 GiB) (job 309631)

        # ── EP=8 larger mbs (full_recompute only; no_recompute OOMs at mbs=1) ─
        # mbs=1 used 81.3% mem; mbs=4 squeezes in at 94.9% (barely fits!)
        - aux.recompute_tag: full_recompute
          backend.megatron.micro_batch_size: 2
          backend.megatron.global_batch_size: 16  # DP=8 × mbs=2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 64.3 TFLOPS, 2,954 TPS/GPU, 85.3% mem (job 311769)

        - aux.recompute_tag: full_recompute
          backend.megatron.micro_batch_size: 4
          backend.megatron.global_batch_size: 32  # DP=8 × mbs=4
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 65.9 TFLOPS, 3,030 TPS/GPU, 94.9% mem (job 311770) ← barely fits; mbs=8 will OOM
