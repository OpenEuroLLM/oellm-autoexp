# @package _global_
# MoE speed sweep for Megatron Qwen3 30BA3B on JUPITER (2 nodes, 8 GPUs)
#
# Architecture: 48 layers, hidden=2048, 128 experts, topk=8, moe_inter_dim=768
# Parallelism baseline: EP=4, PP=2, TP=1 → EP is intra-node (NVLink), PP crosses nodes.
#
# Key constraint: EP=4 + PP=2 keeps expert allgather within each node (4 GPUs/node).
#   PP stage 0 = node 0 (layers 0-23), PP stage 1 = node 1 (layers 24-47).
#   EP=8 + PP=1 would push EP across both nodes (IB) — expected to be slower.
#
# Sweep axes:
#   - recompute: full (baseline) vs selective (moe_act+layernorm) vs none
#   - micro_batch_size: 4 (baseline) vs 8
#   - EP/PP layout: EP=4+PP=2 (intra-node EP) vs EP=8+PP=1 (inter-node EP)
#
# ── Measured results (2 nodes, 8×GH200, EP=4+PP=2) ──────────────────────────
#   EP=4+PP=2, mbs4, full_recompute    → 118.4 TFLOPS, 85% mem  ← OPTIMAL
#   EP=4+PP=2, mbs4, selective_recompute → OOM (94.6 GiB / 95 GiB)
#   EP=4+PP=2, mbs4, no_recompute       → OOM (94.7 GiB / 95 GiB)
#   EP=4+PP=2, mbs8, full_recompute    → 101.9 TFLOPS, 96% mem  (mbs4 faster)
#   EP=8+PP=1, mbs4, full_recompute    →  74.5 TFLOPS, 95% mem  (inter-node EP ~37% slower)
#
# Key findings:
#   - Full recompute required: selective/no recompute OOM with EP=4 (32 experts/GPU)
#   - EP=4+PP=2 (intra-node EP) is 59% faster than EP=8+PP=1 (inter-node EP via IB)
#   - mbs4 faster than mbs8 for full recompute (118 vs 102 TFLOPS)
#   - NCCL_NET_GDR_LEVEL=0 required: PP=2 inter-node P2P hangs without it
#   - vs Titan backend: Titan optimal (263 TFLOPS) is 2.2× faster than Megatron (118 TFLOPS)
defaults:
  - ../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_moe_30BA3B_speed_sweep"
  recompute_tag: "full_recompute"  # overridden per sweep config

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001

    global_batch_size: 64
    micro_batch_size: 4
    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 2
    tensor_model_parallel_size: 1

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: "fp32"
    moe_token_dispatcher_type: allgather

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONWARNINGS: "ignore::UserWarning"
    NCCL_NET_GDR_LEVEL: "0"  # disable GDRDMA — fixes IB hang with PP=2 inter-node P2P

job:
  name: meg_moe_30BA3B_ep${backend.megatron.expert_model_parallel_size}_pp${backend.megatron.pipeline_model_parallel_size}_mbs${backend.megatron.micro_batch_size}_${aux.recompute_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── EP=4+PP=2 (intra-node EP via NVLink) ─────────────────────────────
        - aux.recompute_tag: full_recompute
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.pipeline_model_parallel_size: 2
          backend.megatron.micro_batch_size: 4
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 118.4 TFLOPS, 85% mem (job 306180) ← OPTIMAL

        - aux.recompute_tag: selective_recompute
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.pipeline_model_parallel_size: 2
          backend.megatron.micro_batch_size: 4
          backend.megatron.recompute_granularity: selective
          backend.megatron.recompute_method: null  # required: selective granularity rejects non-null method
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: ["moe_act", "layernorm"]
          # Result: OOM — 94.6 GiB / 95 GiB (job 306177)

        - aux.recompute_tag: no_recompute
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.pipeline_model_parallel_size: 2
          backend.megatron.micro_batch_size: 4
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          # Result: OOM — 94.7 GiB / 95 GiB (job 306179)

        - aux.recompute_tag: full_recompute_mbs8
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.pipeline_model_parallel_size: 2
          backend.megatron.micro_batch_size: 8
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 101.9 TFLOPS, 96% mem (job 306176) — mbs4 faster

        # ── EP=8+PP=1 (inter-node EP via IB) ─────────────────────────────────
        - aux.recompute_tag: full_recompute
          backend.megatron.expert_model_parallel_size: 8
          backend.megatron.pipeline_model_parallel_size: 1
          backend.megatron.micro_batch_size: 4
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 74.5 TFLOPS, 95% mem (job 306178) — inter-node EP ~37% slower than EP=4+PP=2
