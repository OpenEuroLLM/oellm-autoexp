# @package _global_
# DeepEP EP=4 intra-node — Round 2 sweep (follow-up from round 1)
#
# Round 1 findings:
#   OK:  full_recompute mbs=2        → 75.4 TFLOPS, 87.3% mem
#   OK:  full_recompute mbs=2 VPP=2  → 93.4 TFLOPS, 88.9% mem  (+24%)
#   OK:  full_recompute mbs=4        → 106.2 TFLOPS, 97.4% mem  (+41%)
#   OOM: no_recompute   mbs=2        → 94.37 GiB (needs ~95.6 GiB)
#   OOM: selective_recompute mbs=2   → 94.89 GiB (needs ~95.2 GiB)
#   ERR: ep_overlap + PP>1 without VPP → AssertionError (VPP required)
#   ERR: ep_overlap + full_recompute  → AssertionError (full AC forbidden)
#
# Round 2 targets:
#   1. VPP=2 + mbs=4: combine best two round-1 gains → est. ~113+ TFLOPS
#   2. VPP=2 + mbs=4 + selective_recompute: remove recompute overhead (mbs=4 selective: est. ~89 GiB)
#      selective overhead at mbs=2 was ~11.3 GiB → at mbs=4 is ~22.6 GiB? No—
#      selective overhead = (94.89 - 82.9) × (mbs_factor / 2) ...
#      Actually selective-vs-full overhead at mbs=2 = 94.89 - 82.9 = 12 GiB
#      At mbs=4 (double): ~24 GiB extra → 82.9 + 24 = 106.9 GiB → OOM. Skip mbs=4+selective.
#   3. VPP=2 + ep_overlap + selective_recompute + mbs=1:
#      Fixes round-1 assertions. selective at mbs=1 ≈ 82.9 - 1 + 6 = 87.9 GiB (OK).
#      VPP satisfies PP>1 assertion. selective satisfies no-full-AC assertion.
#   4. VPP=2 + ep_overlap + no_recompute + mbs=1:
#      Most aggressive: no AC overhead + EP comm overlap + VPP pipeline efficiency.
#      no_recompute at mbs=1: 82.9 - 1 + 11.5 = 93.4 GiB (est. 98% — tight but likely fits)
#
# Memory math (EP4+PP2, per-GPU):
#   full_recompute mbs=2 baseline: 82.9 GiB (87.3%)
#   Activation overhead (no_recompute vs full_recompute at mbs=2): 11.5 GiB
#   → at mbs=1: ~5.75 GiB overhead → 82.9 - 0.5 + 5.75 = 88.2 GiB (93%) — fits
#   Activation overhead (selective vs full at mbs=2): 12 GiB
#   → at mbs=1: ~6 GiB overhead → 82.9 - 0.5 + 6 = 88.4 GiB (93%) — fits

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_deepep_ep4_sweep"
  tag: "full_recompute_mbs4_vpp2"

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001
    log_throughput: true

    global_batch_size: ${oc.muli:${.micro_batch_size},${slurm.sbatch.nodes},${slurm.sbatch.gpus_per_node}}
    micro_batch_size: 4
    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 2
    tensor_model_parallel_size: 1
    num_layers_per_virtual_pipeline_stage: 12  # VPP=2 (48 layers / PP=2 / VPP=2)

    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: deepep
    moe_grouped_gemm: true
    moe_permute_fusion: true

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    seq_length: 4096

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTHONPATH: ".:submodules/Megatron-LM:/opt/"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    PATH: "/usr/local/bin:/usr/bin:/bin"
    CUDNN_PATH: "/usr/lib/aarch64-linux-gnu"

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603312032.sif
  bind:
    - /e
    - /dev/shm
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"
  env:
    PYTORCH_CUDA_ALLOC_CONF: ""
    UB_SKIPMC: "1"
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: deepep_ep4_pp2_mbs${backend.megatron.micro_batch_size}_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:

        # ── 1. VPP=2 + mbs=4 + full recompute ───────────────────────────────
        # Combines round-1's two best gains: +24% (VPP) + +41% (mbs) vs baseline.
        # Memory: full_recompute mbs=4 used 97.4% without VPP; VPP adds tiny overhead
        # from interleaved schedule book-keeping (< 0.5 GiB). Should still fit.
        # Estimate: 113–118 TFLOPS
        - aux.tag: full_recompute_mbs4_vpp2
          backend.megatron.micro_batch_size: 4
          backend.megatron.num_layers_per_virtual_pipeline_stage: 12
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1

        # ── 2. VPP=2 + ep_overlap + selective_recompute + mbs=1 ─────────────
        # FIXED version of round-1 ep_overlap failures:
        #   VPP=12 satisfies "VPP required when PP>1" assertion.
        #   selective satisfies "full AC forbidden with ep_overlap" assertion.
        #   mbs=1 keeps memory ~88 GiB (93%) — well within limits.
        # With 8 grad-accum microbatches (GBS=8 at mbs=1), the 1F1B+interleaved
        # schedule gives ep_overlap plenty of microbatches to overlap over.
        - aux.tag: selective_recompute_mbs1_vpp2_ep_overlap
          backend.megatron.micro_batch_size: 1
          backend.megatron.num_layers_per_virtual_pipeline_stage: 12
          backend.megatron.recompute_granularity: selective
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: ["moe_act", "layernorm"]
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 3. VPP=2 + ep_overlap + no_recompute + mbs=1 ────────────────────
        # Most aggressive: no AC + EP comm overlap + VPP bubble reduction.
        # Memory est.: full_recompute_mbs1 ≈ 82.4 GiB; no_recompute overhead at mbs=1
        #   = (no_recompute OOM at 94.37 GiB, mbs=2) / 2 ≈ 5.7 GiB → 88.1 GiB (93%) ✓
        # If ep_overlap reduces effective peak memory further: even better.
        - aux.tag: no_recompute_mbs1_vpp2_ep_overlap
          backend.megatron.micro_batch_size: 1
          backend.megatron.num_layers_per_virtual_pipeline_stage: 12
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 4. VPP=2 + ep_overlap + no_recompute + mbs=2 ────────────────────
        # Tries mbs=2 no_recompute + VPP + ep_overlap.
        # Memory: no_recompute mbs=2 already OOMed at 94.37 GiB.
        # ep_overlap may reduce peak by pipelining, but unlikely to save 1.5 GiB.
        # Included as an OOM boundary check — expect failure but worth confirming.
        - aux.tag: no_recompute_mbs2_vpp2_ep_overlap
          backend.megatron.micro_batch_size: 2
          backend.megatron.num_layers_per_virtual_pipeline_stage: 12
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true
