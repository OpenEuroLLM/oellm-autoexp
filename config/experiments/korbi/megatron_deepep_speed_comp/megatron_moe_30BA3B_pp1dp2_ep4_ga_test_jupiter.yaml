# @package _global_
# PP=1+EP=4+DP=8(effective_expert_DP=2) — GA=1 test with memory fixes
#
# Key findings from previous runs:
#   - DP=8 in Megatron (EP is within DP), so min GBS = 8 (mbs=1 × DP=8)
#   - GA=1 (GBS=8): train_step COMPLETES, but NCCL OOMs (4 bytes!) in
#     post-step training_log → track_moe_metrics → all_reduce
#   - Fix: empty_unused_memory_level=2 → torch.cuda.empty_cache() after
#     each step, releasing PyTorch's cached memory for NCCL workspace

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_deepep_pp1dp2_ep4"
  tag: "full_recompute_mbs1_ga1_emptycache"

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001
    log_throughput: true

    global_batch_size: 8             # DP=8, mbs=1 → GA=1 (minimum)
    micro_batch_size: 1

    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    tensor_model_parallel_size: 1
    num_layers_per_virtual_pipeline_stage: null
    sequence_parallel: false

    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: deepep
    moe_grouped_gemm: true
    moe_permute_fusion: true

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    overlap_grad_reduce: false
    overlap_param_gather: false

    # Force PyTorch to release cached memory after each step so NCCL can
    # allocate workspace for post-step all_reduce (MoE metrics, etc.).
    empty_unused_memory_level: 2
    manual_gc: true
    manual_gc_interval: 1

    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    seq_length: 4096

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTHONPATH: ".:submodules/Megatron-LM:/opt/"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    PATH: "/usr/local/bin:/usr/bin:/bin"
    CUDNN_PATH: "/usr/lib/aarch64-linux-gnu"

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603312032.sif
  bind:
    - /e
    - /dev/shm
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"
  env:
    # expandable_segments:True avoids allocator fragmentation (train_step needs it).
    # NCCL_CUMEM_ENABLE=0 forces NCCL to use cudaMalloc (compatible with cuMemMap).
    # NCCL_BUFFSIZE=262144 (256KB) reduces NCCL buffer from 512 MiB to ~32 MiB total.
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    UB_SKIPMC: "1"
    NCCL_NET_GDR_LEVEL: "0"
    NCCL_CUMEM_ENABLE: "0"
    NCCL_BUFFSIZE: "262144"

job:
  name: deepep_pp1dp2_ep4_mbs${backend.megatron.micro_batch_size}_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # GA=1, empty_unused_memory_level=2, manual_gc_interval=1
        # The train_step itself fits (confirmed in job 328520); only the
        # post-step NCCL all_reduce OOMs. empty_cache() should fix that.
        - aux.tag: full_recompute_mbs1_ga1_emptycache
          backend.megatron.global_batch_size: 8      # DP=8, mbs=1 → GA=1

        # Same but with GA=2 (GBS=16) to check if gradients from 2 microbatches
        # push peak memory over during train_step itself.
        - aux.tag: full_recompute_mbs1_ga2_emptycache
          backend.megatron.global_batch_size: 16     # DP=8, mbs=1 → GA=2
