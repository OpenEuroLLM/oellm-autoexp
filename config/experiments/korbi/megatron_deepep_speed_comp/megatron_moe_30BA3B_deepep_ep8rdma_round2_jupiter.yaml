# @package _global_
# DeepEP EP=8 cross-node RDMA — Round 2 sweep (follow-up from round 1)
#
# Round 1 findings:
#   OK:    full_recompute mbs=2         → 93.6 TFLOPS, 96.6% mem (91.8 GiB)
#   ERR:   full_recompute + ep_overlap  → AssertionError: full AC forbidden with ep_overlap
#   OOM:   selective_recompute mbs=2    → 94.84 GiB (needs ~95.3 GiB)
#   HANG:  no_recompute mbs=1           → DeepEP dispatch CPU timeout
#   HANG:  no_recompute mbs=1 ep_overlap → DeepEP dispatch CPU timeout
#
# Round 2 targets:
#   1. selective_recompute + mbs=1 + ep_overlap:
#      Fixes full-AC assertion. mbs=1 halves activation overhead vs mbs=2.
#      selective overhead at mbs=2: 94.84 - 91.8 = 3.04 GiB; at mbs=1: ~1.52 GiB
#      mbs=1 full_recompute ≈ 91.8 - 0.8 = 91.0 GiB; +1.52 = 92.5 GiB (97.4%) ← tight
#      With ep_overlap (batch-level pipelining), peak may be slightly lower.
#      The no_recompute timeout at mbs=1 may not apply to selective_recompute (different
#      compute pattern — selective keeps more in-memory tensors, changes CUDA timing).
#
#   2. selective_recompute + mbs=1 (no ep_overlap):
#      Control: same as above but without ep_overlap, to isolate timeout vs config issue.
#      If this also times out: the mbs=1 EP8 RDMA path has a fundamental issue.
#      If this works: ep_overlap adds/removes the timeout behavior.
#
#   3. full_recompute + mbs=4:
#      EP8 full_recompute mbs=2 = 91.8 GiB (96.6%). mbs=4 activation overhead (full recompute)
#      is small (recompute stores only layer inputs): ~+0.8 GiB → 92.6 GiB (97.5%). Likely fits.
#      Tests whether larger batch improves GPU utilization (expect +5-15% over mbs=2).

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_deepep_ep8rdma_sweep"
  tag: "full_recompute_mbs4"

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001
    log_throughput: true

    global_batch_size: ${oc.muli:${.micro_batch_size},${slurm.sbatch.nodes},${slurm.sbatch.gpus_per_node}}
    micro_batch_size: 2
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 1
    tensor_model_parallel_size: 1

    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: deepep
    moe_grouped_gemm: true
    moe_permute_fusion: true

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    seq_length: 4096

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTHONPATH: "/e/scratch/projectnucleus/poeppel1/deep_ep_jupiter4gpu:.:submodules/Megatron-LM:/opt/"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    PATH: "/usr/local/bin:/usr/bin:/bin"
    CUDNN_PATH: "/usr/lib/aarch64-linux-gnu"

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603310850.sif
  bind:
    - /e
    - /dev/shm
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"
  env:
    PYTORCH_CUDA_ALLOC_CONF: ""
    UB_SKIPMC: "1"

job:
  name: deepep_ep8rdma_pp1_mbs${backend.megatron.micro_batch_size}_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:

        # ── 1. full_recompute + mbs=4 ─────────────────────────────────────────
        # Memory: mbs=2 full_recompute = 91.8 GiB (96.6%). Full recompute activation
        # overhead scales weakly with mbs (stores only layer inputs, not intermediates).
        # Estimate mbs=4: +~1 GiB → 92.8 GiB (97.7%) — fits.
        # Tests whether larger batch improves GEMM efficiency at EP=8.
        - aux.tag: full_recompute_mbs4
          backend.megatron.micro_batch_size: 4
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1

        # ── 2. selective_recompute + mbs=1 (control, no ep_overlap) ──────────
        # Control case: same as ep_overlap below but without the overlap flag.
        # Distinguishes whether mbs=1 EP8 RDMA hanging is config-specific (no_recompute)
        # or fundamental to mbs=1 EP8. selective keeps more tensors in memory than
        # no_recompute → different compute/memory access pattern → may avoid timeout.
        # Memory est.: 91.0 + 1.52 = 92.5 GiB (97.4%) — tight but expected to fit.
        - aux.tag: selective_recompute_mbs1
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: selective
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: ["moe_act", "layernorm"]

        # ── 3. selective_recompute + mbs=1 + ep_overlap ───────────────────────
        # KEY TEST: fixes round-1 full-AC assertion error + tests EP RDMA comm overlap.
        # selective satisfies no-full-AC assertion. mbs=1 avoids selective OOM at mbs=2.
        # ep_overlap overlaps inter-node RDMA AllToAll with computation.
        # Note: PP=1 → no 1F1B schedule. Overlap works via CUDA streams across
        # consecutive grad-accum microbatches (8 microbatches at mbs=1, GBS=8).
        - aux.tag: selective_recompute_mbs1_ep_overlap
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: selective
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: ["moe_act", "layernorm"]
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true
