# @package _global_
# PP=1 + EP=4 (intra-node NVLink) + DP=2 (inter-node gradient sync)
#
# Motivation (see topology_analysis_jupiter.md):
#   Current best PP=2+EP=4+VPP=2+mbs=4+full_recompute: ~127 TFLOPS, 12.8% MFU
#   PP=2+VPP=2 contributes ~25% pipeline bubble overhead (idle time).
#   This config eliminates the bubble entirely:
#     - EP=4 stays intra-node (NVLink, no IB for EP AllToAll)
#     - Cross-node IB only for DP gradient reduce-scatter (once per optimizer step)
#     - Gradient reduce-scatter: ~9.75B params × 2 bytes / 2 DP ranks = ~9.75 GB
#       → ~390 ms over IB at ~25 GB/s, amortized over GA=16 steps → ~3-4% overhead
#       → with overlap_grad_reduce=true: fully hidden (if it works)
#
# Parallelism: TP=1, PP=1, EP=4 (intra-node), DP=2 (inter-node)
#   Node 0: EP group (4 GPUs, experts sharded intra-node via NVLink)
#   Node 1: DP replica of node 0 (same expert layout, independent data)
#   Total GPUs: 2 nodes × 4 GPUs = 8, all parallelism accounted for (1×1×4×2=8)
#
# GBS/GA with mbs=1 + DP=2:
#   global_batch_size=32, mbs=1, DP=2 → GA = 32 / (1 × 2) = 16 steps per DP rank
#   Same GBS as best PP=2 config for fair throughput comparison.
#
# Memory (tight — see analysis below):
#   PP=2→PP=1 doubles dense params per GPU (previously sharded across 2 PP stages).
#   ZeRO-1 with DP=2 halves optimizer state vs current DP=1 (no optimizer sharding).
#   Net effect depends on model's dense-vs-expert param ratio; borderline at mbs=1+full-AC.
#   Previous PP=1 OOM was with older config (likely without ZeRO-1 DP sharding).
#   mbs=2 expected to OOM; mbs=1 is the only viable option.
#
# ep_overlap + PP=1:
#   Round-1 ep_overlap assertion: "VPP required when PP>1". With PP=1, no constraint.
#   ep_overlap still requires non-full AC (Megatron assertion). Use selective or no AC.
#
# overlap_grad_reduce safety:
#   Known NCCL deadlock with overlap_grad_reduce=true for DDP on JUPITER inter-node
#   (confirmed with qwen3_125M). Distributed optimizer reduce-scatter may differ,
#   but start with overlap_grad_reduce=false. Enable only if stable.

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_deepep_pp1dp2_ep4"
  tag: "full_recompute_mbs1_no_overlap"

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001
    log_throughput: true

    global_batch_size: 32        # DP=2, mbs=1 → GA=16 steps/rank
    micro_batch_size: 1

    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 1
    tensor_model_parallel_size: 1
    num_layers_per_virtual_pipeline_stage: null  # no VPP with PP=1
    sequence_parallel: false                     # no-op at TP=1

    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: deepep
    moe_grouped_gemm: true
    moe_permute_fusion: true

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    overlap_grad_reduce: false       # SAFE: start here; true known to deadlock on JUPITER
    overlap_param_gather: false      # keep off; only useful with overlap_grad_reduce=true

    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    seq_length: 4096

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTHONPATH: ".:submodules/Megatron-LM:/opt/"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    PATH: "/usr/local/bin:/usr/bin:/bin"
    CUDNN_PATH: "/usr/lib/aarch64-linux-gnu"

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603312032.sif
  bind:
    - /e
    - /dev/shm
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"
  env:
    # expandable_segments:True fixes the allocator fragmentation issue (all configs OOM'd
    # at first train_step trying to allocate 20 MiB with 2.7 GiB reserved-but-unallocated).
    # Safe here because cuda_graph_impl: none (expandable_segments conflicts only with
    # CUDA graphs, which are disabled for DeepEP runs).
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    UB_SKIPMC: "1"
    NCCL_NET_GDR_LEVEL: "0"

job:
  name: deepep_pp1dp2_ep4_mbs${backend.megatron.micro_batch_size}_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:

        # ── 1. PP=1+DP=2, mbs=1, full_recompute, no overlap ─────────────────────
        # Primary OOM/correctness check. Most conservative — if this OOMs, nothing
        # else will work. Expected: ~170 TFLOPS (+35% vs PP=2 best) if memory fits.
        # GBS=32, DP=2, mbs=1 → 16 GA steps per DP rank.
        # overlap_grad_reduce=false: 390ms sync at end of optimizer step, ~3-4% overhead
        # (16 GA steps × ~700ms each → sync is ~3.5% of total step time).
        - aux.tag: full_recompute_mbs1_no_overlap
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_method: uniform
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_grad_reduce: false
          backend.megatron.overlap_param_gather: false
          backend.megatron.overlap_moe_expert_parallel_comm: false

        # ── 2. PP=1+DP=2, mbs=1, full_recompute, overlap_grad_reduce=true ───────
        # Tests whether distributed optimizer reduce-scatter can be overlapped.
        # DDP overlap_grad_reduce=true deadlocks on JUPITER inter-node (confirmed).
        # Distributed optimizer uses reduce-scatter (not allreduce) — may behave
        # differently. If this deadlocks, disable and use config 1 for production.
        # Expected: same TFLOPS as config 1, but ~3-4% less wall-clock overhead.
        - aux.tag: full_recompute_mbs1_overlap_grad
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_method: uniform
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_grad_reduce: true
          backend.megatron.overlap_param_gather: true
          backend.megatron.overlap_moe_expert_parallel_comm: false

        # ── 3. PP=1+DP=2, mbs=1, selective_recompute, ep_overlap ─────────────────
        # Adds EP comm overlap on top of config 1.
        # ep_overlap: with PP=1, VPP constraint is gone. Requires non-full AC.
        # selective AC (moe_act + layernorm): recomputes only cheap ops → memory
        # overhead ~6 GiB vs full recompute at mbs=1; total ~93-96 GiB (tight).
        # Expected: ~5-15% gain vs config 1 from hidden EP AllToAll overhead.
        - aux.tag: selective_recompute_mbs1_ep_overlap
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: selective
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: ["moe_act", "layernorm"]
          backend.megatron.overlap_grad_reduce: false
          backend.megatron.overlap_param_gather: false
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 4. PP=1+DP=2, mbs=1, no_recompute, ep_overlap ────────────────────────
        # Most aggressive: no AC + EP comm overlap. Memory is the main risk.
        # no_recompute at mbs=1: activation overhead ~5.75 GiB vs full recompute
        # (estimated from PP=2 round-1: no_recompute OOMed at 94.37 GiB at mbs=2
        #  → ~5.75 GiB overhead at mbs=1). With PP=1 doubling dense params, this
        # is more likely to OOM than with PP=2. Included as upper-bound check.
        - aux.tag: no_recompute_mbs1_ep_overlap
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: null
          backend.megatron.overlap_grad_reduce: false
          backend.megatron.overlap_param_gather: false
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 5. GA=2 (GBS=4, mbs=1, DP=2) ─────────────────────────────────────────
        # Tests whether very small GA affects peak memory (hypothesis: it doesn't,
        # since PP=1 processes microbatches sequentially and the gradient buffer is
        # pre-allocated at full parameter count size regardless of GA).
        # Expected: same OOM as config 1, confirming GA is not the bottleneck.
        - aux.tag: full_recompute_mbs1_no_overlap_ga2
          backend.megatron.micro_batch_size: 1
          backend.megatron.global_batch_size: 4      # DP=2, mbs=1 → GA=2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_method: uniform
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_grad_reduce: false
          backend.megatron.overlap_param_gather: false
          backend.megatron.overlap_moe_expert_parallel_comm: false

        # ── 6. GA=4 (GBS=8, mbs=1, DP=2) ─────────────────────────────────────────
        - aux.tag: full_recompute_mbs1_no_overlap_ga4
          backend.megatron.micro_batch_size: 1
          backend.megatron.global_batch_size: 8      # DP=2, mbs=1 → GA=4
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_method: uniform
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_grad_reduce: false
          backend.megatron.overlap_param_gather: false
          backend.megatron.overlap_moe_expert_parallel_comm: false

        # ── 8. GA sensitivity: GA=32 (GBS=64, mbs=1, DP=2) ──────────────────────
        # Doubles GA from 16→32. Motivation: overlap_grad_reduce=false costs ~390ms
        # per optimizer step regardless of GA. At GA=16, ~3.5% overhead; at GA=32,
        # ~1.8%. Also amortizes any other per-step fixed costs (NCCL allreduce of
        # expert router statistics, etc.).
        # Same safe settings as config 1 to isolate GA effect.
        - aux.tag: full_recompute_mbs1_no_overlap_ga32
          backend.megatron.micro_batch_size: 1
          backend.megatron.global_batch_size: 64    # DP=2, mbs=1 → GA=32
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_method: uniform
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_grad_reduce: false
          backend.megatron.overlap_param_gather: false
          backend.megatron.overlap_moe_expert_parallel_comm: false

        # ── 9. GA sensitivity: GA=64 (GBS=128, mbs=1, DP=2) ─────────────────────
        # Further doubles GA to 64. At this point grad-sync overhead is negligible
        # (<1%). Checks whether there are other fixed per-step costs worth amortizing.
        # Tradeoff: longer time-to-first-update; typically unimportant for benchmarking.
        - aux.tag: full_recompute_mbs1_no_overlap_ga64
          backend.megatron.micro_batch_size: 1
          backend.megatron.global_batch_size: 128   # DP=2, mbs=1 → GA=64
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_method: uniform
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_grad_reduce: false
          backend.megatron.overlap_param_gather: false
          backend.megatron.overlap_moe_expert_parallel_comm: false
