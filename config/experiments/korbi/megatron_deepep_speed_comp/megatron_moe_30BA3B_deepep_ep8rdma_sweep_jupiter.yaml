# @package _global_
# DeepEP cross-node RDMA optimization sweep for Megatron Qwen3 30BA3B on JUPITER
#
# EP=8 cross-node via NVSHMEM/InfiniBand RDMA — requires custom-compiled deep_ep.
# Requires: scripts/build_deepep_jupiter4gpu.sh (NUM_MAX_NVL_PEERS=4 patch).
#
# Parallelism: EP=8 (cross-node IB RDMA), PP=1, TP=1
#   DP = 8 GPUs / (EP=8 × PP=1 × TP=1) = 1 → 8 grad-accum microbatches per optimizer step
#   GBS formula = mbs × nodes × gpus_per_node = mbs × 8
#
# Container: MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603310850.sif
#   (older container; patched deep_ep .so installed at deep_ep_jupiter4gpu/ on scratch)
# Custom deep_ep:
#   PYTHONPATH starts with /e/scratch/projectnucleus/poeppel1/deep_ep_jupiter4gpu
#   .so uses DT_RPATH=/e/scratch/projectnucleus/poeppel1/nvshmem_344_staging/lib
#   → forces NVSHMEM 3.4.5 host lib (matches device code in .so)
#
# Memory at baseline (job 327550):
#   EP=8+PP=1, mbs=2, full_recompute → 97.9% = ~93 GiB (very tight!)
#   With full recompute, activation memory is small → mbs=1 ≈ 90-91 GiB
#   No-recompute mbs=1: activation overhead ~3.5 GiB/mbs → ~94 GiB → borderline
#
# ── Results ───────────────────────────────────────────────────────────────────
#   job 327607: EP=8+PP=1, mbs=2, full_recompute → 93.6 TFLOPS, 96.6% mem (91.8 GiB)
#   (better than EP=4+PP=2+mbs=2 at 75.4 TFLOPS; no PP overhead)
#
#   EP8 RDMA is MEMORY SATURATED — NVSHMEM AllToAll buffers consume ~3-4 GiB that PyTorch
#   doesn't count in "allocated" (only in CUDA reserved). mbs=2+full_recompute is the only
#   viable config. Any change (mbs=4, selective recompute, ep_overlap) causes OOM cascade →
#   DeepEP dispatch CPU timeout on other ranks.
#
#   OOM cascade:  mbs=4+full_recompute     → rank 6 OOM, others DeepEP timeout (job 327619)
#   OOM cascade:  mbs=1+selective          → rank 6 OOM at 85.1 GiB (job 327620)
#   OOM cascade:  mbs=1+selective+ep_overlap → OOM at 84.9 GiB (job 327621)
#   HANG:         mbs=1+no_recompute       → DeepEP dispatch CPU timeout (jobs 327602/603)
#
#   CONCLUSION: EP8 RDMA best config = mbs=2, full_recompute → 93.6 TFLOPS. No further gains
#   possible without reducing model size or using a GPU with more VRAM.
#
# ── Key optimization: overlap_moe_expert_parallel_comm ───────────────────────
#   With EP=8 cross-node RDMA, inter-node AllToAll latency is high (IB vs NVLink).
#   Batch-level overlap hides this latency: while EP AllToAll of microbatch N is in
#   flight, GPU computes expert FFN for microbatch N-1.
#   With 8 grad-accum steps per optimizer step, there are 8 microbatches to overlap.
#   NOTE: `overlap_moe_expert_parallel_comm` is documented for 1F1B schedule (PP≥2).
#   With PP=1, behavior may differ — included to test; worst case is a no-op or error.

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_deepep_ep8rdma_sweep"
  tag: "full_recompute_mbs2"

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001
    log_throughput: true

    global_batch_size: ${oc.muli:${.micro_batch_size},${slurm.sbatch.nodes},${slurm.sbatch.gpus_per_node}}
    micro_batch_size: 2
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 1
    tensor_model_parallel_size: 1

    # DeepEP flex dispatcher
    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: deepep
    moe_grouped_gemm: true
    moe_permute_fusion: true

    # Full recompute (base default; explicit here for clarity)
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    seq_length: 4096

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    # Custom-built deep_ep (NUM_MAX_NVL_PEERS=4) must come first in PYTHONPATH
    PYTHONPATH: "/e/scratch/projectnucleus/poeppel1/deep_ep_jupiter4gpu:.:submodules/Megatron-LM:/opt/"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    PATH: "/usr/local/bin:/usr/bin:/bin"
    CUDNN_PATH: "/usr/lib/aarch64-linux-gnu"
    # NVSHMEM_IB_ENABLE_IBGDA: set automatically by deep_ep/buffer.py during Buffer init

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603310850.sif
  bind:
    - /e
    - /dev/shm
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"
  env:
    PYTORCH_CUDA_ALLOC_CONF: ""
    UB_SKIPMC: "1"
    # No NCCL_NET_GDR_LEVEL=0 needed: PP=1 has no inter-node P2P (only EP NVSHMEM RDMA)

job:
  name: deepep_ep8rdma_pp1_mbs${backend.megatron.micro_batch_size}_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:

        # ── 1. BASELINE: full recompute, mbs=2 (already measured: ~82 TFLOPS) ──────
        - aux.tag: full_recompute_mbs2
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Measured (job 327550): ~82 TFLOPS, 97.9% mem (93 GiB), 3.7 ktok/s/GPU

        # ── 2. EP A2A OVERLAP, full recompute, mbs=2 ────────────────────────────
        # KEY TEST: overlaps RDMA AllToAll of microbatch N with expert FFN of mb N-1.
        # High-latency IB makes this the most impactful optimization for cross-node EP.
        # Note: with PP=1 the 1F1B schedule is not active; overlap works via CUDA
        # streams within a single forward pass between consecutive microbatches.
        - aux.tag: full_recompute_mbs2_ep_overlap
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 3. EP A2A OVERLAP, full recompute, mbs=1 ────────────────────────────
        # Lower memory pressure: mbs=1 ≈ 90 GiB (8% headroom vs 2% at mbs=2).
        # More stable for NVSHMEM operations; GBS=8 → 8 grad-accum microbatches.
        - aux.tag: full_recompute_mbs1_ep_overlap
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 4. NO RECOMPUTE, mbs=1 ───────────────────────────────────────────────
        # Memory estimate: 90 GiB (mbs=1 full_recompute) + ~3.5 GiB (activations at mbs=1)
        #   ≈ 93.5 GiB ← borderline (98.4%) — may OOM; worth testing.
        # Expected gain if it fits: +30-35% → ~107 TFLOPS
        - aux.tag: no_recompute_mbs1
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null

        # ── 5. NO RECOMPUTE + EP OVERLAP, mbs=1 ─────────────────────────────────
        # Most optimistic: no AC overhead + hidden RDMA latency.
        - aux.tag: no_recompute_mbs1_ep_overlap
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 6. SELECTIVE RECOMPUTE, mbs=2 ────────────────────────────────────────
        # Recomputes moe_act+layernorm only (cheap). Saves ~3-5 GiB vs no_recompute.
        # Memory estimate: ~91 GiB (96%) — tighter than EP=4 case due to larger EP buffers.
        - aux.tag: selective_recompute_mbs2
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: selective
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: ["moe_act", "layernorm"]

        # ── 7. ALL OVERLAPS, full recompute, mbs=2 ───────────────────────────────
        # Adds grad reduce-scatter and param all-gather overlaps on top of EP overlap.
        # With DP=1, overlap_grad_reduce/overlap_param_gather are no-ops (no DP comm).
        # Included to confirm no interference with other flags.
        - aux.tag: full_recompute_mbs2_all_overlap
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true
          backend.megatron.overlap_grad_reduce: true
          backend.megatron.overlap_param_gather: true
