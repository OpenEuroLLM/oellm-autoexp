# @package _global_
# DeepEP intra-node optimization sweep for Megatron Qwen3 30BA3B on JUPITER
#
# EP=4 intra-node NVLink DeepEP — container deep_ep at /opt/, no custom build needed.
# Container: MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603312032.sif
#
# Parallelism: EP=4 (intra-node NVLink), PP=2 (inter-node IB P2P), TP=1
#   DP = 8 GPUs / (EP=4 × PP=2 × TP=1) = 1 → 8 grad-accum microbatches per optimizer step
#   GBS formula = mbs × nodes × gpus_per_node = mbs × 8
#
# Memory math (from allgather EP=4+PP=2+mbs=4+full_recompute → 85% = 80.75 GiB):
#   DeepEP adds NVSHMEM buffer overhead: EP=4+PP=2+mbs=2+full_recompute → 88% = 83.6 GiB
#   Activation overhead at mbs=2 (full→no recompute, allgather mbs=4 reference):
#     allgather no_recompute OOMed at 94.6 GiB (mbs=4) → ~13.8 GiB extra activations at mbs=4
#     At mbs=2: ~6.9 GiB extra → DeepEP no_recompute mbs=2 ≈ 83.6 + 6.9 = 90.5 GiB ← likely fits!
#
# ── Results ───────────────────────────────────────────────────────────────────
#   job 327594: EP=4+PP=2, mbs=2, full_recompute              →  75.4 TFLOPS, 87.3% mem
#   job 327600: EP=4+PP=2, mbs=2, full_recompute, VPP=2       →  93.4 TFLOPS, 88.9% mem (+24%)
#   job 327599: EP=4+PP=2, mbs=4, full_recompute              → 106.2 TFLOPS, 97.4% mem (+41%)
#   job 327618: EP=4+PP=2, mbs=4, full_recompute, VPP=2       → ~127 TFLOPS, 94.8% mem ← BEST
#   allgather ref (job 306180): EP=4+PP=2, mbs=4, full_recompute → 118 TFLOPS (no VPP, no DeepEP)
#
#   OOM:  no_recompute mbs=2 → 94.37 GiB (95+ GiB needed)
#   OOM:  selective_recompute mbs=2 → 94.89 GiB
#   OOM:  ep_overlap + VPP=2 + mbs=1 (selective or no recompute) → 87+ GiB
#         ep_overlap adds ~2 GiB buffer overhead even at mbs=1
#   ERR:  ep_overlap + PP>1 without VPP → AssertionError (VPP required)
#   ERR:  ep_overlap + full_recompute → AssertionError (full AC forbidden)
#
# ── Sweep axes ────────────────────────────────────────────────────────────────
#   1. Activation recompute: full (baseline) → selective (moe_act+layernorm) → none
#   2. EP A2A comm overlap: overlap_moe_expert_parallel_comm + delay_wgrad_compute
#      Note: designed for PP≥2 1F1B schedule; with PP=2 this overlaps EP A2A of mb_N
#      with compute of mb_N+1 across 8 grad-accum microbatches.
#   3. micro_batch_size: 2 (baseline) vs 4 vs 8
#   4. VPP=2: num_layers_per_virtual_pipeline_stage=12 (48 layers / PP=2 / VPP=2)
#      → halves PP bubble; requires interleaved schedule

defaults:
  - ../../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_deepep_ep4_sweep"
  tag: "full_recompute_mbs2"

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001
    log_throughput: true

    global_batch_size: ${oc.muli:${.micro_batch_size},${slurm.sbatch.nodes},${slurm.sbatch.gpus_per_node}}
    micro_batch_size: 2
    expert_model_parallel_size: 4
    pipeline_model_parallel_size: 2
    tensor_model_parallel_size: 1

    # DeepEP flex dispatcher
    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: deepep
    moe_grouped_gemm: true
    moe_permute_fusion: true

    # Full recompute (base default from qwen3_moe.yaml; explicit here for clarity)
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: fp32
    moe_router_load_balancing_type: aux_loss
    seq_length: 4096

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
    PYTHONPATH: ".:submodules/Megatron-LM:/opt/"
    TRITON_LIBCUDA_PATH: "/opt/nvidia/lib"
    PATH: "/usr/local/bin:/usr/bin:/bin"
    CUDNN_PATH: "/usr/lib/aarch64-linux-gnu"

container:
  image: /e/scratch/projectnucleus/poeppel1/container_cache/MegatronTraining-JUPITER-deepep-nvshmem_base2510_aarch64_202603312032.sif
  bind:
    - /e
    - /dev/shm
    - /usr/lib64/libcuda.so.1:/opt/nvidia/lib/libcuda.so.1:ro
    - /usr/lib64/libcuda.so:/opt/nvidia/lib/libcuda.so:ro
    - /usr/lib64/libnvidia-ml.so.1:/opt/nvidia/lib/libnvidia-ml.so.1:ro
    - /usr/lib64/libnvidia-ptxjitcompiler.so.1:/opt/nvidia/lib/libnvidia-ptxjitcompiler.so.1:ro

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"
  env:
    PYTORCH_CUDA_ALLOC_CONF: ""
    UB_SKIPMC: "1"
    NCCL_NET_GDR_LEVEL: "0"   # PP=2 inter-node P2P hangs without this

job:
  name: deepep_ep4_pp2_mbs${backend.megatron.micro_batch_size}_${aux.tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:

        # ── 1. BASELINE: full recompute, mbs=2 (already measured: ~79 TFLOPS) ──────
        - aux.tag: full_recompute_mbs2
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Measured (job 327189): ~79 TFLOPS, 88% mem (83.6 GiB)

        # ── 2. NO RECOMPUTE, mbs=2 ───────────────────────────────────────────────
        # Estimated: +30-35% → ~104 TFLOPS. Memory: ~90.5 GiB (≈95% → should fit)
        - aux.tag: no_recompute_mbs2
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null

        # ── 3. SELECTIVE RECOMPUTE, mbs=2 ───────────────────────────────────────
        # Recomputes only moe_act (SiLU) + layernorm — cheap ops, frees large intermediates.
        # Estimated: +15-20% → ~91 TFLOPS. Memory: ~87 GiB (≈91% → comfortable)
        - aux.tag: selective_recompute_mbs2
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: selective
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: ["moe_act", "layernorm"]

        # ── 4. FULL RECOMPUTE, mbs=4 ────────────────────────────────────────────
        # Doubles batch size vs baseline. Memory estimate: 83.6 + (param-overhead) ≈ 88-91 GiB.
        - aux.tag: full_recompute_mbs4
          backend.megatron.micro_batch_size: 4
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1

        # ── 5. EP A2A OVERLAP, full recompute, mbs=2 ────────────────────────────
        # overlap_moe_expert_parallel_comm: overlaps EP AllToAll of microbatch N
        #   with computation of microbatch N+1 (batch-level, DualPipe-inspired).
        #   Requires PP≥2 for 1F1B schedule — PP=2 here with 8 grad-accum steps.
        # delay_wgrad_compute: defers weight gradient computation to after AllToAll,
        #   creating a larger window for comm to complete before next wgrad kernel.
        - aux.tag: full_recompute_mbs2_ep_overlap
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 6. EP A2A OVERLAP, no recompute, mbs=2 ──────────────────────────────
        # Best-case combination: remove recompute overhead + hide EP comm latency.
        # Most optimistic estimate: ~120+ TFLOPS
        - aux.tag: no_recompute_mbs2_ep_overlap
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 7. EP A2A OVERLAP, selective recompute, mbs=2 ───────────────────────
        - aux.tag: selective_recompute_mbs2_ep_overlap
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: selective
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.recompute_modules: ["moe_act", "layernorm"]
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 8. VPP=2, full recompute, mbs=2 ─────────────────────────────────────
        # Virtual Pipeline Parallelism: 2 virtual stages per real PP stage.
        #   48 layers / PP=2 / VPP=2 = 12 layers per virtual stage → 4 virtual stages total.
        #   Reduces pipeline bubble from 1/(PP=2) ≈ 50% to ~25%.
        # Note: requires DP×mbs > PP×VPP microbatches in flight; with 8 grad-accum steps: ✓
        - aux.tag: full_recompute_mbs2_vpp2
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          backend.megatron.num_layers_per_virtual_pipeline_stage: 12

        # ── 9. VPP=2 + EP A2A OVERLAP, full recompute, mbs=2 ───────────────────
        # Both pipeline bubble reduction and EP comm overlap.
        - aux.tag: full_recompute_mbs2_vpp2_ep_overlap
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          backend.megatron.num_layers_per_virtual_pipeline_stage: 12
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true

        # ── 10. VPP=2 + ALL OVERLAPS, no recompute, mbs=2 ───────────────────────
        # Maximum optimization: no AC + VPP + EP overlap + grad/param overlap.
        # overlap_grad_reduce: overlaps grad reduce-scatter with backward pass.
        # overlap_param_gather: overlaps param all-gather with forward pass.
        - aux.tag: no_recompute_mbs2_vpp2_all_overlap
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          backend.megatron.num_layers_per_virtual_pipeline_stage: 12
          backend.megatron.overlap_moe_expert_parallel_comm: true
          backend.megatron.delay_wgrad_compute: true
          backend.megatron.overlap_grad_reduce: true
          backend.megatron.overlap_param_gather: true
