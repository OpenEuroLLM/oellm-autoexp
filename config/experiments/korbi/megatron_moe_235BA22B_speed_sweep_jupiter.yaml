# @package _global_
# MoE speed sweep for Megatron Qwen3 235BA22B on JUPITER (16 nodes, 64 GPUs)
#
# Architecture: 94 layers, hidden=4096, 64 heads, 4 KV heads (GQA), head_dim=128
#               128 experts, topk=8, moe_inter_dim=1536, rope_theta=5000000
#
# Phase 1 — TP=4, PP=2, EP=8, DP=8  → 4×2×8 = 64 = world_size
#   PP=2: only valid pipeline option (94 layers, factors: 1, 2, 47, 94)
#   EP=8: intra-DP sharding (EP ≤ DP=8), 128/8 = 16 experts per GPU
#   TP=4: shards attention (64→16 heads/GPU, 4→1 KV heads/GPU — minimum allowed)
#          and dense layers; sequence_parallel enabled
#
# Phase 2 — EP=4 and PP=1 variants (indices 4–8)
#   A: TP=4, PP=1, EP=8, DP=16 — remove PP pipeline overhead (same EP=8)
#   B: TP=4, PP=2, EP=4, DP=8  — EP=4 (32 experts/GPU, less EP comm)
#   C: TP=4, PP=1, EP=4, DP=16 — no PP + EP=4
#   D: TP=2, PP=2, EP=4, DP=16 — less TP comm + EP=4
#   E: TP=2, PP=1, EP=4, DP=32 — minimal comm (TP=2, no PP, EP=4)
#
# Key constraints:
#   - NCCL_NET_GDR_LEVEL=0: PP≥2 inter-node P2P hangs with GDRDMA (kept for all)
#   - TP=4 required for GQA: 4 KV heads → 1 per TP rank minimum (can relax to TP=2: 2 per rank)
#   - PP=2 only pipeline option (94 not divisible by 4)
#   - CUDA_DEVICE_MAX_CONNECTIONS=1 required for TP≥2
#   - GBS=64 → num_microbatches = GBS / (mbs × DP_total)
#
# ── Measured results (16 nodes, 64×GH200) ──────────────────────────────────
# Phase 1: TP=4+PP=2+EP=8
#   mbs=1, full_recompute → 27.5 TFLOPS, 75.3 GiB (79%)  ← Phase-1 OPTIMAL
#   mbs=2, full_recompute → 27.2 TFLOPS, 80.0 GiB (84%)
#   mbs=4, full_recompute → 23.1 TFLOPS, 89.5 GiB (94%)  (timed out at iter 94)
#   mbs=1, no_recompute   → OOM (94.6 GiB / 95 GiB)
#
# Phase 2: EP=4 / PP=1 variants
#   A: TP=4, PP=1, EP=8 → OOM (94.97 GiB) — PP=1 doubles all 94 layers, fills GPU
#   B: TP=4, PP=2, EP=4 → OOM after 1 iter (11.7 TFLOPS, 96.1% / 91.3 GiB) — worse
#   C: TP=4, PP=1, EP=4 → OOM at init (52.88 GiB grad buffer: 32 experts × 47 layers)
#   D: TP=2, PP=2, EP=4 → OOM at init (same 52.88 GiB grad buffer)
#   E: TP=2, PP=1, EP=4 → OOM at init (same 52.88 GiB grad buffer)
#
# Key findings:
#   - Full recompute required: no-recompute OOM even at mbs=1 for TP=4+PP=2+EP=8
#   - mbs=1 optimal in phase 1: TP/PP comm dominates over batch throughput
#   - 27.5 TFLOPS vs Titan optimal of 251.95 TFLOPS → Titan 9.2× faster
#   - PP=1 infeasible: doubling layer count from 47→94 always OOMs
#   - EP=4 infeasible: 32 experts/GPU → 52.88 GiB grad buffer (DDP param_and_grad_buffer)
#     can't fit alongside model+optimizer states (62-65 GiB already allocated at init)
#   - TP=4 + PP=2 + EP=8 is the only viable Megatron parallelism for 235BA22B
#   - Phase-1 27.5 TFLOPS is the best achievable Megatron result for this model
#
defaults:
  - ../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_235BA22B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_moe_235BA22B_speed_sweep"
  recompute_tag: "full_recompute"  # overridden per sweep config

backend:
  megatron:
    train_iters: 100
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001

    global_batch_size: 64
    micro_batch_size: 1
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 2
    tensor_model_parallel_size: 4

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: "fp32"
    moe_token_dispatcher_type: allgather

    data_path:
      - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONWARNINGS: "ignore::UserWarning"
    NCCL_NET_GDR_LEVEL: "0"  # disable GDRDMA — fixes IB hang with PP=2 inter-node P2P

job:
  name: meg_moe_235BA22B_tp${backend.megatron.tensor_model_parallel_size}_ep${backend.megatron.expert_model_parallel_size}_pp${backend.megatron.pipeline_model_parallel_size}_mbs${backend.megatron.micro_batch_size}_${aux.recompute_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

slurm:
  sbatch:
    nodes: 16
    time: "00:45:00"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── TP=4+PP=2+EP=8 (baseline: full recompute, sweep mbs) ──────────────
        - aux.recompute_tag: full_recompute_mbs1
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 27.5 TFLOPS, 75.3 GiB (79%) (job 307427) ← OPTIMAL

        - aux.recompute_tag: full_recompute_mbs2
          backend.megatron.micro_batch_size: 2
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 27.2 TFLOPS, 80.0 GiB (84%) (job 307428)

        - aux.recompute_tag: full_recompute_mbs4
          backend.megatron.micro_batch_size: 4
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 23.1 TFLOPS, 89.5 GiB (94%) (job 307425) — slower; timed out at iter 94

        # ── no recompute (memory test — likely OOM at mbs=1) ──────────────────
        - aux.recompute_tag: no_recompute_mbs1
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          # Result: OOM — 94.6 GiB / 95 GiB (job 307426)

        # ── Phase 2: EP=4 and PP=1 variants ─────────────────────────────────
        # A: TP=4, PP=1, EP=8, DP=16 — remove PP overhead (same EP=8)
        #    4×1×16=64 ✓; DP=16, EP=8 ≤ 16; num_microbatches=4 ≥ PP=1
        #    Memory: PP=1 doubles layer footprint but DP doubles optimizer sharding
        - aux.recompute_tag: tp4_pp1_ep8_full_recompute_mbs1
          backend.megatron.tensor_model_parallel_size: 4
          backend.megatron.pipeline_model_parallel_size: 1
          backend.megatron.expert_model_parallel_size: 8
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: OOM (94.97 GiB) — PP=1 holds all 94 layers, fills GPU (job 307979)

        # B: TP=4, PP=2, EP=4, DP=8 — EP=4 (32 experts/GPU), same PP=2
        #    4×2×8=64 ✓; DP=8, EP=4 ≤ 8; num_microbatches=8 ≥ PP=2
        #    More expert computation, less EP comm than EP=8
        - aux.recompute_tag: tp4_pp2_ep4_full_recompute_mbs1
          backend.megatron.tensor_model_parallel_size: 4
          backend.megatron.pipeline_model_parallel_size: 2
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: OOM after 1 iter (11.7 TFLOPS, 96.1% / 91.3 GiB) (job 307980)

        # C: TP=4, PP=1, EP=4, DP=16 — no PP + EP=4
        #    4×1×16=64 ✓; DP=16, EP=4 ≤ 16; num_microbatches=4 ≥ PP=1
        - aux.recompute_tag: tp4_pp1_ep4_full_recompute_mbs1
          backend.megatron.tensor_model_parallel_size: 4
          backend.megatron.pipeline_model_parallel_size: 1
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: OOM at init (52.88 GiB grad buffer: 32 experts × 47 layers) (job 307983)

        # D: TP=2, PP=2, EP=4, DP=16 — less TP comm + EP=4
        #    2×2×16=64 ✓; DP=16, EP=4 ≤ 16; num_microbatches=4 ≥ PP=2
        #    4 KV heads / TP=2 = 2 per rank (allowed)
        #    Requires CUDA_DEVICE_MAX_CONNECTIONS=1 for TP≥2
        - aux.recompute_tag: tp2_pp2_ep4_full_recompute_mbs1
          backend.megatron.tensor_model_parallel_size: 2
          backend.megatron.pipeline_model_parallel_size: 2
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          backend.env.CUDA_DEVICE_MAX_CONNECTIONS: "1"
          # Result: OOM at init (52.88 GiB grad buffer: 32 experts × 47 layers) (job 307981)

        # E: TP=2, PP=1, EP=4, DP=32 — minimal comm (TP=2, no PP, EP=4)
        #    2×1×32=64 ✓; DP=32, EP=4 ≤ 32; num_microbatches=2 ≥ PP=1
        #    Lowest comm overhead of all new configs
        - aux.recompute_tag: tp2_pp1_ep4_full_recompute_mbs1
          backend.megatron.tensor_model_parallel_size: 2
          backend.megatron.pipeline_model_parallel_size: 1
          backend.megatron.expert_model_parallel_size: 4
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          backend.env.CUDA_DEVICE_MAX_CONNECTIONS: "1"
          # Result: OOM at init (52.88 GiB grad buffer: 32 experts × 47 layers) (job 307982)
