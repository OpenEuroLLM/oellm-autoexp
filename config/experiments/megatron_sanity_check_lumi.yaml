# @package _global_
defaults:
  - base
  - /backend: megatron
  - /container: lumi
  - /slurm: lumi
  - /sweep: none
  - /backend/megatron: [sanity_check,qwen3_125M]
  - _self_


env:
  USE_ROCM_AITER_ROPE_BACKEND: "0"
  WANDB_MODE: "online"
  WANDB_ENTITY: "openeurollm-project"

aux:
  data_dir: ${oc.env:DATA_DIR,"/scratch/project_462000963/preprocessed"}
  model_name: "tiny"

backend:
  megatron:
    # Preprocessed data should follow this structure:
    data_path:
      - ${aux.data_dir}/gpt-neox-20b/common-pile/wikipesto
    data_cache_path: ${job.base_output_dir}/cache
    dataloader_type: single

    # Parallelism
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: true
    use_distributed_optimizer: true
    async_tensor_model_parallel_allreduce: false
    masked_softmax_fusion: false
    gradient_accumulation_fusion: false
    bias_dropout_fusion: false
    apply_rope_fusion: false
    distributed_timeout_minutes: 10
    overlap_grad_reduce: true
    recompute_activations: false
    
    
    micro_batch_size: 16 # lumi max
    ckpt_format: torch_dist

    wandb_project: megatron-sanity-check
    wandb_exp_name: ${job.name}_${oc.env:SLURM_JOB_ID,local}
    wandb_save_dir: ${job.base_output_dir}/wandb

slurm:
  sbatch:
    time: "2:00:00"
    nodes: 4

job:
  # include cluster name in experiment name. 
  name: megatron_sanity_check_LUMI_${aux.model_name}_mb${backend.megatron.micro_batch_size}