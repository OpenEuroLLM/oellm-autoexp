# @package _global_
#
# HF MoE metrics: allenai/OLMoE-1B-7B-0924 — single revision per job.
# Submit one job per revision via the driver bash, which lists branches and
# selects every-10th step. To run a single revision interactively:
#
#   python scripts/run_autoexp.py \
#     --config-name=experiments/abhash/hf_moe_metrics_olmoe \
#     metadata.revision=step100000-tokens420B
#
defaults:
  - /backend: 'null'
  - /container: none
  - /slurm: leonardo_autoexp
  - /job: default
  - /sweep: none
  - _self_

index: 0
stage: ""

metadata:
  model: allenai/OLMoE-1B-7B-0924
  revision: main          # override via CLI from the submit driver
  short_name: olmoe_1b_7b

  hf_cache: /leonardo_scratch/large/userexternal/ajha0001/HF_CACHE
  idx_data: /leonardo_work/OELLM_prod2026/datasets/Nemotron-cc-2024-HQ-LUMI-sample-valid/high-all
  decode_tokenizer: /leonardo_scratch/large/userexternal/ajha0001/tokenizers/gpt-neox-20b

  analysis_root: results/moe_analysis_hf
  out_dir: ${metadata.analysis_root}/${metadata.short_name}/${metadata.revision}

job:
  base_output_dir: ${metadata.out_dir}
  name: hf_moe_metrics_${metadata.short_name}_${metadata.revision}

backend:
  base_command:
    - python
    - scripts/moe/compute_moe_metrics_hf.py
    - --model
    - ${metadata.model}
    - --revision
    - ${metadata.revision}
    - --hf-cache-dir
    - ${metadata.hf_cache}
    - --torch-dtype
    - bfloat16
    - --device-map
    - none
    - --moe-data-type
    - megatron_indexed_text
    - --moe-megatron-data-path
    - ${metadata.idx_data}
    - --moe-decode-tokenizer
    - ${metadata.decode_tokenizer}
    - --moe-batch-size
    - "1"
    - --moe-seq-length
    - "4096"
    - --moe-num-batches
    - "240"
    - --moe-coactivation-output
    - ${metadata.out_dir}/coactivation.json
    - --moe-token-count-output
    - ${metadata.out_dir}/token_counts.json
    - --moe-activation-norm-output
    - ${metadata.out_dir}/expert_activation_norms.json
    - --moe-routing-maps-output
    - ${metadata.out_dir}/routing_maps.npz
    - --moe-plot
    - --moe-plot-dir
    - ${metadata.out_dir}

# OLMoE-1B-7B-0924: ~7B total, ~1B active. Single GPU is enough in bf16.
# Runs in the `autoexp` conda env directly (no singularity); see
# config/slurm/leonardo_autoexp.yaml.
slurm:
  sbatch:
    nodes: 1
    ntasks_per_node: 1
    gpus_per_node: 1
    gres: "gpu:1"
    cpus_per_task: 8
    time: "01:30:00"
    job_name: null
  srun:
    cpus_per_task: 8
  env:
    SLURM_CPUS_PER_TASK: "8"
    MASTER_PORT: "$((20000 + SLURM_JOB_ID % 10000))"
    WANDB_MODE: offline
    PYTHONPATH: "."
    TMPDIR: ${oc.env:TMPDIR,/tmp}
    HF_HOME: ${metadata.hf_cache}
    HF_HUB_OFFLINE: "1"
