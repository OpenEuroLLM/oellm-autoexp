# @package _global_
#
# HF MoE metrics: stepfun-ai/Step-3.5-Flash (single snapshot).
#
# Submit:
#   export SLURM_ACCOUNT=OELLM_prod2026
#   export SLURM_PARTITION=boost_usr_prod
#   export OELLM_CONTAINERS_DIR=/leonardo_work/OELLM_prod2026/container_images
#   export HF_HOME=/leonardo_scratch/large/userexternal/ajha0001/HF_CACHE
#   python scripts/run_autoexp.py --config-name=experiments/abhash/hf_moe_metrics_step35_flash
#
defaults:
  - /backend: 'null'
  - /container: none
  - /slurm: leonardo_autoexp
  - /job: default
  - /sweep: none
  - _self_

index: 0
stage: ""

metadata:
  model: stepfun-ai/Step-3.5-Flash
  revision: main
  short_name: step35_flash

  hf_cache: /leonardo_scratch/large/userexternal/ajha0001/HF_CACHE
  idx_data: /leonardo_work/OELLM_prod2026/datasets/Nemotron-cc-2024-HQ-LUMI-sample-valid/high-all
  decode_tokenizer: /leonardo_scratch/large/userexternal/ajha0001/tokenizers/gpt-neox-20b

  analysis_root: results/moe_analysis_hf
  out_dir: ${metadata.analysis_root}/${metadata.short_name}/${metadata.revision}

job:
  base_output_dir: ${metadata.out_dir}
  name: hf_moe_metrics_${metadata.short_name}_${metadata.revision}

backend:
  base_command:
    - python
    - scripts/moe/compute_moe_metrics_hf.py
    - --model
    - ${metadata.model}
    - --revision
    - ${metadata.revision}
    - --hf-cache-dir
    - ${metadata.hf_cache}
    - --torch-dtype
    - bfloat16
    - --moe-data-type
    - megatron_indexed_text
    - --moe-megatron-data-path
    - ${metadata.idx_data}
    - --moe-decode-tokenizer
    - ${metadata.decode_tokenizer}
    - --moe-batch-size
    - "1"
    - --moe-seq-length
    - "4096"
    - --moe-num-batches
    - "240"
    - --moe-coactivation-output
    - ${metadata.out_dir}/coactivation.json
    - --moe-token-count-output
    - ${metadata.out_dir}/token_counts.json
    - --moe-activation-norm-output
    - ${metadata.out_dir}/expert_activation_norms.json
    - --moe-routing-maps-output
    - ${metadata.out_dir}/routing_maps.npz
    - --moe-plot
    - --moe-plot-dir
    - ${metadata.out_dir}

# Step-3.5-Flash is ~106B params (288 experts, top-k 8, 42 MoE layers of
# 1280-wide gate/up/down) → bf16 weights ~400 GB on disk (372 GB measured).
# Leonardo A100-64GB gives ~64 GB/GPU usable, so 4 GPUs = 256 GB cannot
# hold the weights at all; 8 GPUs (2 nodes) = 512 GB fits with ~110 GB of
# headroom for activations + KV cache. Runs in the `autoexp` conda env
# directly (no singularity); `device_map="auto"` shards across both nodes.
slurm:
  sbatch:
    nodes: 2
    ntasks_per_node: 1
    gpus_per_node: 4
    gres: "gpu:4"
    cpus_per_task: 32
    time: "04:00:00"
    job_name: null
  srun:
    cpus_per_task: 32
  env:
    SLURM_CPUS_PER_TASK: "32"
    MASTER_PORT: "$((20000 + SLURM_JOB_ID % 10000))"
    WANDB_MODE: offline
    PYTHONPATH: "."
    TMPDIR: ${oc.env:TMPDIR,/tmp}
    HF_HOME: ${metadata.hf_cache}
    HF_HUB_OFFLINE: "1"
