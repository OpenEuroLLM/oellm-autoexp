# @package _global_
defaults:
  - ../../base
  - /backend: megatron
  - /container: mi325x
  - /slurm: mi325x
  - /sweep: none
  - /experiments/rluukkon/moe_scaling_laws/models: moe_2B_400M
  - /experiments/rluukkon/data:   neox_50B_english
  - _self_

slurm:
  sbatch:
    partition: amd-tw-verification
    nodes: 1
    time: 0-00:30:00
  
  env:
    USE_ROCM_AITER_ROPE_BACKEND: "0"
    WANDB_MODE: "online"
    OUTPUT_DIR: "${oc.env:OUTPUT_DIR,./output}"

job:
  name: moe_2B_400M_${slurm.env.MACHINE_NAME}_mb${backend.megatron.micro_batch_size}
  
backend:
  megatron:
    log_throughput: true
    log_interval: 1
    log_progress: true
    micro_batch_size: 16
    global_batch_size: 4096
    moe_token_dispatcher_type: "alltoall"
    moe_per_layer_logging: True
    # moe_router_fusion: True #doesn't work with primus_v25 container

    # training schedule. Round numbers to avoid floating point issues
    # set num_tokens to the formula
    train_iters: ${oc.eval:'-(-30_000_000_000 // (${.global_batch_size} * ${.seq_length}))'}
    lr_warmup_iters: ${oc.eval:'min(${.train_iters} // 10, 25000)'}
    lr_wsd_decay_iters: ${oc.eval:'${.train_iters} * 0.2'}
    lr_decay_iters: ${.train_iters}
    # exit_interval: 10000
    save: null
    load: null  
    tensorboard_dir: ${slurm.env.OUTPUT_DIR}/tensorboard
    save_interval: 10000

    wandb_project: moe-router-analysis-experiments
    wandb_entity: "risto-m-luukkonen"
    wandb_exp_name: ${job.name}_${oc.env:SLURM_JOB_ID,local}
    wandb_save_dir: ${job.name}/wandb
