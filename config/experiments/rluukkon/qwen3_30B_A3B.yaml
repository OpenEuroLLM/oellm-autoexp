# @package _global_
defaults:
  - base
  - /backend: megatron
  - /container: amd_mi325x_cloud
  - /slurm: amd_mi325x_cloud
  - /monitoring: megatron_basic
  - /project: default
  - /sweep: none
  - /backend/megatron: base
  - _self_

project:
  name: moe-exploration
  resume: true
  
slurm:
  sbatch:
    partition: amd-tw-verification
    nodes: 1
    time: 0-00:30:00
backend:
  megatron:
    log_throughput: true
    log_interval: 1
    log_progress: true

    # MODEL
    num_layers: 48
    num_attention_heads: 32
    num_query_groups: 4 # no gqa when NUM_QUERY_GROUPS==NUM_ATTENTION_HEADS TODO: check
    group_query_attention: True 
    hidden_size: 2048
    ffn_hidden_size: 6144 # not used in the current MoE 
    moe_ffn_hidden_size: 768 
    kv_channels: 128
    num_experts: 128
    moe_router_topk: 8
    moe_router_dtype: "fp32"
    moe_grouped_gemm: True 
    moe_aux_loss_coeff: 0.01
    init_method_std: 0.02
    position_embedding_type: "rope"
    rotary_base: 1000000
    rotary_percent: 1.0
    attention_dropout: 0.0
    hidden_dropout: 0.0
    normalization: RMSNorm
    norm_epsilon: 1.e-6 # rmsnorm epsilon
    qk_layernorm: true # potentially enable qk-norm
    bf16: True
    swiglu: True
    untie_embeddings_and_output_weights: True
    use_flash_attn: True
    attention_softmax_in_fp32: True

    # Data configuration
    seq_length: 4096
    max_position_embeddings: ${.seq_length}
    num_workers: 2
    split: '99,1,0'
    # mock_data: true
    data_path: 
      - /shared_silo/scratch/rluukkon/oellm/oellm-autoexp/data/CC-MAIN-2020-high-actual/merged/CC-MAIN-2020-high-actual_merged
    data_cache_path: /shared_silo/scratch/rluukkon/oellm/oellm-autoexp/data/CC-MAIN-2020-high-actual/merged/CC-MAIN-2020-high-actual_merged.cache
    # tokenizer_model: Qwen/Qwen3-30B-A3B 
    tokenizer_model: EleutherAI/gpt-neox-20b
    tokenizer_type: HuggingFaceTokenizer

    micro_batch_size: 1
    global_batch_size: 128

    
    # MEMORY OPTIMIZATIONS
    recompute_activations: False
    use_torch_fsdp2: False # it's either this or the next 4 args
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    expert_model_parallel_size: 8
    context_parallel_size: 1
    sequence_parallel: True
    use_distributed_optimizer: True
    moe_token_dispatcher_type: "allgather"
    
    # COMM OPTIONS
    distributed_timeout_minutes: 120
    overlap_param_gather: True
    overlap_grad_reduce: True
    gradient_accumulation_fusion: False
    overlap_moe_expert_parallel_comm: True
    disable_bias_linear: true
    bias_swiglu_fusion: False
    add_bias_linear: False
    bias_dropout_fusion: False

    # OPTIMIZER
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1e-8
    lr: 3e-4
    min_lr: 0.0
    clip_grad: 1.0
    weight_decay: 0.05
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    
    # training schedule. Round numbers to avoid floating point issues
    train_iters: ${oc.eval:'-(-4_000_000_000 // (${.global_batch_size} * ${.seq_length}))'}
    lr_warmup_iters: ${oc.eval:'min(${.train_iters} // 10, 25000)'}
    lr_wsd_decay_iters: ${oc.eval:'${.train_iters} * 0.2'}
    lr_decay_iters: ${.train_iters}
    ckpt_format: torch_dist
    save_interval: 1000
    exit_interval: 2000
    save: ${project.base_output_dir}
    load: /shared_silo/scratch/rluukkon/Megatron-Bridge/checkpoints/qwen3-30b-a3b-bridge-test
    finetune: true
    tensorboard_dir: ${project.base_output_dir}/tensorboard
    # wandb_save_dir: "${project.base_output_dir}/wandb"
    # wandb_project: "${project.name}"
    # wandb_exp_name: "qwen3_30B_A3B_$SLURM_JOB_ID"



