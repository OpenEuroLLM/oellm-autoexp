# @package _global_
# Vanilla Megatron variant of the bilingual 150BT run.
# Fully reshardable checkpoints for flexible DP scaling.
defaults:
  - ../base
  - /backend: megatron
  - /container: mi325x
  - /slurm: mi325x
  - /sweep: none    # overridden inline below
  - /backend/megatron: [qwen3_5_moe_35BA3B]
  - _self_

slurm:
  sbatch:
    partition: amd-tw-verification
    nodes: 8
    time: 0-72:00:00

  launcher_cmd: "${oc.join:' ',${oc.maptmpl:'export %=\\'$%\\' ; \\\n',${oc.dict.keys:.env}}} \
    export LOCAL_ADDR=$(nslookup $(hostname) | grep \"Address: \" | sed \"s/Address: //\" | tail) ; \\\n\
    ulimit -n 65536 ; export RANK=$SLURM_PROCID ; export LOCAL_RANK=$SLURM_LOCALID ; export AITER_JIT_DIR=/tmp/$USER/aiter_jit_dir ; \\\n\
    ${oc.select:container.runtime,apptainer} exec --rocm --overlay /shared_silo/scratch/containers/fla-overla-for-primus-v26.1.img:ro ${oc.join:' ',${oc.maptmpl:'--bind % \\\n',${container.bind}}} \
    ${oc.select:container.image,container.sif}"

  env:
    USE_ROCM_AITER_ROPE_BACKEND: "0"
    WANDB_MODE: "online"
    OUTPUT_DIR: "${oc.env:OUTPUT_DIR,./output}"
    APPTAINER_BIND: '"/usr/local/lib/libbnxt_re-rdmav34.so:/usr/lib/x86_64-linux-gnu/libibverbs/libbnxt_re-rdmav34.so,${oc.env:SCRATCH},${oc.env:PWD}"'
    SINGULARITY_BIND: '"/usr/local/lib/libbnxt_re-rdmav34.so:/usr/lib/x86_64-linux-gnu/libibverbs/libbnxt_re-rdmav34.so,${oc.env:SCRATCH},${oc.env:PWD}"'

container:
  image: /shared_silo/scratch/containers/primus_v26.1.sif

backend:
  megatron:
    log_throughput: true
    log_interval: 1
    log_progress: true
    data_path:
      # Finnish (55.74%)
      - 0.269265645200258
      - /shared_silo/scratch/ttoivone/tokenized/fin/MT-Nemotron-CC-fin_Latn-max-500Btok_text_document
      - 0.0176945995417312
      - /shared_silo/scratch/ttoivone/tokenized/fin/FinePDFs-Edu-fin_Latn-max-500Btok_text_document
      - 0.0028465225349742
      - /shared_silo/scratch/ttoivone/tokenized/fin/wikipedia-20231101.fi-max-500Btok_text_document
      - 0.267615853930492
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/hplt3.0_fi_filtered7/train
      # English (29.77%)
      - 0.138479474674418
      - /shared_silo/scratch/ttoivone/merge/fineweb-edu-sample-350BT-max-500Btok_text_document
      - 0.109244918909819
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finepdfs-edu/eng_Latn_text_document
      - 0.0115399562228682
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/wikipedia/wikipedia.en-train_text_document
      - 0.038466520742894
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/nemotron-cc-math/nemotron-cc-math.4plus-train_text_document
      # Code (9.24%)
      - 0.0254565264585122
      - /shared_silo/scratch/ttoivone/tokenized/code/code
      - 0.0668631233244334
      - /shared_silo/scratch/ttoivone/tokenized/code/Nemotron-Pretraining-Code-v2-Synthetic-Rewriting-max-500Btok_text_document
      # FinePhrase synthetic (3.85%)
      - 0.0117447549688257
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finephrase/FinePhrase-faq-train_text_document
      - 0.007763571812841
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finephrase/FinePhrase-math-train_text_document
      - 0.007272241197052
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finephrase/FinePhrase-table-train_text_document
      - 0.011681527253988
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finephrase/FinePhrase-tutorial-train_text_document
      # Chat (1.41%)
      - 0.0065167045139476
      - /shared_silo/scratch/ttoivone/tokenized/chat_with_template/Nemotron-Post-Training-Dataset-v1-chat-max-500Btok_text_document
      - 0.0003627714716967
      - /shared_silo/scratch/ttoivone/tokenized/chat_with_template/smoltalk-apigen-80k-max-500Btok_text_document
      - 0.0000033758064738
      - /shared_silo/scratch/ttoivone/tokenized/chat_with_template/smoltalk-everyday-conversations-max-500Btok_text_document
      - 0.0000571556644851
      - /shared_silo/scratch/ttoivone/tokenized/chat_with_template/smoltalk-smol-constraints-max-500Btok_text_document
      - 0.0046831292630909
      - /shared_silo/scratch/ttoivone/tokenized/chat_with_template/smoltalk-smol-magpie-ultra-max-500Btok_text_document
      - 0.0001395462513076
      - /shared_silo/scratch/ttoivone/tokenized/chat_with_template/smoltalk-smol-rewrite-max-500Btok_text_document
      - 0.0003703799648604
      - /shared_silo/scratch/ttoivone/tokenized/chat_with_template/smoltalk-smol-summarize-max-500Btok_text_document
      - 0.0019317002910301
      - /shared_silo/scratch/ttoivone/tokenized/chat_with_template/ultrachat_200k-train_sft-max-500Btok_text_document
    data_cache_path: /shared_silo/scratch/rluukkon/data/.cache
    split: "989,10,1"
    num_workers: 7
    global_batch_size: 1024
    micro_batch_size: 2
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 1
    use_distributed_optimizer: true
    moe_per_layer_logging: true
    create_attention_mask_in_dataloader: false
    moe_grouped_gemm: false
    moe_token_dispatcher_type: "alltoall"
    moe_permute_fusion: true
    moe_shared_expert_overlap: true
    overlap_moe_expert_parallel_comm: false
    overlap_param_gather: true
    overlap_grad_reduce: true

    adam_beta2: 0.95
    weight_decay: 0.01

    # Training schedule: 150BT tokens (~17,882 iters)
    train_iters: ${oc.eval:'-(-150_000_000_000 // (${.global_batch_size} * ${.seq_length}))'}
    lr: 3e-5
    min_lr: 3e-6
    lr_warmup_iters: 500
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_wsd_decay_iters: ${oc.eval:'${.train_iters} * 0.2'}
    lr_decay_iters: ${.train_iters}

    router_lr_spec: "1e-5"
    moe_aux_loss_coeff: 0.0001

    ckpt_format: torch_dist
    dist_ckpt_optim_fully_reshardable: false
    save_interval: 1000
    save_extra_steps:
      - ${oc.eval:'${backend.megatron.train_iters} - int(${backend.megatron.train_iters} * 0.2)'}
    save: ${job.base_output_dir}/checkpoints
    exit_interval: 8000

    tensorboard_dir: ${job.base_output_dir}/tensorboard
    wandb_save_dir: "${job.base_output_dir}/wandb"
    wandb_project: "moe-exploration"
    wandb_exp_name: "qwen3_5_35B_A3B_150BT_wd0.01_lr${backend.megatron.lr}_${oc.env:SLURM_JOB_ID,local}"

sweep:
  type: list
  groups:
    - type: list
      configs:
        # Stage 1: fresh CPT from base model
        - stage: init
          backend.megatron.load: /shared_silo/scratch/rluukkon/oellm/Megatron-Bridge/megatron_ckpt/Qwen3.5-35B-A3B-Base
          backend.megatron.finetune: true
          backend.megatron.no_load_optim: true
          backend.megatron.no_load_rng: true

        # Stage 2: resume from init's latest checkpoint
        - stage: resume
          backend.megatron.load: "./output/qwen3_5_35B_A3B_150BT_wd0.01_lr3e-05_MI325X/checkpoints"
          backend.megatron.finetune: false
          backend.megatron.no_load_optim: false
          backend.megatron.no_load_rng: false
          job.start_condition:
            class_name: FileExistsCondition
            path: "./output/qwen3_5_35B_A3B_150BT_wd0.01_lr3e-05_MI325X/checkpoints/latest_checkpointed_iteration.txt"

job:
  name: qwen3_5_35B_A3B_150BT_wd0.01_lr${backend.megatron.lr}_${slurm.env.MACHINE_NAME}
