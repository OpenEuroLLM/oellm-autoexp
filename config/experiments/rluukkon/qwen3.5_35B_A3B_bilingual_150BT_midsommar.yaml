# @package _global_
# Vanilla Megatron variant of the bilingual 150BT run.
# Plain DP-reshardable checkpoints; optimizer reshaping across arbitrary
# parallel layouts is intentionally disabled for this run.
defaults:
  - ../base
  - /backend: megatron
  - /container: mi325x
  - /slurm: mi325x
  - /sweep: none    # overridden inline below
  - /backend/megatron: [qwen3_5_moe_35BA3B]
  - _self_

slurm:
  sbatch:
    partition: amd-tw-verification
    nodes: 1
    time: 0-72:00:00
    exclusive: true

  launcher_cmd: "${oc.join:' ',${oc.maptmpl:'export %=\\'$%\\' ; \\\n',${oc.dict.keys:.env}}} \
    export LOCAL_ADDR=$(nslookup $(hostname) | grep \"Address: \" | sed \"s/Address: //\" | tail) ; \\\n\
    ulimit -n 65536 ; export RANK=$SLURM_PROCID ; export LOCAL_RANK=$SLURM_LOCALID ; export AITER_JIT_DIR=/tmp/$USER/aiter_jit_dir ; \\\n\
    ${oc.select:container.runtime,apptainer} exec --rocm --overlay /shared_silo/scratch/containers/fla-overla-for-primus-v26.1.img:ro ${oc.join:' ',${oc.maptmpl:'--bind % \\\n',${container.bind}}} \
    ${oc.select:container.image,container.sif}"

  env:
    USE_ROCM_AITER_ROPE_BACKEND: "0"
    WANDB_MODE: "online"
    OUTPUT_DIR: "${oc.env:OUTPUT_DIR,./output}"
    APPTAINER_BIND: '"/usr/local/lib/libbnxt_re-rdmav34.so:/usr/lib/x86_64-linux-gnu/libibverbs/libbnxt_re-rdmav34.so,${oc.env:SCRATCH},${oc.env:PWD}"'
    SINGULARITY_BIND: '"/usr/local/lib/libbnxt_re-rdmav34.so:/usr/lib/x86_64-linux-gnu/libibverbs/libbnxt_re-rdmav34.so,${oc.env:SCRATCH},${oc.env:PWD}"'

container:
  image: /shared_silo/scratch/containers/primus_v26.1.sif

backend:
  megatron:
    log_throughput: true
    log_interval: 1
    log_progress: true
    data_path:
      # Finnish webcorpus (36.00%)
      - 0.1103
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/chat_with_template/MT-Nemotron-CC-fin_Latn-max-500Btok_text_document
      - 0.0137
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/chat_with_template/FinePDFs-Edu-fin_Latn-max-500Btok_text_document
      - 0.0288
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/wikipedia/wikipedia.fi-train2_text_document
      - 0.2072
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/hplt3.0_fi_filtered7/all_fin_Latn_filtered7-train2_text_document
      # English (40.00%)
      - 0.3946
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/Fineweb-edu/fineweb-edu.en-train2_text_document
      - 0.0054
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/wikipedia/wikipedia.en-train2_text_document
      # Code (5.00%)
      - 0.0237
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/code_with_template/Nemotron-Pretraining-Code-v2-Synthetic-Rewriting-max-500Btok_text_document
      - 0.0090
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/chat_with_template/Nemotron-Pretraining-Code-v2-Synthetic-Transpilation-max-500Btok_text_document
      - 0.0005
      - /shared_silo/scratch/ttoivone/tokenized/stack-edu-tokenized/stack-edu-Go-max-500Btok_text_document
      - 0.0069
      - /shared_silo/scratch/ttoivone/tokenized/stack-edu-tokenized/stack-edu-Java-max-500Btok_text_document
      - 0.0029
      - /shared_silo/scratch/ttoivone/tokenized/stack-edu-tokenized/stack-edu-JavaScript-max-500Btok_text_document
      - 0.0057
      - /shared_silo/scratch/ttoivone/tokenized/stack-edu-tokenized/stack-edu-Python-max-500Btok_text_document
      - 0.0005
      - /shared_silo/scratch/ttoivone/tokenized/stack-edu-tokenized/stack-edu-Rust-max-500Btok_text_document
      - 0.0008
      - /shared_silo/scratch/ttoivone/tokenized/stack-edu-tokenized/stack-edu-TypeScript-max-500Btok_text_document
      # FinePhrase synthetic (4.00%)
      - 0.0122
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finephrase/FinePhrase-faq.en-train2_text_document
      - 0.0081
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finephrase/FinePhrase-math.en-train2_text_document
      - 0.0076
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finephrase/FinePhrase-table.en-train2_text_document
      - 0.0121
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/finephrase/FinePhrase-tutorial.en-train2_text_document
      # Chat / reasoning (10.00%)
      - 0.0800
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/chat_with_template/dolci_think_7B_text_document
      - 0.0100
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/chat_with_template/rahul_data_train_sft_text_document
      - 0.0100
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/chat_with_template/rahul-sft-data-train_sft_text_document
      # Math (5.00%)
      - 0.0500
      - /shared_silo/scratch/datasets/tokenized/qwen3.5/megatron/chat_with_template/Nemotron-CC-Math-v1-4plus_text_document
    # manual_gc: false
    data_cache_path: /shared_silo/scratch/rluukkon/data/.cache
    num_dataset_builder_threads: 2
    split: "989,10,1"
    num_workers: 7
    global_batch_size: 576
    micro_batch_size: 2
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 1
    use_distributed_optimizer: true
    moe_per_layer_logging: true
    create_attention_mask_in_dataloader: false
    moe_grouped_gemm: false
    moe_token_dispatcher_type: "alltoall"
    moe_permute_fusion: true
    moe_shared_expert_overlap: true
    overlap_moe_expert_parallel_comm: false
    overlap_param_gather: true
    overlap_grad_reduce: true
    adam_beta2: 0.95
    weight_decay: 0.01

    # Training schedule: 150BT tokens (~17,882 iters)
    train_iters: ${oc.eval:'-(-150_000_000_000 // (${.global_batch_size} * ${.seq_length}))'}
    lr: 3e-5
    min_lr: 3e-6
    lr_warmup_iters: 500
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_wsd_decay_iters: ${oc.eval:'${.train_iters} * 0.2'}
    lr_decay_iters: ${.train_iters}

    router_lr_spec: "1e-5"
    moe_aux_loss_coeff: 0.0001

    ckpt_format: torch_dist
    dist_ckpt_optim_fully_reshardable: false
    save_interval: 2200
    save_extra_steps:
      - ${oc.eval:'${backend.megatron.train_iters} - int(${backend.megatron.train_iters} * 0.2)'}
    save: ${job.base_output_dir}/checkpoints
    exit_interval: 13200

    tensorboard_dir: ${job.base_output_dir}/tensorboard
    wandb_save_dir: "${job.base_output_dir}/wandb"
    wandb_project: "moe-exploration"
    wandb_exp_name: "qwen3_5_35B_A3B_150BT_wd0.01_lr${backend.megatron.lr}_${oc.env:SLURM_JOB_ID,local}"

sweep:
  type: list
  groups:
    - type: list
      configs:
        # Stage 1: fresh CPT from base model
        - stage: init
          backend.megatron.load: /shared_silo/scratch/rluukkon/oellm/Megatron-Bridge/megatron_ckpt/Qwen3.5-35B-A3B-Base
          backend.megatron.finetune: true
          backend.megatron.no_load_optim: true
          backend.megatron.no_load_rng: true

        # Stage 2: resume from init's latest checkpoint
        - stage: resume
          backend.megatron.load: "./output/qwen3_5_35B_A3B_150BT_midsommar_lr3e-05_MI325X/checkpoints"
          backend.megatron.finetune: false
          backend.megatron.no_load_optim: false
          backend.megatron.no_load_rng: false
          job.start_condition:
            class_name: FileExistsCondition
            path: "./output/qwen3_5_35B_A3B_150BT_midsommar_lr3e-05_MI325X/checkpoints/latest_checkpointed_iteration.txt"

job:
  name: qwen3_5_35B_A3B_150BT_midsommar_lr${backend.megatron.lr}_${slurm.env.MACHINE_NAME}
