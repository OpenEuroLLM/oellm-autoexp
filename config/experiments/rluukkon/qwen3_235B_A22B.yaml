# @package _global_
defaults:
  - base
  - /backend: megatron
  - /container: amd_mi325x_cloud
  - /slurm: amd_mi325x_cloud
  - /monitoring: megatron_basic
  - /project: default
  - /sweep: none
  - /backend/megatron: base
  - /experiments/rluukkon/data: qwen_3_validation_sample
  - /experiments/rluukkon/models: qwen3_235B_A22B
  - _self_

project:
  name: qwen3_30B_a3B_validation
  resume: true

slurm:
  sbatch:
    partition: amd-tw-verification
    nodes: 8
    time: 0-00:20:00
backend:
  megatron:
    # log_throughput: true
    # log_interval: 1
    # log_progress: true
    # moe_aux_loss_coeff: 1e-4
    global_batch_size: 64 
    micro_batch_size: 1
    seq_length: 2048

   
    # training schedule. Round numbers to avoid floating point issues
    train_iters: ${oc.eval:'-(-4_000_000_000 // (${.global_batch_size} * ${.seq_length}))'}
    lr_warmup_iters: ${oc.eval:'min(${.train_iters} // 10, 25000)'}
    lr_wsd_decay_iters: ${oc.eval:'${.train_iters} * 0.2'}
    lr_decay_iters: ${.train_iters}
    ckpt_format: torch_dist
    save_interval: 1000
    exit_interval: 2000
    save: ${project.base_output_dir}
    # load: /shared_silo/scratch/rluukkon/Megatron-Bridge/checkpoints/qwen3-30b-a3b-bridge-test
    # finetune: true
    tensorboard_dir: ${project.base_output_dir}/tensorboard
    # wandb_save_dir: "${project.base_output_dir}/wandb"
    # wandb_project: "${project.name}"
    # wandb_exp_name: "qwen3_30B_A3B_$SLURM_JOB_ID"



