# @package backend.megatron

log_throughput: true
log_interval: 1
log_progress: true

# MODEL
num_layers: 94
num_attention_heads: 64
num_query_groups: 4 # no gqa when NUM_QUERY_GROUPS==NUM_ATTENTION_HEADS TODO: check
group_query_attention: True 
hidden_size: 4096
ffn_hidden_size: 12288 # not used in the current MoE 
moe_ffn_hidden_size: 1536 
kv_channels: 128
num_experts: 128
moe_router_topk: 8
moe_router_dtype: "fp32"
moe_grouped_gemm: True 
moe_aux_loss_coeff: 0.001
moe_router_pre_softmax: False
moe_router_fusion: True
init_method_std: 0.02
position_embedding_type: "rope"
rotary_base: 1000000
rotary_percent: 1.0
rotary_seq_len_interpolation_factor: 1
max_position_embeddings: 40960
make_vocab_size_divisible_by: 1187
attention_dropout: 0.0
hidden_dropout: 0.0
normalization: RMSNorm
norm_epsilon: 1.e-6 # rmsnorm epsilon
qk_layernorm: true # potentially enable qk-norm
bf16: True
swiglu: True
untie_embeddings_and_output_weights: True
use_flash_attn: True
attention_softmax_in_fp32: True

# MEMORY OPTIMIZATIONS
recompute_activations: True
recompute_modules: ["core_attn"]
use_torch_fsdp2: False # it's either this or the next 4 args
tensor_model_parallel_size: 1
# first and last pp stages have 23 stages, middle stages have 24 stages
# make first and last layers 
pipeline_model_parallel_size: 2
# decoder_first_pipeline_num_layers: 23
# decoder_last_pipeline_num_layers: 23
expert_model_parallel_size: 16
context_parallel_size: 1
sequence_parallel: True
use_distributed_optimizer: True

moe_enable_deepep: True
moe_router_load_balancing_type: "global_aux_loss"
moe_token_dispatcher_type: "flex"
moe_permute_fusion: True

# COMM OPTIONS
distributed_timeout_minutes: 120
overlap_param_gather: True
overlap_grad_reduce: True
gradient_accumulation_fusion: False
overlap_moe_expert_parallel_comm: True
disable_bias_linear: true
bias_swiglu_fusion: False
add_bias_linear: False
bias_dropout_fusion: False

# OPTIMIZER
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1e-8
lr: 3.9e-6
min_lr: 3.9e-7
lr_warmup_init: 3.9e-7
clip_grad: 1.0
weight_decay: 0.1
lr_decay_style: cosine
 