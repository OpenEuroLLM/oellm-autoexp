# @package _global_
# Isolate overlap_param_gather effect on 35B memory-debug run.
defaults:
  - qwen3.5_35B_A3B_memory_debug
  - _self_

backend:
  megatron:
    overlap_param_gather: false
    overlap_grad_reduce: true

job:
  name: qwen3_5_35B_A3B_memory_debug_no_param_gather${backend.megatron.lr}_${slurm.env.MACHINE_NAME}
