# @package _global_
# HuggingFace MoE router metrics on LUMI (single Python process inside Singularity).
#
# Throughput (single node): the script uses SDPA attention, KV-cache off for full-sequence
# forwards, and non_blocking H2D copies. If sdpa fails on your image, pass
# --attn-implementation eager in base_command.
#
# VRAM: with use_cache=False, activations are small vs total HBM on 4×MI325X; low % usage
# usually means batch is too small. Increase --batch-size until you approach ~70–85% HBM
# or hit OOM, then back off one step (watch --max-length; long seq scales VRAM ~linearly).
#
# Prereqs:
#   - Qwen3-30B-A3B weights + tokenizer in HF cache (script defaults to offline mode), or pass
#     --no-local-files-only via backend.extra_cli_args from the CLI.
#   - Image with transformers, datasets, accelerate, torch (Megatron Lumi SIF may need extra pip;
#     override container.image to an image that has them).
#
# Submit (from repo root, with env vars set):
#   export OUTPUT_DIR=/scratch/project_.../runs
#   export SLURM_ACCOUNT=project_462000963 SLURM_PARTITION=standard-g
#   uv run --python 3.12 python scripts/run_autoexp.py --config-name experiments/rluukkon/moe_metrics_hf_qwen3_30b_a3b_lumi \
#     
#
# Inspect batch script without submitting:
#   ... run_autoexp.py --dry-run ... 
## which you can also submit with bash <script> if you have an active salloc session. Useful for avoiding slurm queues for quick iterative development.
defaults:
  - ../base
  - /backend: null
  - /container: mi325x
  - /slurm: mi325x
  - /sweep: none
  - _self_

job:
  name: moe_metrics_hf_qwen3_30b_a3b_lumi
  # Unique run directory so metrics JSON and slurm logs are never clobbered by a rerun.
  # Keep schema-compatible by not introducing new ``job`` keys (the dataclass is strict).
  # ``oc.concat`` is binary only; nest joins to append "/<job_id-or-timestring>".
  base_output_dir: ${oc.concat:${oc.concat:${oc.env:OUTPUT_DIR,"./output"}/,${job.name}},${oc.concat:/,${oc.env:SLURM_JOB_ID,${oc.timestring:}}}}

# Default LUMI slurm uses ntasks_per_node=8 (Megatron ranks). This job is one HF process using
# device_map="auto" across all GPUs in the allocation — use a single task.
slurm:
  sbatch:
    ntasks_per_node: 1
    cpus_per_task: 56
    gpus_per_node: 4
    gres: "gpu:4"
    mem: 480G
    time: "00:30:00"
    partition: ${oc.env:SLURM_PARTITION,"dev-g"}
    account: ${oc.env:SLURM_ACCOUNT,"project_462000963"}

backend:
  class_name: NullBackend
  # Each --dataset-entry is a JSON object with these optional fields (label is required
  # and must be unique / filename-safe):
  #   label, dataset, dataset_config, dataset_path,
  #   dataset_split, dataset_text_field, dataset_percentage,
  #   num_batches, seed
  # Any field omitted on an entry falls back to the CLI-level --dataset-* / --num-batches
  # / --seed default below. Model + batch_size + max_length are loaded once and shared
  # across all entries.
  #
  # NB: the lumi.sbatch template wraps the launch line in outer bash single quotes, and
  # the generator joins argv with plain " ".join (no shlex.quote). Bare `{"a":"b","c":"d"}`
  # would trigger bash brace expansion (commas) and then quote-removal would strip the
  # JSON quotes. Wrap each JSON in bash double quotes with backslash-escaped inner
  # quotes: `"{\"key\":\"value\"}"`. The YAML single-quoted scalars below preserve
  # backslashes verbatim, which is exactly what bash needs to see.
  base_command:
    - torchrun --nproc_per_node=4
    - scripts/compute_moe_metrics_hf.py
    - --model-name
    - Qwen/Qwen3-30B-A3B
    # Default raised from 4: MoE metrics are forward-only + no KV cache; HBM stays mostly
    # weights unless batch×seq is large. Tune up/down if you OOM or still see low util.
    - --batch-size
    - "32"
    - --no-local-files-only
    - --attn-implementation
    - sdpa
    - --max-length
    - "8192"
    - --seed
    - "1234"
    # - --num-batches
    # - "200"
    # Pre-processed per-language jsonl shards under parallel_data_samples/<lang>/0.jsonl
    # (each language directory is fed to --dataset-path, which picks up *.jsonl shards).
    - --dataset-entry
    - '"{\"label\":\"eng_Latn\",\"dataset_path\":\"parallel_data_samples/eng_Latn\",\"dataset_text_field\":\"text\",\"dataset_percentage\":100.0}"'
    - --dataset-entry
    - '"{\"label\":\"deu_Latn\",\"dataset_path\":\"parallel_data_samples/deu_Latn\",\"dataset_text_field\":\"text\",\"dataset_percentage\":100.0}"'
    - --dataset-entry
    - '"{\"label\":\"fin_Latn\",\"dataset_path\":\"parallel_data_samples/fin_Latn\",\"dataset_text_field\":\"text\",\"dataset_percentage\":100.0}"'
    - --dataset-entry
    - '"{\"label\":\"ita_Latn\",\"dataset_path\":\"parallel_data_samples/ita_Latn\",\"dataset_text_field\":\"text\",\"dataset_percentage\":100.0}"'
    - --dataset-entry
    - '"{\"label\":\"spa_Latn\",\"dataset_path\":\"parallel_data_samples/spa_Latn\",\"dataset_text_field\":\"text\",\"dataset_percentage\":100.0}"'
    - --dataset-entry
    - '"{\"label\":\"swe_Latn\",\"dataset_path\":\"parallel_data_samples/swe_Latn\",\"dataset_text_field\":\"text\",\"dataset_percentage\":100.0}"'
    - --output-json
    - ${job.base_output_dir}/qwen3_30b_a3b_saturation.json
    - --coactivation-output
    - ${job.base_output_dir}/qwen3_30b_a3b_coactivation.json
    - --expert-token-distribution-output
    - ${job.base_output_dir}/qwen3_30b_a3b_expert_token_dist.json
