# @package _global_
# Qwen3 30BA3B "maximally comparable" Megatron config for direct Titan comparison.
#
# Goal: eliminate confounding factors (batch size, TP/PP overhead) to isolate
#       framework overhead between Megatron and Titan on equal footing.
#
# Design choices:
#   EP=8, PP=1, TP=1 → no pipeline or tensor parallelism overhead
#   DP = world_size / (TP×PP) = 8/(1×1) = 8  → distributed optimizer shards 8-way
#   mbs=1, GBS=8 → one microbatch per DP rank; same tokens/step as Titan bs=1
#   full_recompute → analogous to Titan activation_checkpoint.mode=full
#
# Comparable Titan config: titan_moe_30BA3B_comparable_jupiter.yaml
#   (EP=8, dp_shard=8, efsdp=1, bs=1)
#
# Memory note: EP=8+PP=1+mbs=4 (existing sweep) used 95% memory.
#   With mbs=1 full_recompute activations are minimal, so memory ≈ params-dominated.
#   Expect similar memory usage; fits but tight.
#
# ── Results (2 nodes, 8×GH200, EP=8, PP=1, TP=1, GBS=8) ────────────────────
#   mbs=1, full_recompute → 57.6-58.5 TFLOPS, 77.2 GiB (81%) (job 309061) ← OPTIMAL
#   mbs=1, no_recompute   → OOM at iter 2 (94.75 GiB in use) (job 309060)
#
# Key finding: At bs=1+full_AC, Titan (56-57 TFLOPS) ≈ Megatron (58 TFLOPS).
#   The 2.2× Titan advantage in unconstrained sweep comes from larger batches
#   (bs=16 vs mbs=4) and avoiding full recompute — not framework overhead.
#
defaults:
  - ../base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_30BA3B]
  - /sweep: none
  - _self_

aux:
  # experiment_group: "megatron_moe_30BA3B_comparable"
  experiment_group: "megatron_moe_30BA3B_comparable_force_lb"
  recompute_tag: "full_recompute"

backend:
  megatron:
    # train_iters: 100
    train_iters: 300
    log_interval: 1
    eval_interval: 1000
    save: null
    load: null
    ckpt_step: 0
    lr: 0.001

    global_batch_size: 8   # DP=8 × mbs=1 × 1 microbatch/step
    # global_batch_size: 64 # CHANGED: for 8 GAS
    micro_batch_size: 1
    expert_model_parallel_size: 8
    pipeline_model_parallel_size: 1
    tensor_model_parallel_size: 1

    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    recompute_modules: null

    use_distributed_optimizer: true
    moe_router_dtype: "fp32"
    moe_token_dispatcher_type: allgather
    moe_router_force_load_balancing: true
    # moe_flex_dispatcher_backend: hybridep

    # data_path:
    #   - /e/scratch/e-sta-openeurollm/harmsen1/mock_data
    mock_data: true
    # data_cache_path: /e/scratch/e-sta-openeurollm/harmsen1/data
    # tokenizer_model: Qwen3_30B_A3B
    tokenizer_model: /e/scratch/laionize/harmsen1/hf_home/hub/models--Qwen--Qwen3-30B-A3B/snapshots/ad44e777bcd18fa416d9da3bd8f70d33ebb85d39

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONWARNINGS: "ignore::UserWarning"
    NCCL_NET_GDR_LEVEL: "0"  # keep for safety; PP=1 has no P2P but harmless
    HF_HUB_OFFLINE: 1

job:
  name: meg_moe_30BA3B_ep8_pp1_mbs${backend.megatron.micro_batch_size}_${aux.recompute_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

slurm:
  sbatch:
    nodes: 2
    time: "00:20:00"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        # ── full recompute (analogous to Titan AC=full) ───────────────────────
        - aux.recompute_tag: full_recompute
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: full
          backend.megatron.recompute_num_layers: 1
          # Result: 57.6-58.5 TFLOPS, 77.2 GiB (81%) (job 309061) ← OPTIMAL

        # ── no recompute (analogous to Titan AC=none; may fit at mbs=1) ──────
        - aux.recompute_tag: no_recompute
          backend.megatron.micro_batch_size: 1
          backend.megatron.recompute_granularity: null
          backend.megatron.recompute_method: null
          backend.megatron.recompute_num_layers: null
          # Result: OOM at iter 2 (94.75 GiB, alloc failed for 196 MiB in expert fc1) (job 309060)
