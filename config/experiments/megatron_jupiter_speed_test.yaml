# @package _global_
defaults:
  - base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [llama1_8b_qkln,speed_test_jupiter]
  - /sweep: none
  - _self_

backend:
  megatron:
    train_iters: 50
    log_interval: 10
    eval_interval: 1000
    data_path:
     - /e/project1/projectnucleus/franke5/data/datasets/cerebras-SlimPajama-627B/train/merged
    data_cache_path: /e/project1/projectnucleus/poeppel1/data/
    save: null
    load: null
    lr: 1e-3
    lr_warmup_iters: 0
    # Throughput optimizations (~40% MFU on GH200, single node):
    micro_batch_size: 4           # optimal MBS for 1.8B on GH200 (65% GPU memory usage)
    recompute_activations: false  # flash-attn handles backward efficiently; no extra recompute needed
    recompute_granularity: null   # must be null when recompute_activations=false
  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}

job:
  name: megatron_jupiter_speed_test
