# @package _global_

defaults:
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /job: default
  - /sweep: none
  - /backend/megatron: [base, qwen3_base, qwen3_1.7B, data_mixturevitae]
  - /postprocess: [ckpt_dist_to_torch_opensci, ckpt_convert_qwen3, eval_opensci]
  - _self_

index: 0
stage: "all"

job:
  name: "qwen3_1.7b_MixtureVitae_300B"
  base_output_dir: ${oc.env:OUTPUT_DIR,"./output"}/${.name}

backend:
  megatron:
    lr: 0.004
    global_batch_size: 1024
    micro_batch_size: 4
    train_iters: 71526
    lr_warmup_iters: 25000
    lr_decay_iters: 71526
    lr_decay_style: WSD
    lr_wsd_decay_style: linear
    lr_wsd_decay_iters: 14305
    min_lr: 0.0

    adam_beta2: 0.95
    weight_decay: 0.05
    init_method_std: 0.02
    clip_grad: 1.0
    override_opt_param_scheduler: true
    accumulate_allreduce_grads_in_fp32: false

    bf16: true
    use_flash_attn: true
    seq_length: 4096

    tokenizer_type: HuggingFaceTokenizer
    tokenizer_model: Qwen/Qwen3-1.7B-Base
    vocab_size: 151936
    legacy_tokenizer: false
    split: "989,10,1"
    num_workers: 4

    data_path:
      - ${oc.env:OELLM_DATASETS_TOKENIZED_DIR}/MixtureVitae-v2-qwen3/data_shard_00000

    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    sequence_parallel: true

    distributed_backend: nccl
    use_distributed_optimizer: true
    overlap_param_gather: true
    overlap_grad_reduce: true
    recompute_activations: true
    ckpt_format: torch_dist
    ckpt_convert_format: torch
    ckpt_convert_save: ${job.base_output_dir}
    ckpt_fully_parallel_save: false
    async_save: false

    log_interval: 50
    log_throughput: true
    save_interval: 2000
    save: ${job.base_output_dir}
    load: ${job.base_output_dir}
    tensorboard_dir: ${job.base_output_dir}/tensorboard
    eval_interval: 71526
    eval_iters: 1
    ckpt_step: ${backend.megatron.train_iters}

    aux:
      model_name: "qwen3-1.7B"
      dataset: mixturevitae
      tokens: 300_000_000_000

slurm:
  env:
    CUDA_DEVICE_MAX_CONNECTIONS: "1"
  sbatch:
    nodes: 64
    time: "12:00:00"
