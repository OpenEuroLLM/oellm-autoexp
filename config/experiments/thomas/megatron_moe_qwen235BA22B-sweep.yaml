# @package _global_
# Megatron 235BA22B JUPITER 
# Use num_layers_per_virtual_pipeline_stage to fill PP bubble
# Bubble is = (PP−1) / (PP−1 + GA×VP)
# VP = num_layers / (PP × num_layers_per_virtual_pipeline_stage)
# Gradient accumulation is calculated as GA = GBS / (MBS × DP)
# DP = world_size / (TP × PP × CP)

defaults:
  - base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_moe_235BA22B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "megatron_qwen3_moe_235BA22B_jupiter"
  dispatcher_tag: "hybridep_fp8_overlap"

backend:
  megatron:
    # Training
    train_iters: 20
    log_interval: 1
    eval_interval: 999
    eval_iters: 0
    log_throughput: true

    # Checkpointing
    save: null
    load: null
    ckpt_step: 0

    # Distributed
    tensor_model_parallel_size: 2
    pipeline_model_parallel_size: 8
    expert_model_parallel_size: 16
    expert_tensor_parallel_size: 1
    num_layers_per_virtual_pipeline_stage: 4  # VPP=4 (ref); 96/(PP=8 × 4)=3 VP stages; EP×PP×TP=8×8×2=128=world_size (32 nodes × 4 GPUs)

    # Batch sizes
    global_batch_size: 2048 # 4096
    micro_batch_size: 1 # 4 fits?

    # Optimizer
    lr: 0.001
    use_distributed_optimizer: true

    # Model
    attention_backend: auto
    #padded_vocab_size: 262144
    padded_vocab_size: 151936 # Qwen 3 vocab size
    account_for_embedding_in_pipeline_split: true
    account_for_loss_in_pipeline_split: true
    #vocab_size: 262144 does not do anything?

    # Precision / FP8
    fp8: hybrid
    fp8_recipe: blockwise
    #fp8_amax_history_len: 16
    #fp8_amax_compute_algo: max
    fp8_param_gather: true
    moe_router_dtype: "fp32"
    moe_router_force_load_balancing: true

    distributed_timeout_minutes: 30 # Higher timeout for 512+ node jobs

    moe_token_dispatcher_type: flex
    moe_flex_dispatcher_backend: hybridep
    moe_hybridep_num_sms: 24
    #moe_enable_deepep: true


    # Comms / Overlap
    overlap_p2p_comm: true
    overlap_param_gather: true
    overlap_grad_reduce: true # DP=1 no DP peers to overlap

#   [default1]:[rank5]:   File "/usr/local/lib/python3.12/dist-packages/deep_ep/utils.py", line 98, in check_nvlink_connections
#   [default1]:[rank5]:     assert status == pynvml.NVML_P2P_STATUS_OK, \
#   [default1]:[rank5]:            ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^
#   [default1]:[rank5]: AssertionError: No NVLink connection between GPU 0 and GPU 0, but allow_nvlink_for_normal_mode=True
    #overlap_moe_expert_parallel_comm: true # if enabled with only flex or with hybridEP

    # Activation Recompute
    recompute_granularity: selective # then recompute_method: null must be set
    recompute_modules: [moe_act layernorm]
    recompute_method: null
    recompute_num_layers: null

    # Data
    data_path:
      - /e/project1/e-sta-openeurollm/harmsen1/datasets/FineWeb/fineweb-10BT_text_document
    data_cache_path: /e/scratch/e-sta-openeurollm/${oc.env:USER}/data
    tokenizer_model: /e/scratch/e-sta-openeurollm/harmsen1/hf_home/hub/models--openai-community--gpt2/snapshots/607a30d783dfa663caf39e06633721c8d4cfcd7e

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    PYTHONWARNINGS: "ignore::UserWarning"
    NCCL_NET_GDR_LEVEL: "0"  # disable GDRDMA — required for PP=2 inter-node P2P
    CUDA_DEVICE_MAX_CONNECTIONS: 1 # only for TP
    TORCH_DIST_INIT_BARRIER_TIMEOUT: "1800" # for 512 nodes
    TORCH_NCCL_AVOID_RECORD_STREAMS: "1"
    NCCL_IB_TIMEOUT: 22  # increased timeout? perhaps necessary or faulty node before :)


container:
  image: ${oc.env:CONTAINER_CACHE_DIR,.}/MegatronTraining-JUPITER-deep-hybridep_aarch64.sif
job:
  name: meg_moe_30BA3B_n${slurm.sbatch.nodes}_ep${backend.megatron.expert_model_parallel_size}_pp${backend.megatron.pipeline_model_parallel_size}_tp${backend.megatron.tensor_model_parallel_size}_mbs${backend.megatron.micro_batch_size}_gbs${backend.megatron.global_batch_size}_vp${backend.megatron.num_layers_per_virtual_pipeline_stage}_${aux.dispatcher_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

slurm:
  sbatch:
    nodes: 64
    time: "00:50:00"

sweep:
  type: list
  store_sweep_json: true
  groups:
    - type: list
      configs:
        - slurm.sbatch.nodes: 64
          backend.megatron.global_batch_size: 2048
        - slurm.sbatch.nodes: 128
          backend.megatron.global_batch_size: 4096
        - slurm.sbatch.nodes: 256
          backend.megatron.global_batch_size: 8192
        - slurm.sbatch.nodes: 512
          backend.megatron.global_batch_size: 16384