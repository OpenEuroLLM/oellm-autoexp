# @package _global_

defaults:
  - base
  - /backend: megatron_torchrun_localaddr
  - /container: jupiter
  - /slurm: jupiter
  - /backend/megatron: [base, qwen3_32B]
  - /sweep: none
  - _self_

aux:
  experiment_group: "qwen3-32b"
  recompute_tag: "none"
  dispatcher_tag: "none"

backend:
  megatron:
    train_iters: 10
    log_interval: 1
    eval_interval: 999
    eval_iters: 0
    save: null
    load: null
    #ckpt_step: 0
    #lr: 0.001
    log_throughput: true
    lr_warmup_iters: 0

    #vocab_size: 262144
    padded_vocab_size: 262144 # 128256
    global_batch_size: 256
    micro_batch_size: 1
    pipeline_model_parallel_size: 1
    tensor_model_parallel_size: 4

    attention_softmax_in_fp32: false

    #overlap_p2p_comm: true
    # overlap_grad_reduce: true # DP=1 no DP peers to overlap
    #num_layers_per_virtual_pipeline_stage: 6
    # overlap_moe_expert_parallel_comm: true AssertionError: overlap_moe_expert_parallel_comm is supported with alltoall/flex token dispatcher


    # recompute_granularity: selective # then recompute_method: null must be set
    # recompute_method: null
    # recompute_num_layers: null
    # recompute_modules: null

    use_distributed_optimizer: true

    data_path:
      - /e/project1/e-sta-openeurollm/harmsen1/datasets/FineWeb/fineweb-10BT_text_document
    data_cache_path: /e/scratch/e-sta-openeurollm/${oc.env:USER}/data

    tokenizer_model: /e/scratch/e-sta-openeurollm/harmsen1/hf_home/hub/models--openai-community--gpt2/snapshots/607a30d783dfa663caf39e06633721c8d4cfcd7e

  env:
    TOKENIZERS_PARALLELISM: "false"
    TRANSFORMERS_CACHE: ${oc.env:HF_HOME}/transformers
    HUGGINGFACE_HUB_CACHE: ${oc.env:HF_HOME}/hub
    HF_HOME: ${oc.env:HF_HOME}
    PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    #CUDA_MANAGED_FORCE_DEVICE_ALLOC: "1"
    #PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:False"
    PYTHONWARNINGS: "ignore::UserWarning"
    NCCL_NET_GDR_LEVEL: "0"  # disable GDRDMA — required for PP=2 inter-node P2P
    CUDA_DEVICE_MAX_CONNECTIONS: "1"  # only for TP

container:
  image: ${oc.env:CONTAINER_CACHE_DIR,.}/MegatronTraining-JUPITER-deep-hybridep_aarch64.sif
job:
  name: qwen3_32b_${slurm.sbatch.nodes}_ep${backend.megatron.expert_model_parallel_size}_pp${backend.megatron.pipeline_model_parallel_size}_tp${backend.megatron.tensor_model_parallel_size}_mbs${backend.megatron.micro_batch_size}_gbs${backend.megatron.global_batch_size}_vp${backend.megatron.num_layers_per_virtual_pipeline_stage}_${aux.dispatcher_tag}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

slurm:
  sbatch:
    nodes: 4
    time: "00:50:00"
