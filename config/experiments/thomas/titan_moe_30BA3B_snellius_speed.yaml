# @package _global_
# MoE speed sweep for Titan Qwen3 30BA3B on Snellius (2 nodes, 8x H100 94GiB)
#
# Architecture: 48 layers, dim=2048, 32 heads, 4 KV heads (GQA), 128 experts, topk=8
# Parallelism: EP=8, dp_shard=8 (FSDP for attention; efsdp=1 for experts)
#   EP is carved from dp_shard: dp_replicate(1)*dp_shard(8)*tp(1)*pp(1) = 8 = world_size
#   efsdp = dp_shard*tp/(etp*ep) = 8*1/(1*8) = 1 → no expert FSDP; experts fully on owning GPU
#
# Based on korbi/titan_moe_30BA3B_speed_sweep_jupiter.yaml, adapted for Snellius.
defaults:
  - ../base
  - /backend: titan
  - /container: snellius
  - /slurm: snellius
  - /sweep: none
  - override /backend/titan/model: qwen3_moe_30BA3B
  - override /backend/titan/data: fineweb_snellius
  - override /job: default
  - _self_

aux:
  experiment_group: "titan_moe_30BA3B_speed_sweep_snellius"
  compile_tag: "compile"

backend:
  titan:
    model:
      vocab_size: 50304
      hf_assets_path: ./assets/hf/gpt-neox-20b
      # Explicitly set flavor architecture — config_schema.py has non-None defaults
      # that override flavor values unless overridden here.
      dim: 2048
      n_layers: 48
      n_heads: 32
      n_kv_heads: 4
      hidden_dim: 6144
      moe_enabled: true

    training:
      steps: 100
      local_batch_size: 4
      global_batch_size: 128
      # gradient_accumulation_steps = global_batch_size / (local_batch_size * dp_degree)
      seq_len: 4096
      dtype: bfloat16

    metrics:
      log_freq: 10

    parallelism:
      tensor_parallel_degree: 1
      pipeline_parallel_degree: 1
      expert_parallel_degree: 4
      data_parallel_replicate_degree: 2
      data_parallel_shard_degree: 4       # ← 2 × 4 × 1 × 1 × 1 = 8 ✓
      context_parallel_degree: 1
    optimizer:
      lr: 0.001

    activation_checkpoint:
      mode: full

  env:
    TORCHDYNAMO_DISABLE: "1"
    PYTHONPATH: .:./submodules/titan-oellm:./submodules/titan-oellm/torchtitan
    NCCL_SOCKET_TIMEOUT: "60000"
    NCCL_TIMEOUT: "1800"
    NCCL_IB_TIMEOUT: "100"
    NCCL_IB_RETRY_CNT: "20"
    NCCL_ALGO: "Ring"
    HF_ALLOW_CODE_EVAL: "1"
    TORCH_HOME: ${oc.env:TORCH_HOME,"/tmp/torch_home"}
    PYTORCH_KERNEL_CACHE_PATH: ${oc.env:PYTORCH_KERNEL_CACHE_PATH,"/tmp/torch_home/kernels"}
    TRITON_CACHE_DIR: ${oc.env:TRITON_CACHE_DIR,"/tmp/triton_cache"}
    TORCHINDUCTOR_CACHE_DIR: ${oc.env:TORCHINDUCTOR_CACHE_DIR,"/tmp/torchinductor_cache"}
    TORCHINDUCTOR_FX_GRAPH_CACHE: ${oc.env:TORCHINDUCTOR_FX_GRAPH_CACHE,"/tmp/torchinductor_fx_cache"}
    TORCHINDUCTOR_AUTOGRAD_CACHE: ${oc.env:TORCHINDUCTOR_AUTOGRAD_CACHE,"/tmp/torchinductor_autograd_cache"}
    TORCH_INDUCTOR_CUDAGRAPH_DISABLE: ${oc.env:TORCH_INDUCTOR_CUDAGRAPH_DISABLE,"1"}
    PYTORCH_CUDA_ALLOC_CONF: ${oc.env:PYTORCH_CUDA_ALLOC_CONF,"expandable_segments:True"}

  torchrun_args:
    nproc_per_node: ${slurm.sbatch.gpus_per_node}
    nnodes: ${slurm.sbatch.nodes}
    max_restarts: 0
    rdzv_backend: "c10d"
    rdzv_endpoint: "$MASTER_ADDR:$MASTER_PORT"
    node_rank: "$SLURM_PROCID"
    master_addr: "$MASTER_ADDR"
    master_port: "$MASTER_PORT"

job:
  name: titan_moe_30BA3B_ep8_${aux.compile_tag}_ac${backend.titan.activation_checkpoint.mode}_bs${backend.titan.training.local_batch_size}
  base_output_dir: "${oc.env:OUTPUT_DIR,'./output'}/${aux.experiment_group}/${job.name}"

container:
  image: ${oc.env:CONTAINER_CACHE_DIR}/titan_snellius_x86_64.sif

slurm:
  sbatch:
    nodes: 2
    gpus_per_node: 4
    cpus_per_task: 64
    time: "00:30:00"
    account: ${oc.env:SLURM_ACCOUNT,null}
  env:
    GPUS_PER_NODE: "4"
    NUM_GPUS_PER_NODE: "4"
    NUM_GPUS: "$((NUM_GPUS_PER_NODE*SLURM_NNODES))"
