# @package _global_
defaults:
  - ../base
  - /backend: megatron
  - /container: mi325x
  - /slurm: mi325x
  - /sweep: none
  - /backend/megatron: [sanity_check] # a dense 70M non-emb param qwen3-like model 
  - _self_

# Auxiliary variables are used for references inside this config file.
aux:
  # Change to your needs or use env var
  data_dir: ${oc.env:DATA_DIR,"/shared_silo/scratch/rluukkon/data/preprocessed"}
  model_name: "tiny"

### Intention: easily runnable, quick experiment to see that loss curve is near-identical across runs between software stacks and clusters.
backend:
  megatron:
    # Preprocessed data from LUMIO:  `wget https://462000963.lumidata.eu/common-pile/wikipesto.{bin,idx,info.json}`
    data_path:
      - ${aux.data_dir}/gpt-neox-20b/common-pile/wikipesto
    data_cache_path: ${job.base_output_dir}/cache
    dataloader_type: single

    # Parallelism
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: true
    use_distributed_optimizer: true
    async_tensor_model_parallel_allreduce: false
    masked_softmax_fusion: false
    gradient_accumulation_fusion: false
    bias_dropout_fusion: false
    apply_rope_fusion: false
    distributed_timeout_minutes: 10
    overlap_grad_reduce: true
    recompute_activations: false
    
    micro_batch_size: 16
    ckpt_format: torch_dist

    wandb_project: megatron-sanity-check
    wandb_exp_name: ${job.name}_${oc.env:SLURM_JOB_ID,local}
    wandb_save_dir: ${job.base_output_dir}/wandb

# set to 8 hours
slurm:
  sbatch:
    time: "2:00:00"
    nodes: 1

  env:
    USE_ROCM_AITER_ROPE_BACKEND: "0"
    WANDB_MODE: "online" # <---- Modes: disabled, online, offline 
    WANDB_ENTITY: "openeurollm-project"
    OUTPUT_DIR: "${oc.env:OUTPUT_DIR,./output}"

job:
  # include cluster name in experiment name. 
  name: megatron_sanity_check_MI325X_${aux.model_name}_mb${backend.megatron.micro_batch_size}
