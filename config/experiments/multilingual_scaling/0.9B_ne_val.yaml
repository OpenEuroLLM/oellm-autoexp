# @package _global_

# 0.9B NE dense Qwen3-like model training with pull-based multi-stage cooldown on Marenostrum
# Configuration from: https://docs.google.com/spreadsheets/d/17LXPs6O9_6cL7P2KVEJF8LTy5zhy0qLNXEVGRCYOzhY/edit?gid=0#gid=0

defaults:
  - /backend: megatron_torchrun
  - /container: marenostrum
  - /slurm: marenostrum
  - /job: auto_restart
  - /sweep/multilingual_scaling@sweep: qwen3_dense_0.9B_ne_val # val-specific sweep (no start_condition; loads from training decay checkpoints)
  - /backend/megatron: base
  - /backend/megatron/multilingual_scaling/models: qwen3_dense_0.9B_ne # model configs
  - /backend/megatron/multilingual_scaling/data: oellm_256k_mn5_val # data configs
  - _self_

index: 0
stage: "" # Will be overridden by sweep

job:
  name: "" # Will be overridden by sweep with stage and hyperparameter info
  base_output_dir: "/gpfs/projects/ehpc533/multilingual_scaling/0.9B_ne/validation/${job.name}"
  log_path: ${slurm.sbatch.error}

backend:
  megatron:
    wandb_exp_name: "" # Will be overridden by sweep with stage and hyperparameter info
    wandb_project: dense_multilingual_scaling
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    data_cache_path: /gpfs/projects/ehpc533/users/diana/MEGATRON_262k_val # Adjust it to your own directory

    # Run only evaluation without training for validation config
    load: "/gpfs/projects/ehpc533/multilingual_scaling/0.9B_ne/training/${job.name}/checkpoints"

    skip_train: True #Bypasses the training loop entirely, only runs evaluation
    train_iters: 1 # Required even in evaluation-only mode to initialize the trainer, but we set it to 1 since it won't be used

    # Global batch size: use the full node.
    global_batch_size: "${oc.eval:'int(${backend.megatron.micro_batch_size} * ${slurm.sbatch.gpus_per_node})'}"

    # Always evaluate exactly 2048 * 100 = 204800 samples (~838M tokens with seq=4096), independent of gbsz
    eval_iters: "${oc.eval:'int(204800 // (${backend.megatron.micro_batch_size} * ${slurm.sbatch.gpus_per_node}))'}"
    eval_interval: 1

    exit_on_missing_checkpoint: True
    save_interval: 1
    no_save_optim: True
    no_save_rng: True
    no_load_optim: True # skip loading optimizer state (saves memory + time)
    no_load_rng: True # skip loading RNG state

slurm:
  sbatch:
    nodes: 1 # 1 node is sufficient for evaluation
    gpus_per_node: 4 # use all 4 GPUs on the node for faster evaluation
    qos: acc_ehpc
    account: ehpc533
    time: "4:00:00"
    output: "${job.base_output_dir}/logs/stdout-%j.log"
    error: "${job.base_output_dir}/logs/stderr-%j.log"
