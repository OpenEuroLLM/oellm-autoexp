# @package _global_

# 0.2B NE dense Qwen3-like model training with pull-based multi-stage cooldown on Marenostrum
# Configuration from: https://docs.google.com/spreadsheets/d/17LXPs6O9_6cL7P2KVEJF8LTy5zhy0qLNXEVGRCYOzhY/edit?gid=0#gid=0

defaults:
  - /backend: megatron_torchrun
  - /container: leonardo
  - /slurm: leonardo
  - /job: auto_restart
  - /sweep/multilingual_scaling@sweep: qwen3_dense_0.2B_ne_val # val-specific sweep (no start_condition; loads from training decay checkpoints)
  - /backend/megatron: base
  - /backend/megatron/multilingual_scaling/models: qwen3_dense_0.2B_ne # model configs
  - /backend/megatron/multilingual_scaling/data: oellm_256k_leo_val # data configs
  - _self_

index: 0
stage: "" # Will be overridden by sweep

job:
  name: "" # Will be overridden by sweep with stage and hyperparameter info
  base_output_dir: "/leonardo_work/OELLM_prod2026/experiments/multilingual_scaling/0.2B_ne/validation_leo/${job.name}"
  log_path: ${slurm.sbatch.error}

backend:
  megatron:
    wandb_exp_name: "" # Will be overridden by sweep with stage and hyperparameter info
    wandb_project: dense_multilingual_scaling
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    data_cache_path: /leonardo_work/OELLM_prod2026/users/shaldar0/oellm-autoexp/MEGATRON_262k_val/${job.name} # Adjust it to your own directory

    # Run only evaluation without training for validation config
    load: "/leonardo_work/OELLM_prod2026/experiments/multilingual_scaling/0.2B_ne/training/${job.name}/checkpoints"

    skip_train: True #Bypasses the training loop entirely, only runs evaluation
    train_iters: 1 # Required even in evaluation-only mode to initialize the trainer, but we set it to 1 since it won't be used

    # Global batch size: use the full node.
    # global_batch_size: "${oc.eval:'int(${backend.megatron.micro_batch_size} * ${slurm.sbatch.gpus_per_node})'}" # comes from sweep

    # Always evaluate exactly 2048 * 100 = 204800 samples (~838M tokens with seq=4096), independent of gbsz
    # eval_iters: "${oc.eval:'int(204800 // (${backend.megatron.micro_batch_size} * ${slurm.sbatch.gpus_per_node}))'}"
    eval_iters: "${oc.eval:'int(204800 // ${backend.megatron.global_batch_size})'}"
    # Must stay larger than any sweep train_iters (max ~286k for gbsz=256/300BT). With skip_train the
    # eval is a one-shot pass gated only by eval_iters>0, NOT by eval_interval, so this value never drives
    # a periodic loop. It only controls Megatron's valid dataset sizing:
    #   eval_samples = (train_iters // eval_interval + 1) * eval_iters * gbsz
    # The sweep's stable stage raises train_iters to the full budget (for the warmup-ratio filter), so a
    # small eval_interval here would request ~29B valid samples and hang the dataset build past the NCCL
    # timeout. Keeping (train_iters // eval_interval + 1) == 1 yields the intended eval_iters*gbsz=204800.
    eval_interval: 1_000_000_000 # 1

    exit_on_missing_checkpoint: True
    save_interval: 1
    no_save_optim: True
    no_save_rng: True
    no_load_optim: True # skip loading optimizer state (saves memory + time)
    no_load_rng: True # skip loading RNG state

slurm:
  sbatch:
    # Max possible allocation on MN5 is 100 nodes per job.
    nodes: "${oc.eval:'min(64, max(1, int(${backend.megatron.global_batch_size}//(${backend.megatron.micro_batch_size}*${slurm.sbatch.gpus_per_node}))))'}"
    account: oellm_prod2026
    time: "04:00:00"
    output: "${job.base_output_dir}/logs/stdout-%j.log"
    error: "${job.base_output_dir}/logs/stderr-%j.log"