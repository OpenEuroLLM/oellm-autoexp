# @package _global_

# 0.4B NE dense Qwen3-like model training with pull-based multi-stage cooldown on Leonardo
# Configuration from: https://docs.google.com/spreadsheets/d/17LXPs6O9_6cL7P2KVEJF8LTy5zhy0qLNXEVGRCYOzhY/edit?gid=0#gid=0

defaults:
  - /backend: megatron_torchrun
  - /container: leonardo
  - /slurm: leonardo
  - /job: auto_restart
  - /sweep/multilingual_scaling@sweep: qwen3_dense_0.4B_ne_leo_train # sweep configs
  - /backend/megatron: base
  - /backend/megatron/multilingual_scaling/models: qwen3_dense_0.4B_ne # model configs
  - /backend/megatron/multilingual_scaling/data: oellm_256k_leo_train # data configs
  - _self_

index: 0
stage: "" # Will be overridden by sweep

job:
  name: "" # Will be overridden by sweep with stage and hyperparameter info
  base_output_dir: "/leonardo_work/OELLM_prod2026/experiments/multilingual_scaling/0.4B_ne/training/${job.name}"
  log_path: ${slurm.sbatch.error}

backend:
  megatron:
    wandb_exp_name: "" # Will be overridden by sweep with stage and hyperparameter info
    wandb_project: dense_multilingual_scaling
    wandb_entity: openeurollm-project
    wandb_save_dir: "${job.base_output_dir}"
    tensorboard_dir: "${job.base_output_dir}/tensorboard"

    data_cache_path: /leonardo_work/OELLM_prod2026/users/shaldar0/oellm-autoexp/MEGATRON_262k/${job.name} # Adjust it to your own directory

    # # Evals off: this changes the data stream
    # eval_iters: 0
    # split: "100,0,0"

    # Evals off (keep data stream identical to MN5's 99,1,0)
    eval_interval: 1_000_000_000
    num_workers: 8

container:
  env:
    WANDB_TAGS: "leonardo"

slurm:
  sbatch:
    # Max possible allocation on Leonardo is 64 nodes per job.
    nodes: "${oc.eval:'min(64, max(1, int(${backend.megatron.global_batch_size}//(${backend.megatron.micro_batch_size}*${slurm.sbatch.gpus_per_node}))))'}"
    account: AIFAC_5C0_092
    time: "24:00:00"
    output: "${job.base_output_dir}/logs/stdout-%j.log"
    error: "${job.base_output_dir}/logs/stderr-%j.log"