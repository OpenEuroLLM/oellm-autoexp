# @package _global_
defaults:
  - base
  - /backend: megatron
  - /container: mi325x
  - /slurm: mi325x
  - /sweep: none
  - /backend/megatron: [sanity_check,qwen3_125M]
  - _self_

backend:
  megatron:
    # Parallelism
    tensor_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    context_parallel_size: 1
    sequence_parallel: true
    use_distributed_optimizer: true
    async_tensor_model_parallel_allreduce: false
    masked_softmax_fusion: false
    gradient_accumulation_fusion: false
    bias_dropout_fusion: false
    apply_rope_fusion: false
    distributed_timeout_minutes: 10
    overlap_grad_reduce: true
    recompute_activations: false
    
    micro_batch_size: 16
    ckpt_format: torch_dist

    wandb_project: megatron-sanity-check
    wandb_exp_name: ${job.name}_${oc.env:SLURM_JOB_ID,local}
    wandb_save_dir: ${job.base_output_dir}/wandb

# set to 8 hours
slurm:
  sbatch:
    time: "8:00:00"

job:
  # include cluster name in experiment name. 
  name: megatron_sanity_check_MI325X_mb${backend.megatron.micro_batch_size}
