# @package _global_
#
# Node count scaling sweep for Qwen3-235B training
# Tests performance across different cluster sizes (1 to 1024 nodes with 2x scaling)
#
defaults:
  - /backend: megatron_torchdist
  - /container: lumi
  - /slurm: lumi
  - /job: default
  - /sweep: none
  - /backend/megatron: base
  - _self_

#TODO: Check what these are for
index: 0
stage: "all"

job:
  base_output_dir: "distributed-training-benchmarking"
  name: "qwen3_235B_nodes${slurm.sbatch.nodes}_gbsz${backend.megatron.global_batch_size}_${stage}"

backend:
  megatron:
    wandb_exp_name: "${job.name}"
    wandb_project: oellm-train

    # MODEL: Qwen3-235B (from your script)
    num_layers: 94
    hidden_size: 4096
    moe_ffn_hidden_size: 1536
    num_attention_heads: 64
    num_query_groups: 4
    seq_length: 4096
    max_position_embeddings: 32768
    tokenizer_model: EleutherAI/gpt-neox-20b
    tokenizer_type: HuggingFaceTokenizer
    
    # TRAINING
    micro_batch_size: 1  # Fixed from script
    global_batch_size: 1024  # Fixed from script
    train_iters: 100  # Adjust as needed for your sweep
    lr: 3e-4
    min_lr: 3e-5
    
    # OPTIMIZER
    optimizer: adam
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.e-8
    clip_grad: 1.0
    weight_decay: 0.1
    
    # SCHEDULER
    lr_decay_style: cosine
    lr_warmup_iters: 500
    
    # PARALLELISM (from script)
    pipeline_model_parallel_size: 16
    expert_model_parallel_size: 8
    decoder_first_pipeline_num_layers: 5
    decoder_last_pipeline_num_layers: 5
    use_distributed_optimizer: true
    sequence_parallel: true
    context_parallel_size: 2
    
    # MOE settings
    num_experts: 64
    moe_router_topk: 8
    moe_router_dtype: fp64
    moe_router_load_balancing_type: aux_loss
    moe_aux_loss_coeff: 0.001
    moe_grouped_gemm: true
    moe_token_dispatcher_type: alltoall
    
    # EVALS & LOGGING
    eval_interval: 5000
    eval_iters: 100
    log_interval: 1
    log_progress: true
    log_throughput: true
    tensorboard_queue_size: 5
    
    # CHECKPOINT
    ckpt_format: "torch"
    save_interval: 500
    save: ${job.base_output_dir}
    
    bf16: true
    use_flash_attn: true

slurm:
  sbatch:
    nodes: 1  # Will be overridden by sweep
    ntasks_per_node: 8
    cpus_per_task: 7
    gpus_per_node: 8
    time: "01:00:00"
    exclusive: true

# SWEEP: Node count scaling (exponential: 1, 2, 4, 8, 16, 32, 64, 128, 256, 512, 1024)
sweep:
  type: list
  configs:
    - stage: nodes_1
      slurm.sbatch.nodes: 1
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_2
      slurm.sbatch.nodes: 2
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_4
      slurm.sbatch.nodes: 4
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_8
      slurm.sbatch.nodes: 8
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_16
      slurm.sbatch.nodes: 16
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_32
      slurm.sbatch.nodes: 32
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_64
      slurm.sbatch.nodes: 64
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_128
      slurm.sbatch.nodes: 128
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_256
      slurm.sbatch.nodes: 256
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_512
      slurm.sbatch.nodes: 512
      backend.megatron.global_batch_size: 1024
      
    - stage: nodes_1024
      slurm.sbatch.nodes: 1024
      backend.megatron.global_batch_size: 1024